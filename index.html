ics too early worsens hypovolemia; if volume overloaded after rehydration, use **furosemide 20–40 mg IV** titrated to net even/negative while maintaining perfusion and electrolytes (K/Mg).\n- Guideline Must Know: If calcitriol-mediated hypercalcemia is suspected (lymphoma, granulomatous disease) Endocrine Society recommends **glucocorticoids first** (e.g., **prednisone 40–60 mg PO daily** or **methylprednisolone 40–60 mg IV daily**), adding antiresorptive if inadequate response. citeturn2search9turn2search11\n- Etiology triage with one lab: **PTH**. If **PTH high/inappropriately normal**, think primary/tertiary hyperparathyroidism, lithium, familial hypocalciuric hypercalcemia; if **PTH suppressed**, think malignancy (PTHrP, bone metastases), vitamin D excess/calcitriol, thyrotoxicosis, adrenal insufficiency, immobilization.\n- Guideline Must Know: For suspected primary hyperparathyroidism, recommended evaluation includes **25-hydroxyvitamin D** and **24-hour urine calcium** (helps distinguish familial hypocalciuric hypercalcemia vs primary hyperparathyroidism), plus skeletal/renal assessment when stable. citeturn2search13turn2search17\n- Definitive agents (choose by context): IV bisphosphonates are effective but slower and can worsen kidney function; denosumab is not renally cleared and is preferred when **eGFR is very low** or bisphosphonates are contraindicated, but watch for delayed hypocalcemia (especially vitamin D deficiency). citeturn2search11turn2search9\n- Guideline Must Know: CKD-MBD guidance emphasizes avoiding persistent hypercalcemia and individualizing therapies that raise calcium burden; in advanced CKD with severe symptomatic hypercalcemia, escalation to dialysis may be necessary when medical therapy/volume management is limited. citeturn2search1turn2search2\n- “Confirm Before Proceed”: before IV bisphosphonate, confirm **pregnancy status**, check **renal function**, correct severe **hypophosphatemia/hypomagnesemia**, and ensure no impending need for urgent dental procedures (osteonecrosis of jaw risk is low in single-dose acute care but document counseling when possible). citeturn2search11\n- Call early for likely malignant hypercalcemia (known cancer, weight loss, very low PTH, high alk phos, lytic lesions): recurrence is common unless oncologic therapy proceeds; plan oncology input and malignancy evaluation (SPEP/UPEP, chest imaging) after stabilization.\n- Night-float “can’t miss” complications: **AKI/oliguria**, **delirium**, **ventricular ectopy**, pancreatitis symptoms, dehydration with hypotension; recheck Ca and electrolytes **q4–6 h** initially in severe cases and after each major therapy change.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **Ionized Ca ≥1.75 mmol/L** or total **Ca ≥3.5 mmol/L**, especially with **AMS, seizures, syncope, or ventricular arrhythmia**.\n- **Oliguria <0.5 mL/kg/h for 6 h**, rising creatinine with suspected hypercalcemic AKI, or need for renal replacement therapy.\n- New/worsening respiratory failure or pulmonary edema during rehydration (needs **HF/renal** co-management or ICU-level monitoring).\n- Refractory hypercalcemia: Ca not falling or rebounding after fluids + calcitonin + antiresorptive, or suspected calcitriol-mediated disease needing steroid strategy/biopsy planning. citeturn2search11turn2search9\n- Suspected primary hyperparathyroidism with **neck mass/hoarseness**, very high Ca, or concern for parathyroid carcinoma (endocrinology/surgery). citeturn2search11turn2search13\n\n## Orders to Place Now (3–6 bullets)\n- Order: Telemetry — {indication: hypercalcemia with symptoms/ECG changes; duration: 24–48 h}\n- Order: Basic metabolic panel + magnesium + phosphate — {frequency: now then q6h x 4; adjust based on trend}\n- Order: Ionized calcium — {now; repeat q6h if severe/symptomatic until improving}\n- Order: 0.9% sodium chloride IV infusion — {bolus: 1000–2000 mL; maintenance: 150–250 mL/h; target UOP: ≥100 mL/h; hold/adjust for HF/ESRD}\n- Order: Calcitonin — {dose: 4 IU/kg SC/IM; interval: q12h; max: 8 IU/kg/dose; stop after 48 h unless compelling response}\n- Order: PTH + 25-hydroxyvitamin D — {now; add PTHrP and 1,25-dihydroxyvitamin D if PTH suppressed}\n\n## ABIM Style Question 1\n### Stem\nA 66-year-old man with metastatic squamous cell lung cancer is admitted for confusion and dehydration. Vitals: T 36.8°C, HR 112, BP 96/58, RR 18, SpO₂ 95% RA. Labs: total calcium **3.6 mmol/L**, albumin 38 g/L, creatinine 141 µmol/L (baseline 97), phosphate low. ECG shows a shortened QT interval. He has received 1 L of 0.9% sodium chloride and remains confused. Which therapy should be started next to rapidly lower calcium while definitive therapy takes effect?\n### Options\nA. Intravenous furosemide infusion immediately to promote calciuresis\nB. Calcitonin plus denosumab (or IV bisphosphonate) as initial combination therapy\nC. Oral cinacalcet as monotherapy\nD. Intravenous sodium bicarbonate infusion\nE. Subcutaneous teriparatide\n### Correct answer\nB\n### Rationale\nFor **severe hypercalcemia of malignancy**, guideline-based initial management includes hydration plus **calcitonin combined with an antiresorptive (denosumab or IV bisphosphonate)** to achieve rapid temporization and sustained calcium reduction. citeturn2search11turn2search9 Calcitonin has a fast onset but tachyphylaxis; antiresorptives provide durable effect over **24–72 h**, whereas loop diuretics are reserved only after adequate rehydration and do not replace definitive therapy. citeturn2search8turn2search11\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 72-year-old woman with end-stage kidney disease on hemodialysis (missed her last session) presents with lethargy and dyspnea. Exam shows crackles to mid-lung fields and elevated JVP. Vitals: HR 118, BP 104/62, RR 24, SpO₂ 90% on 4 L nasal cannula. Labs: total calcium **3.7 mmol/L**, potassium 5.6 mmol/L, bicarbonate 18 mmol/L; ECG shows shortened QT without peaked T waves. You are concerned about life-threatening hypercalcemia but she is volume overloaded and cannot tolerate aggressive IV fluids. What is the best next step?\n### Options\nA. Give 2 L of 0.9% sodium chloride rapidly, then reassess\nB. Administer zoledronic acid 4 mg IV immediately as sole therapy\nC. Start urgent hemodialysis using a low-calcium dialysate\nD. Start hydrochlorothiazide to enhance renal calcium excretion\nE. Observe overnight because calcitonin is sufficient\n### Correct answer\nC\n### Rationale\nThe pitfall is **ESRD with pulmonary edema**, where aggressive hydration is unsafe and renal calcium excretion is ineffective; urgent **hemodialysis (low-calcium dialysate)** provides the fastest controllable calcium removal in life-threatening cases. citeturn2search1turn2search2 IV bisphosphonates have delayed onset and may worsen renal complications; calcitonin can be adjunctive but is not definitive alone at this severity. citeturn2search11turn2search9\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What calcium level generally defines “severe” hypercalcemia requiring urgent therapy even if minimally symptomatic? A: **Total Ca ≥3.5 mmol/L (≈14 mg/dL)** or equivalent ionized elevation.\n- Q: Which single lab best separates PTH-mediated from non–PTH-mediated hypercalcemia? A: Serum **intact PTH** (inappropriately normal/high suggests PTH-mediated; suppressed suggests non–PTH-mediated).\n- Q: What is the expected limitation of calcitonin therapy for hypercalcemia? A: Tachyphylaxis commonly develops within **24–48 hours**, so it is a short bridge therapy. citeturn2search11\n- Q: In calcitriol-mediated hypercalcemia (e.g., lymphoma/granulomatous disease), what medication class is first-line? A: **Glucocorticoids** as initial therapy. citeturn2search9turn2search11\n\n## Guidelines & Key References (3–5 bullets)\n- Endocrine Society Clinical Practice Guideline: Treatment of Hypercalcemia of Malignancy in Adults (2022; published 2023) — https://www.endocrine.org/clinical-practice-guidelines/hypercalcemia citeturn2search9\n- El-Hajj Fuleihan G, et al. Treatment of Hypercalcemia of Malignancy in Adults: Endocrine Society CPG (2022/2023) — https://academic.oup.com/jcem/article/108/3/507/6916871 citeturn2search11\n- KDIGO 2017 Clinical Practice Guideline Update for CKD–MBD (2017) — https://kdigo.org/wp-content/uploads/2017/02/2017-KDIGO-CKD-MBD-GL-Update.pdf citeturn2search1\n- AAES Guidelines for Definitive Management of Primary Hyperparathyroidism (2016) — https://jamanetwork.com/journals/jamasurgery/fullarticle/2542667 citeturn2search13\n- Fifth International Workshop: Evaluation and Management of Primary Hyperparathyroidism (Summary/Guidelines PDF) — https://www.endocrinology.org/media/boodt50x/bilezikian-et-al-guidelines.pdf citeturn2search17\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Hypercalcemia — acuity {acute/subacute} — severity {mild/moderate/severe} with objective {total Ca ___ mmol/L; ionized Ca ___ mmol/L} — symptoms {AMS/arrhythmia/constipation/polyuria} — treatment {IV fluids; calcitonin; antiresorptive; monitoring plan}.\n- Suspected etiology — {malignancy/PTH-mediated/vitamin D–mediated/medication/immobilization} — supporting data {PTH ___; PTHrP ___ if sent; 25-OH D ___; 1,25-OH₂ D ___; imaging findings}.\n- Acute kidney injury (if present) — {KDIGO stage ___} — presumed cause {pre-renal from dehydration/hypercalcemia-associated} — evidence {Cr baseline ___ → ___ µmol/L; UOP ___} — interventions {fluids; avoid nephrotoxins; nephrology consult}.\n- Acute metabolic encephalopathy (if present) — cause {hypercalcemia/dehydration} — evidence {GCS/mental status change; Ca level} — safety {fall precautions; capacity concerns; sitter/restraints if needed}.\n- Volume status/respiratory risk during therapy — {hypovolemic/euvolemic/hypervolemic} — evidence {JVP/edema/CXR/ultrasound} — plan {rate of fluids; diuresis; dialysis consideration}.\n", "hypocalcemia.md": "---\nfilename: hypocalcemia.md\nid: hypocalcemia\ntitle: Hypocalcemia\nslug: hypocalcemia\ntags: [electrolytes, hypocalcemia, inpatient, night-float, endocrinology]\nlevel: resident\nestimatedtimemin: 12\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Hypocalcemia\n\n## Panic Card (3–6 bullets)\n- ABCs + telemetry; assess for seizures, laryngospasm/stridor, hypotension, and arrhythmia; get STAT ECG for **QTc prolongation/torsades risk** and draw STAT **ionized Ca²⁺** (do not wait for “corrected” Ca).\n- If symptomatic or ECG changes: give **calcium gluconate 2 g IV** (or **1 g** if smaller/less severe) over **10–20 min**; repeat **q10–20 min** until symptoms improve or **ionized Ca²⁺ ≥1.0 mmol/L** and QT stabilizes.\n- If life-threatening instability (seizure, torsades, shock) or no peripheral access: **calcium chloride 1 g IV via central line**; Confirm Before Proceed: high extravasation risk with peripheral administration.\n- Fix drivers now: if **Mg²⁺ low**, give **magnesium sulfate 2 g IV** (often required for Ca to respond); stop alkalosis triggers (hyperventilation), review transfusion citrate exposure, and hold offending meds if appropriate.\n- Recheck **ionized Ca²⁺ q4h** (or **q1–2h** if severe/infusion), trend Mg/Phos/K, and escalate to ICU if escalating Ca requirement, arrhythmia, or respiratory compromise.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Hypocalcemia on nights is dangerous when it causes neuromuscular irritability (perioral numbness, tetany, carpopedal spasm), seizures, laryngospasm, hypotension, or dysrhythmia from **QTc prolongation**; confirm severity with **ionized Ca²⁺** because albumin shifts and pH changes can mislead total calcium.\n- Separate “must happen now” vs “can wait”: treat immediately if symptomatic, if **total Ca <7.5 mg/dL (1.9 mmol/L)**, if **ionized Ca²⁺ <0.9 mmol/L**, or if ECG shows **QTc ≥500 ms** or ventricular ectopy; if mild/asymptomatic, you can start oral repletion and workup overnight without aggressive IV therapy.\n- Guideline Must Know: For symptomatic acute hypocalcemia, first-line is **IV calcium** (typically **calcium gluconate 1–2 g** over **10–20 min**, repeat as needed) with ECG monitoring; continuous infusion may be needed for ongoing losses or hungry-bone physiology (Endocrine Society hypoparathyroidism guidance; critical care practice standards).\n- Guideline Must Know: Prefer **calcium gluconate** for peripheral administration; reserve **calcium chloride** for profound instability and administer via **central line** due to tissue necrosis risk with extravasation; Confirm Before Proceed before choosing chloride if only peripheral access.\n- Guideline Must Know: If hypocalcemia persists or is “refractory,” check and replace **magnesium**; **hypomagnesemia** causes functional hypoparathyroidism (reduced PTH secretion/action), and calcium often will not correct until **Mg²⁺ is repleted** (Endocrine Society hypoparathyroidism guidance).\n- Guideline Must Know: In CKD or tumor lysis with **hyperphosphatemia**, avoid indiscriminate calcium loading because of calcium-phosphate precipitation; prioritize lowering phosphate (binders/dialysis) while still treating **life-threatening symptoms** with carefully titrated IV calcium (KDIGO CKD-MBD guidance).\n- Guideline Must Know: If due to hypoparathyroidism (post-thyroid/parathyroid surgery), long-term stabilization requires **oral calcium** plus **calcitriol**; overnight, start **calcitriol 0.25–0.5 mcg PO/NG** if persistent low Ca with low/inappropriately normal PTH and no contraindication (Endocrine Society hypoparathyroidism guidance).\n- Guideline Must Know: Massive transfusion/citrate load can acutely lower ionized Ca²⁺; monitor **ionized Ca²⁺** during large blood product exposure and replete to maintain hemodynamics and coagulation performance (transfusion medicine standards; ICU protocols).\n- Guideline Must Know: Treat torsades risk from hypocalcemia as an ACLS problem: correct electrolytes, stop QT-prolongers, and if torsades occurs give **magnesium sulfate 2 g IV** and consider overdrive pacing/defibrillation as indicated (AHA ACLS guidance).\n- Common etiologies to recognize quickly: post-neck surgery hypoparathyroidism, vitamin D deficiency/malabsorption, pancreatitis (saponification), sepsis/critical illness, rhabdomyolysis, tumor lysis, CKD with phosphate retention, medications (bisphosphonates, denosumab, cinacalcet), and alkalosis (increases protein binding → lower ionized Ca²⁺).\n- Workup you can start overnight after stabilization: **PTH**, **25-OH vitamin D**, **phosphate**, **magnesium**, **creatinine/eGFR**, and review recent neck surgery, transfusions, chemotherapy, and antiresorptive therapy; interpret in patterns (low Ca + high Phos + low/normal PTH suggests hypoparathyroidism; low Ca + low Phos suggests vitamin D deficiency).\n- Practical dosing: 10% calcium gluconate contains ~**93 mg elemental Ca per 10 mL**; start **2 g (20 mL) IV** over 10–20 min for severe symptoms; if recurrent, run infusion targeting **ionized Ca²⁺ ~1.0–1.2 mmol/L** with frequent checks and adjust based on symptoms and ECG.\n- What can wait until day team if stable: comprehensive vitamin D repletion plan, outpatient malabsorption evaluation, and fine-tuning chronic hypoparathyroidism regimen; what cannot wait: airway compromise, seizure, ventricular arrhythmia, rising Ca requirements, or suspected surgical neck hematoma with hypocalcemia symptoms.\n- Pitfalls: “corrected calcium” can miss alkalosis-driven low ionized Ca²⁺; giving calcium alone in hypomagnesemia fails; overcorrecting calcium in CKD/hyperphosphatemia increases calcification risk; and unmonitored IV calcium can worsen arrhythmias—keep telemetry and repeat ECG if **QTc remains ≥500 ms**.\n- When to call for help: ICU for recurrent bolus needs, infusion requirement, shock, seizure, or any ventricular arrhythmia; endocrine for suspected hypoparathyroidism/hungry bone; nephrology for CKD with hyperphosphatemia or dialysis need; ENT/surgery if post-neck surgery symptoms or concern for neck complication.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **Seizure, laryngospasm/stridor, or respiratory compromise** attributable to hypocalcemia.\n- **QTc ≥500 ms**, torsades, ventricular tachycardia, or recurrent symptomatic ectopy despite initial repletion.\n- Need for **>2 IV boluses** within 2 hours or requirement for **continuous calcium infusion** to maintain **ionized Ca²⁺ ≥1.0 mmol/L**.\n- Concurrent **severe hypomagnesemia (Mg²⁺ <1.2 mg/dL / 0.5 mmol/L)**, **hyperphosphatemia ≥7 mg/dL**, tumor lysis, or advanced CKD with rising potassium/volume issues.\n- Post-thyroid/parathyroid surgery with worsening symptoms or concern for surgical complication requiring urgent specialty evaluation.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Calcium gluconate 10% IV — {dose_g=2} g IV over {time_min=20} min; may repeat q{repeat_min=20} min x {max_doses=3} for symptoms/ECG changes\n- Order: Ionized calcium, BMP, magnesium, phosphate — {frequency=now} and then ionized Ca q{hours=4} (q{hours=2} if severe/infusion)\n- Order: Telemetry monitoring — {indication=QTc_prolongation/symptomatic_hypocalcemia} duration {duration_hours=24}\n- Order: Magnesium sulfate IV — {dose_g=2} g IV over {time_min=60} min if Mg low or pending in severe symptoms; recheck Mg q{hours=6}\n- Order: ECG 12-lead — {timing=now} and repeat after repletion if QTc remains prolonged or symptoms persist\n\n## ABIM Style Question 1\n### Stem\nA 62-year-old man with alcohol use disorder is admitted with pancreatitis. Overnight he develops perioral numbness and carpopedal spasm. Vitals: T 37.0°C, HR 108, BP 98/58, RR 18, SpO₂ 96% RA. ECG shows QTc 520 ms. Labs: total calcium 6.9 mg/dL, ionized calcium 0.86 mmol/L, magnesium 1.9 mg/dL, phosphate 3.6 mg/dL. What is the best immediate management?\n### Options\nA. Start oral calcium carbonate and recheck calcium in the morning  \nB. Administer calcium gluconate 2 g IV over 10–20 minutes with telemetry monitoring  \nC. Administer furosemide to reduce urinary calcium losses  \nD. Administer sodium bicarbonate to correct metabolic acidosis  \nE. Start calcitriol 0.25 mcg PO now without IV calcium\n### Correct answer\nB\n### Rationale\nHe has symptomatic severe hypocalcemia with **QTc ≥500 ms**, which warrants **IV calcium** with ECG monitoring; **calcium gluconate 2 g IV** is appropriate for peripheral administration and rapid stabilization. Oral calcium/calcitriol are adjuncts once stabilized and will not address immediate arrhythmia risk.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 70-year-old woman is hospitalized for diarrhea and poor intake. At 2 AM she reports tingling around her mouth and cramping in her hands. Vitals are stable. ECG shows QTc 510 ms. Labs: ionized calcium 0.90 mmol/L, total calcium 7.4 mg/dL, magnesium 0.8 mg/dL, phosphate 2.9 mg/dL, creatinine 1.0 mg/dL. She receives 2 g IV calcium gluconate with minimal improvement in symptoms and repeat ionized calcium remains 0.92 mmol/L. What is the next best step?\n### Options\nA. Give additional calcium gluconate boluses only until ionized calcium normalizes  \nB. Start calcitriol 0.5 mcg PO and defer further IV therapy  \nC. Administer magnesium sulfate 2 g IV and replete magnesium to normal range  \nD. Give calcium chloride 1 g via peripheral IV for faster correction  \nE. Administer phosphate replacement to reduce calcium binding\n### Correct answer\nC\n### Rationale\nThe pitfall is **severe hypomagnesemia**, which impairs PTH secretion and causes PTH resistance; hypocalcemia often will not correct until **Mg²⁺ is repleted**. Magnesium sulfate repletion is the decisive next step, with continued monitoring and calcium as needed for symptoms/ECG changes. What changed the decision here?\n\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: Which calcium measurement best reflects biologically active calcium in critical illness or alkalosis? A: Ionized calcium, because pH and albumin shifts can change total calcium without reflecting free Ca²⁺.\n- Q: What ECG change is most associated with hypocalcemia? A: QT interval prolongation, which increases torsades risk when markedly prolonged.\n- Q: What electrolyte abnormality commonly makes hypocalcemia refractory to calcium replacement? A: Hypomagnesemia, due to impaired PTH secretion and end-organ resistance.\n- Q: Name one high-risk inpatient trigger for acute hypocalcemia from chelation/binding. A: Large-volume blood product transfusion causing citrate-associated lowering of ionized Ca²⁺.\n\n## Guidelines & Key References (3–5 bullets)\n- Endocrine Society: Hypoparathyroidism management guideline (updated guidance for chronic hypoPTH and calcium/calcitriol strategies) — https://www.endocrine.org/clinical-practice-guidelines/hypoparathyroidism\n- KDIGO Clinical Practice Guideline Update for CKD-MBD (phosphate/calcium management in CKD) — https://kdigo.org/guidelines/ckd-mbd/\n- American Heart Association (AHA) ACLS guidelines (torsades/electrolyte-driven arrhythmia management) — https://cpr.heart.org/\n- International Society of Blood Transfusion (ISBT) and transfusion practice resources (citrate effects and ionized calcium monitoring in massive transfusion contexts) — https://www.isbtweb.org/\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute symptomatic hypocalcemia — {etiology} — {severity=seizure/tetany/QTc_prolongation/shock} — evidence {ionized_Ca, total_Ca, ECG_QTc} — treatment {IV_calcium_bolus/infusion, telemetry}\n- Hypocalcemia due to hypoparathyroidism (postoperative vs chronic) — {PTH_level} — evidence {Ca, Phos, surgical_history} — treatment {IV_calcium, calcitriol, oral_calcium} — monitoring {ionized_Ca_frequency}\n- Refractory hypocalcemia due to hypomagnesemia — evidence {Mg_level} — associated findings {PTH_pattern_if_known} — treatment {IV_magnesium_repletion} — response {repeat_ionized_Ca, symptoms}\n- Hypocalcemia with hyperphosphatemia/CKD — {CKD_stage/eGFR} — evidence {Phos_level, Ca_level} — management {phosphate_binders/dialysis_consult, cautious_IV_calcium_if_symptomatic} — risk {CaPhos_precipitation}\n", "hyperparathyroidism.md": "---\nfilename: hyperparathyroidism.md\nid: hyperparathyroidism\ntitle: Hyperparathyroidism\nslug: hyperparathyroidism\ntags: [endocrinology, electrolyte-disorders, hypercalcemia, chronic-kidney-disease, inpatient, night-float]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Hyperparathyroidism\n\n## Panic Card (3–6 bullets)\n- ABCs, telemetry, 12-lead ECG; treat malignant arrhythmias and check QT (hypercalcemia can shorten QT) while you treat the cause.\n- If symptomatic or severe hypercalcemia: start **0.9% saline 200–300 mL/h** (or boluses) aiming **urine output ≥100 mL/h**; reassess lung exam, JVP, I/Os.\n- Give **calcitonin 4 IU/kg SC/IM q12h** (may increase to **8 IU/kg q6–12h**); expect onset in **4–6 h** and tachyphylaxis by **48–72 h**.\n- After volume repletion, give antiresorptive if significant hypercalcemia: **zoledronic acid 4 mg IV once** (or **pamidronate 60–90 mg IV once**); onset **24–48 h**, nadir **2–4 days**.\n- If renal failure/volume overload/refractory hypercalcemia with symptoms: call ICU and nephrology for **hemodialysis with low-calcium bath**.\n- Hold contributors now: **thiazides, lithium, calcium supplements, high-dose vitamin D**, and immobilization when possible.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Hyperparathyroidism is inappropriate **PTH elevation** causing or responding to calcium/phosphate derangements: primary (adenoma/hyperplasia; **high or high-normal Ca with non-suppressed PTH**), secondary (CKD/vitamin D deficiency; **low/normal Ca with high PTH**), tertiary (autonomous PTH after long-standing CKD; **high Ca with very high PTH**).\n- What must happen now: if any hypercalcemia symptoms (confusion, dehydration, vomiting, ileus, pancreatitis, arrhythmia) or **corrected Ca ≥3.5 mmol/L (≥14 mg/dL)**, treat as an emergency—fluids first, then calcitonin, then antiresorptive; do not wait for “full workup.”\n- What can wait until daytime: definitive localization imaging (neck ultrasound/sestamibi/4D-CT) is for operative planning, not for diagnosis; the diagnosis is biochemical (Ca/PTH pattern), and inpatient imaging rarely changes overnight management.\n- Always confirm the calcium is real and interpretable: repeat Ca, obtain **ionized calcium** if albumin is abnormal/critically ill, and check **phosphate, magnesium, creatinine/eGFR**, and **25-OH vitamin D** because deficiencies can mask or worsen presentations and affect replacement decisions.\n- Guideline Must Know: Primary hyperparathyroidism evaluation should include **25-OH vitamin D** and renal/skeletal assessment (eGFR, renal imaging for stones when indicated, and bone density/vertebral assessment when available); replete vitamin D cautiously once calcium is controlled.\n- Guideline Must Know: Definitive therapy for symptomatic primary hyperparathyroidism is **parathyroidectomy**; do not delay endocrine/surgery referral for classic target-organ disease (stones, fractures/osteoporosis, recurrent pancreatitis) even if calcium is only mildly elevated.\n- Guideline Must Know: Common operative indications for otherwise “asymptomatic” primary disease include **serum calcium >0.25 mmol/L (>1.0 mg/dL) above upper limit of normal**, **age <50**, **osteoporosis/fragility fracture**, **nephrolithiasis/nephrocalcinosis**, or **eGFR <60 mL/min/1.73 m²**—document objective criteria so consults can act quickly.\n- Guideline Must Know: In CKD-related secondary hyperparathyroidism, manage trends (phosphate, calcium, PTH) rather than chasing a single PTH number; correct hyperphosphatemia (dietary + binders), address vitamin D deficiency, and avoid indiscriminate calcium loading that worsens vascular calcification risk.\n- Guideline Must Know: KDIGO CKD-MBD guidance emphasizes basing therapy on **serial** Ca/P/phosphate/PTH and avoiding routine use of active vitamin D analogs in earlier CKD unless **severe progressive** hyperparathyroidism; coordinate nephrology if inpatient changes are contemplated.\n- Guideline Must Know: For acute hypercalcemia management, start with **IV isotonic saline** and reserve loop diuretics for **treating fluid overload after rehydration** (not as primary calcium-lowering therapy); consider dialysis when severe renal/cardiac limitations prevent adequate hydration.\n- Guideline Must Know: Calcitonin provides rapid but short-lived lowering; pair it with a longer-acting strategy (e.g., bisphosphonate or definitive parathyroid management plan) so calcium does not “rebound” after **48–72 h**.\n- A key night-float pitfall is mislabeling primary hyperparathyroidism when the real diagnosis is familial hypocalciuric hypercalcemia (FHH): if PTH is non-suppressed with mild hypercalcemia, obtain **24-hour urine calcium** (and/or calcium–creatinine clearance ratio); very low urine calcium suggests FHH and surgery is usually inappropriate.\n- Another pitfall is missing tertiary hyperparathyroidism in advanced CKD: if a long-standing dialysis/transplant patient has **hypercalcemia + very high PTH**, think tertiary disease; acute stabilization is the same for symptomatic hypercalcemia, but definitive management often requires nephrology/endocrine and sometimes parathyroidectomy.\n- Medication triggers matter tonight: thiazides raise calcium, lithium shifts the PTH set point, and calcium-containing binders/vitamin D analogs can worsen hypercalcemia—hold offenders and document the rationale.\n- Don’t forget complications that change disposition: hypercalcemia can precipitate **AKI**, worsen **heart failure** via dehydration/vasoconstriction, and cause ileus and delirium—treat volume status, monitor renal function, and reassess mentation after calcium begins to fall.\n- When to call ICU/consults: call ICU for severe symptoms, arrhythmia, shock, or need for dialysis; call endocrine for suspected primary/tertiary disease with recurrent or severe hypercalcemia; call nephrology early in CKD/ESRD or if planning calcimimetic/active vitamin D changes.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **Corrected Ca ≥3.5 mmol/L (≥14 mg/dL)** or any hypercalcemia with **seizure, coma, or significant delirium** despite initial fluids/calcitonin.\n- Ventilatory support need, sustained **SBP <90 mmHg** after fluids, or malignant arrhythmia/QRS/QT changes requiring continuous management.\n- **Oliguria <0.5 mL/kg/h for 6 h**, rapidly rising creatinine, or inability to hydrate due to pulmonary edema/advanced heart failure.\n- Refractory hypercalcemia after **6–12 h** of appropriate therapy or anticipated need for **hemodialysis** (renal failure/volume intolerance).\n- Suspected tertiary hyperparathyroidism with severe hypercalcemia in CKD/ESRD, or suspected primary hyperparathyroidism with pancreatitis, stones, or fracture requiring expedited endocrine/surgery input.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Telemetry monitoring — {indication: hypercalcemia/arrhythmia-risk}\n- Order: 12-lead ECG — {now; repeat if symptoms or rhythm change}\n- Order: Basic Metabolic Panel — {q6–8h until Ca improving; include creatinine}\n- Order: Ionized calcium — {now if hypoalbuminemia/critical illness or discordant Ca}\n- Order: Magnesium and phosphate — {now; replete per protocol; recheck q12–24h}\n- Order: 25-hydroxyvitamin D and intact PTH — {now if not already resulted; outpatient follow-up planning}\n\n## ABIM Style Question 1\n### Stem\nA 62-year-old man is admitted for confusion and constipation. He is dehydrated with dry mucous membranes and mild tachycardia. Labs show corrected calcium 3.6 mmol/L (14.4 mg/dL), creatinine 2.1 mg/dL (baseline 1.0), phosphate low, and intact PTH is elevated. ECG shows shortened QT. Which is the best immediate management step?\n### Options\nA. Start furosemide infusion to increase urinary calcium excretion\nB. Begin 0.9% saline intravenous hydration and give calcitonin\nC. Order sestamibi scan to localize a parathyroid adenoma\nD. Start cinacalcet as monotherapy and reassess in the morning\nE. Administer oral bisphosphonate and stop all IV fluids\n### Correct answer\nB\n### Rationale\nIn severe symptomatic hypercalcemia, immediate therapy is **IV isotonic saline** for volume repletion plus a rapid calcium-lowering agent such as **calcitonin** while longer-acting measures are arranged. Loop diuretics are not first-line and are reserved for treating fluid overload after rehydration. Localization imaging and definitive therapy planning can occur after stabilization.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 45-year-old woman is hospitalized for cellulitis. Routine labs show calcium 2.72 mmol/L (10.9 mg/dL) and intact PTH is mildly elevated. She has no kidney stones, fractures, or symptoms. Creatinine is normal. A 24-hour urine calcium returns markedly low, and her father “always had high calcium.” What is the most appropriate next step?\n### Options\nA. Schedule parathyroidectomy for primary hyperparathyroidism\nB. Start zoledronic acid to prevent kidney stones\nC. Diagnose familial hypocalciuric hypercalcemia and avoid surgery\nD. Start high-dose calcitriol to suppress PTH\nE. Give IV saline and calcitonin urgently\n### Correct answer\nC\n### Rationale\nMild hypercalcemia with non-suppressed PTH plus **low urine calcium** and a suggestive family history is most consistent with **familial hypocalciuric hypercalcemia**, a common pitfall that can mimic primary hyperparathyroidism. The decisive discriminator is **hypocalciuria**, making surgery inappropriate and urgent calcium-lowering therapy unnecessary in an asymptomatic patient.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: In hypercalcemic crisis, what is the first-line immediate therapy? A: IV isotonic saline for volume repletion; add calcitonin for rapid short-term calcium lowering.\n- Q: What calcium level is commonly used to define severe hypercalcemia requiring urgent correction? A: Corrected calcium **≥3.5 mmol/L (≥14 mg/dL)** or any level with significant symptoms.\n- Q: What lab pattern supports primary hyperparathyroidism? A: Elevated (or inappropriately normal) PTH in the setting of elevated calcium, often with low phosphate.\n- Q: What test helps distinguish FHH from primary hyperparathyroidism in mild cases? A: 24-hour urine calcium (and/or calcium–creatinine clearance ratio); FHH typically shows very low urine calcium.\n\n## Guidelines & Key References (3–5 bullets)\n- Fifth International Workshop on Primary Hyperparathyroidism (2022) guideline PDF: https://boneresearch.ca/wp-content/uploads/2022/11/PHPT-2022guideline.pdf\n- American Association of Endocrine Surgeons (AAES) Guidelines for Definitive Management of Primary Hyperparathyroidism (2016) JAMA Surg: https://jamanetwork.com/journals/jamasurgery/fullarticle/2542667\n- KDIGO Clinical Practice Guideline Update for CKD–Mineral and Bone Disorder (CKD-MBD) (2017) PDF: https://kdigo.org/wp-content/uploads/2017/02/2017-KDIGO-CKD-MBD-GL-Update.pdf\n- Society for Endocrinology Endocrine Emergency Guidance: Acute Hypercalcaemia in Adults (2016) PDF: https://www.endocrinology.org/media/4277/emergency-guidance_acute-hypercalcaemia-in-adults.pdf\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Hypercalcemia with acuity (acute/severe) — suspected cause (primary vs tertiary hyperparathyroidism vs medication-related) — severity/organ dysfunction (delirium, ileus, pancreatitis, AKI) — objective evidence (corrected/ionized Ca, ECG QT, creatinine trend) — treatment (IV fluids, calcitonin, antiresorptive, dialysis consideration)\n- Acute kidney injury — likely pre-renal from hypercalcemia/dehydration — staging criteria (creatinine change/urine output) — objective evidence (I/Os, FeNa if obtained) — interventions (IV fluids, nephrology consult, avoidance of nephrotoxins)\n- Volume status — hypovolemia vs fluid overload risk — objective findings (vitals, exam, I/Os, weights, CXR if applicable) — monitoring plan (urine output goals, reassessment cadence)\n- Secondary/tertiary hyperparathyroidism in CKD/ESRD — CKD stage/dialysis status — biochemical abnormalities (Ca, phosphate, PTH trends) — current related meds (binders, vitamin D analogs, calcimimetic) — consult/plan for longitudinal management\n", "osteoporosis.md": "---\nfilename: osteoporosis.md\nid: osteoporosis\ntitle: Osteoporosis\nslug: osteoporosis\ntags: [endocrinology, bone-health, inpatient, night-float, geriatrics]\nlevel: resident\nestimatedtimemin: 12\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Osteoporosis\n\n## Panic Card (3–6 bullets)\n- Stabilize first if acute fracture: ABCs, treat hypotension, and maintain **SpO₂ ≥92%** (or patient-specific COPD target) while controlling pain and preventing delirium.\n- Suspected hip fracture: strict **non–weight bearing**, immobilize, give **IV opioids in small titrated doses** (avoid oversedation), and obtain **X-ray hip/pelvis** now; if negative but high suspicion, get **CT/MRI**.\n- Acute back pain after minimal trauma: do focused neuro exam; if **new weakness, saddle anesthesia, urinary retention/incontinence, or fever**, get **urgent MRI spine** and call neurosurgery/ortho immediately.\n- If on denosumab or severe CKD: check **ionized Ca²⁺**, Mg²⁺, phosphate now; treat symptomatic **hypocalcemia** promptly (e.g., **calcium gluconate IV**) and put on telemetry if QT risk.\n- Confirm Before Proceed: before IV bisphosphonate, confirm **no hypocalcemia**, **25(OH)D repletion plan**, and renal function compatible (avoid IV zoledronic acid if **eGFR <35 mL/min/1.73 m²**); ask about **jaw symptoms/recent dental extraction**.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Osteoporosis is usually not the “overnight emergency,” but its complications are: fragility hip/vertebral fractures drive night calls for pain, immobility, delirium, hypoventilation, and rapid deconditioning; your job is to stabilize, identify red flags, and prevent the next fracture.\n- Define the diagnosis clearly in the chart: osteoporosis = **T-score ≤ -2.5** at hip/spine/1/3 radius or a **low-trauma (fragility) fracture** regardless of T-score; vertebral fractures are often silent and change risk category immediately. citeturn2search31turn2search13\n- Guideline Must Know: Any **new fragility fracture in adults ≥50** signals imminent high risk for another fracture (especially within the next year); treat the fracture as a “sentinel event” and ensure secondary fracture prevention steps are started before discharge. citeturn2search13\n- On night float, “what must happen now” for a suspected fragility fracture: analgesia with careful titration, fall/delirium precautions, early mobilization planning (PT/OT in AM), and correct reversible contributors (hypocalcemia, vitamin D deficiency, sedatives, hypotension).\n- “What can wait until morning” (but should be teed up): formal fracture risk stratification, definitive long-term agent selection, DXA scheduling, and outpatient follow-up; you can still place key labs and consults tonight so the team can act quickly.\n- Guideline Must Know: In postmenopausal osteoporosis at high fracture risk, first-line pharmacotherapy is typically an oral or IV bisphosphonate (e.g., alendronate, risedronate, zoledronic acid), with periodic reassessment after **3–5 years** to consider a drug holiday if risk becomes low-to-moderate. citeturn2search25\n- Guideline Must Know: For very high risk (e.g., multiple vertebral fractures, very low BMD), consider an anabolic or dual-action strategy (teriparatide/abaloparatide; romosozumab in selected patients) rather than “bisphosphonate-only” sequencing. citeturn2search25turn2search31\n- Guideline Must Know: Do not “hold” denosumab indefinitely; stopping or delaying beyond the dosing interval can lead to rapid bone loss and rebound vertebral fractures—if denosumab cannot be continued, transition planning (often to a bisphosphonate) is required. citeturn2search31turn2search25\n- Practical inpatient dosing anchors (do not start blindly overnight): alendronate **70 mg PO weekly** (requires upright posture and no esophageal contraindications), zoledronic acid **5 mg IV yearly** (avoid if **eGFR <35**), denosumab **60 mg SC q6 months** (ensure **Ca²⁺/vitamin D** adequate), teriparatide **20 mcg SC daily** (limit total duration; avoid in certain high-risk bone malignancy contexts). citeturn2search25turn2search31\n- Guideline Must Know: Calcium and vitamin D are foundational with any therapy—target total calcium intake around **1,200 mg/day** (diet + supplements) for most older adults and vitamin D intake **800–1,000 IU/day** (or repletion if deficient), while avoiding hypercalcemia and nephrolithiasis risk. citeturn2search13turn2search31\n- Secondary osteoporosis is common in inpatients: flag chronic **glucocorticoids**, hyperthyroidism, malabsorption, hypogonadism, CKD-MBD, myeloma, and anticonvulsants; order basic evaluation tonight if it will change inpatient decisions (e.g., unexplained anemia/renal injury/hypercalcemia).\n- Night-float pitfalls: starting oral bisphosphonate in a delirious patient who cannot sit upright; giving IV bisphosphonate without checking **Ca²⁺/vitamin D**; missing spinal cord compression; overlooking atypical femur fracture clues (prodromal thigh pain, cortical “beaking”).\n- ICU/consult thinking: ortho/trauma for hip fracture and most fragility long-bone fractures; neurosurgery/ortho spine for neuro deficits; endocrine/geriatrics for very high risk sequencing or complex secondary causes; nephrology for advanced CKD/ESRD before antiresorptives.\n- Guideline Must Know: Screening guidance (outpatient) supports DXA in women **≥65** and younger postmenopausal women at increased risk; in the hospital, use this to justify prioritizing follow-up DXA and risk tool documentation rather than to delay treatment after a fragility fracture. citeturn2search11\n- Guideline Must Know: In advanced CKD (especially dialysis), osteoporosis meds intersect with CKD-MBD; antiresorptives can be harmful if underlying bone turnover disorders are not addressed—coordinate with nephrology and trend **Ca²⁺, phosphate, PTH**. citeturn2search24\n- Discharge readiness pearls: ensure a clear plan for fracture prevention (vitamin D/calcium, fall risk mitigation, PT/OT, medication reconciliation removing sedatives when feasible) and document why/when pharmacotherapy will start (or why deferred).\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **New focal neurologic deficit**, saddle anesthesia, or urinary retention/incontinence after vertebral compression fracture concern → urgent spine imaging and neurosurgery/ortho spine consult.\n- Hip fracture with **hemodynamic instability**, escalating oxygen requirement, or uncontrolled pain/delirium preventing safe care → ICU/step-down evaluation and aggressive multimodal management.\n- Suspected metabolic complication requiring higher acuity: **symptomatic hypocalcemia** (tetany, seizures, arrhythmia/QT prolongation) or rapidly worsening electrolytes in severe CKD after antiresorptive exposure.\n- Pathologic fracture concern (minimal trauma + **lytic lesions**, unexplained anemia, hypercalcemia, or weight loss) → urgent oncology/hematology evaluation.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Basic metabolic panel — {now; include Ca, creatinine, bicarbonate}\n- Order: Calcium, ionized — {now; repeat in 6–12 h if abnormal}\n- Order: 25-hydroxyvitamin D — {now}\n- Order: Phosphorus and magnesium — {now}\n- Order: Parathyroid hormone (intact) — {if CKD stage ≥3b, unexplained Ca abnormality, or multiple fractures}\n- Order: Imaging: X-ray hip/pelvis or spine — {site; indication; STAT if suspected acute fracture}\n\n## ABIM Style Question 1\n### Stem\nA 72-year-old woman is admitted with community-acquired pneumonia. Her history includes osteoporosis treated with denosumab 60 mg subcutaneously every 6 months for 3 years. Her last injection was 7 months ago, and she missed her scheduled dose due to transportation issues. She is clinically improving and expected to discharge in 2 days. Labs show calcium 2.25 mmol/L (normal), creatinine stable (eGFR 58 mL/min/1.73 m²). Which is the best next step to reduce her near-term fracture risk?\n\n### Options\nA. Stop denosumab and restart it at the next clinic visit in 3 months  \nB. Administer denosumab now (or arrange administration before discharge) and ensure calcium/vitamin D adequacy  \nC. Switch immediately to calcitonin nasal spray as a bridge  \nD. Start a bisphosphonate holiday because she has been treated for more than 3 years  \nE. Defer all osteoporosis therapy until a DXA scan is repeated as an outpatient  \n\n### Correct answer\nB\n\n### Rationale\nDenosumab should not be delayed substantially beyond the scheduled interval because interruption can lead to rapid bone loss and increased vertebral fracture risk; giving the dose now (with adequate calcium/vitamin D and normal calcium) is the most appropriate action. citeturn2search31turn2search25\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 76-year-old woman with end-stage kidney disease on hemodialysis is admitted after a low-trauma vertebral compression fracture. The admitting team plans to give zoledronic acid 5 mg IV during this hospitalization “to treat osteoporosis.” Her labs show calcium 2.05 mmol/L (low-normal), phosphate elevated, and she has long-standing secondary hyperparathyroidism. Which is the best next step tonight?\n\n### Options\nA. Administer zoledronic acid 5 mg IV now to prevent additional fractures  \nB. Administer denosumab 60 mg SC now because it is not renally cleared  \nC. Hold antiresorptive therapy and consult nephrology to evaluate CKD-MBD (trend Ca²⁺/phosphate/PTH) before selecting therapy  \nD. Start oral alendronate 70 mg weekly because it is safer than IV therapy in CKD  \nE. Start high-dose calcium supplementation alone and avoid any osteoporosis-directed therapy permanently  \n\n### Correct answer\nC\n\n### Rationale\nIn dialysis patients, fracture risk often reflects CKD-MBD with abnormal bone turnover; antiresorptives may be inappropriate or harmful without evaluating and managing CKD-MBD first, and coordinated nephrology guidance is recommended. The pitfall is treating presumed “primary osteoporosis” without accounting for **ESRD-related bone disease**. citeturn2search24\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What T-score threshold at the hip or spine meets the densitometric definition of osteoporosis? A: A **T-score ≤ -2.5** at the lumbar spine, femoral neck, or total hip.\n- Q: After how many years of bisphosphonate therapy should fracture risk be reassessed to consider a holiday in lower-risk patients? A: Reassess after **3–5 years** of therapy. citeturn2search25\n- Q: What is the key safety check before giving denosumab in the hospital? A: Ensure **no hypocalcemia** and confirm **calcium/vitamin D adequacy** because denosumab can worsen hypocalcemia. citeturn2search31\n- Q: Which inpatient red-flag symptoms with acute back pain mandate urgent spine MRI? A: **New weakness, saddle anesthesia, bowel/bladder dysfunction, or fever**.\n\n## Guidelines & Key References (3–5 bullets)\n- Bone Health and Osteoporosis Foundation (BHOF). The clinician’s guide to prevention and treatment of osteoporosis. 2022. https://cdn.reachmd.com/uploads/bhof_%28formerly_nof%29_oi_clinicians_guide_2022.pdf citeturn2search13\n- Endocrine Society. Pharmacological Management of Osteoporosis in Postmenopausal Women (guideline resource page). 2020. https://www.endocrine.org/clinical-practice-guidelines/osteoporosis-in-postmenopausal-women citeturn2search25\n- American Association of Clinical Endocrinology (AACE). Clinical Practice Guideline for the Diagnosis and Treatment of Postmenopausal Osteoporosis. 2020. https://pro.aace.com/clinical-guidance/2020-clinical-practice-guidelines-diagnosis-and-treatment-postmenopausal citeturn2search31\n- U.S. Preventive Services Task Force (USPSTF). Osteoporosis to Prevent Fractures: Screening (final recommendation). 2025. https://www.uspreventiveservicestaskforce.org/Page/Document/UpdateSummaryFinal/osteoporosis-screening citeturn2search11\n- KDIGO. Clinical Practice Guideline Update for CKD–Mineral and Bone Disorder (CKD-MBD). 2017. https://kdigo.org/wp-content/uploads/2017/02/2017-KDIGO-CKD-MBD-GL-Update.pdf citeturn2search24\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Osteoporosis, {new or known}; acuity {chronic}; evidence {T-score if known or prior DXA date} and/or {fragility fracture site/date}\n- Fragility fracture: {site} with {imaging modality/result}; mechanism {low-trauma fall from standing/atraumatic}; associated complications {immobility, delirium, hypoventilation}\n- Vertebral compression fracture: {level} with {neuro status normal vs deficit}; red flags {bowel/bladder changes yes/no}; pain severity {objective analgesic needs}\n- Secondary osteoporosis evaluation initiated: {Ca²⁺/25(OH)D/PTH/TSH/CBC/CMP ordered}; suspected cause {glucocorticoids/CKD-MBD/malabsorption/other}\n- Treatment/monitoring supporting severity: {fall precautions, PT/OT plan, calcium/vitamin D plan, consults placed, telemetry if QT/hypocalcemia}\n", "dyslipidemia.md": "---\nfilename: dyslipidemia.md\nid: dyslipidemia\ntitle: Dyslipidemia\nslug: dyslipidemia\ntags: [cardiology, preventive-medicine, inpatient, night-float]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Dyslipidemia\n\n## Panic Card (3–6 bullets)\n- If severe hypertriglyceridemia with pancreatitis concern (epigastric pain + lipase ↑): NPO, aggressive IV crystalloids, pain control, treat precipitant; if **TG ≥1000 mg/dL** (or **≥500 mg/dL** with pancreatitis/high-risk features), start rapid TG-lowering strategy (e.g., **IV insulin infusion** with **hourly glucose** and **K⁺** checks). citeturn2search19\n- If suspected statin-associated rhabdomyolysis (new diffuse myalgias/weakness, dark urine, AKI): stop statin and interacting drugs now; send **CK**, **creatinine**, **K⁺**, **urinalysis**; start IV fluids targeting **UOP ≥200 mL/h** if not contraindicated; manage hyperkalemia per sequence if present. citeturn2search8turn2search18\n- In ACS admission: ensure a **high-intensity statin** is ordered unless contraindicated (e.g., atorvastatin **80 mg** or rosuvastatin **20–40 mg**) and document contraindications if holding. citeturn2search8turn2search1\n- If acute liver injury concern on lipid therapy (jaundice, INR ↑, marked transaminases): hold potentially hepatotoxic lipid agents; evaluate alternative causes and hemodynamic injury; avoid re-challenge until clarified. citeturn2search8turn2search18\n- Confirm Before Proceed: if ordering long-acting lipid therapy changes (PCSK9 inhibitor/inclisiran initiation, permanent statin discontinuation), ensure indication, baseline labs, and discharge follow-up plan are documented before irreversible or costly therapy is started. citeturn2search18turn2search13\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Most inpatient “dyslipidemia” pages are really about risk reduction after an event (ACS/stroke), medication safety (drug interactions, rhabdo, hepatic injury), or severe hypertriglyceridemia; routine primary-prevention titration can usually wait until daylight rounds unless discharge is imminent. citeturn2search8turn2search19\n- Guideline Must Know: In clinical ASCVD (e.g., prior MI, symptomatic PAD, ischemic stroke), use **high-intensity statin** or maximally tolerated statin; typical goal is substantial LDL-C reduction with escalation if LDL-C remains above guideline thresholds on maximal statin. citeturn2search8turn2search18\n- Guideline Must Know: For very-high-risk ASCVD, consider adding nonstatin therapy when LDL-C remains **≥55 mg/dL** on maximally tolerated statin (and **≥70 mg/dL** for ASCVD not at very-high risk), prioritizing ezetimibe and/or PCSK9-directed therapy per ACC pathways. citeturn2search18turn2search13\n- Guideline Must Know: If baseline LDL-C is **≥190 mg/dL** (severe hypercholesterolemia) and not due to secondary causes, initiate **high-intensity statin** (or maximally tolerated), and plan stepwise add-on therapy if LDL-C remains markedly elevated. citeturn2search8turn2search18\n- Guideline Must Know: In adults with diabetes (typically age 40–75), at least **moderate-intensity statin** is recommended; consider **high-intensity** when multiple risk enhancers or higher ASCVD risk features are present (e.g., long duration, CKD, multiple risk factors). citeturn2search8turn2search18\n- Guideline Must Know: Persistent hypertriglyceridemia management begins with secondary-cause control (uncontrolled diabetes, alcohol, hypothyroidism, meds) and statin optimization for ASCVD risk; triglyceride-specific therapy is added based on TG level and risk context. citeturn2search19turn2search8\n- Guideline Must Know: For pancreatitis prevention, treat **TG ≥500 mg/dL** as high risk and **TG ≥1000 mg/dL** as very high risk—use strict dietary fat restriction, address secondary causes, and consider fibrate/omega-3 strategy; in acute pancreatitis with very high TG, insulin-based rapid lowering can be appropriate with close monitoring. citeturn2search19turn2search20\n- What must happen now on nights: identify and stop dangerous interactions (e.g., statins with strong CYP3A4 inhibitors for simvastatin/atorvastatin), check CK/creatinine when muscle symptoms occur, and correct precipitants (dehydration, sepsis, hypothyroidism) that amplify statin myotoxicity risk. citeturn2search8turn2search18\n- What can wait until morning: initiating PCSK9 inhibitor/inclisiran or complex outpatient risk discussions; ordering specialized lipid testing (Lp(a), ApoB) unless it affects immediate inpatient planning; routine “fasting vs nonfasting” lipid nuance when not tied to discharge/ACS bundle. citeturn2search13turn2search18\n- Night-float pitfall: reflexively holding statins for mild AST/ALT bumps—true severe statin hepatotoxicity is uncommon; prioritize clinical context (shock liver, biliary disease, viral hepatitis) and hold/restart decisions with objective criteria and clear documentation. citeturn2search8turn2search18\n- Another pitfall: missing secondary causes of high TG (new DKA/HHS, alcohol withdrawal, steroids, propofol infusion, estrogen therapy); if TG is very high, check **A1c/glucose**, **TSH**, medication list, and consider holding TG-raising agents when feasible. citeturn2search19turn2search18\n- When to call cardiology: recent ACS with uncertainty about lipid intensification at discharge, suspected familial hypercholesterolemia (very high LDL-C or strong family history), or inability to reach LDL-C thresholds despite maximal statin plus ezetimibe (consider PCSK9-directed therapy). citeturn2search13turn2search8\n- When to call endocrinology/GI: hypertriglyceridemia-associated pancreatitis, recurrent very high TG despite inpatient control of diabetes/alcohol, or need for insulin infusion protocols specifically for TG lowering and transition planning. citeturn2search19turn2search20\n- Statin intolerance approach on nights: document symptom timing, severity, and objective data; if CK is normal and symptoms mild, consider temporary hold and daytime reassessment rather than labeling “all statins contraindicated,” which can harm secondary prevention. citeturn2search18turn2search8\n- Discharge reliability point: if you start or intensify statin, ensure a follow-up plan for repeat lipids in **4–12 weeks** and monitoring for side effects; incomplete handoff is a common reason LDL goals are never reassessed. citeturn2search8turn2search18\n- Chronic coronary disease context: lipid therapy is foundational to reduce future events; ensure secondary-prevention bundles (high-intensity statin, add-on therapy when thresholds persistently exceeded) are aligned with contemporary multisociety guidance. citeturn2search1turn2search2\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Severe hypertriglyceridemia with pancreatitis or impending organ dysfunction: **TG ≥1000 mg/dL** plus abdominal pain/lipase elevation, lactic acidosis, hypotension, or escalating oxygen needs (consider ICU for insulin infusion monitoring). citeturn2search19\n- Suspected rhabdomyolysis: **CK ≥5000 U/L** or rising creatinine/oliguria, **K⁺ ≥6.0 mmol/L**, ventricular arrhythmia, or severe metabolic acidosis (ICU/renal consult as indicated). citeturn2search18turn2search8\n- ACS/stroke admission without ability to take oral meds (NPO/aspiration risk) or with complex contraindications to statin/nonstatin therapy requiring urgent specialty input before discharge. citeturn2search1turn2search8\n- Acute liver failure pattern while on lipid therapy (jaundice + **INR ≥1.5** or encephalopathy) or concern for drug-induced liver injury requiring GI/hepatology evaluation. citeturn2search2turn2search18\n\n## Orders to Place Now (3–6 bullets)\n- Order: Lipid panel (nonfasting acceptable unless {TG very high/diagnostic need}) — {timing: now vs AM draw} {fasting: yes/no} citeturn2search8turn2search19\n- Order: Comprehensive metabolic panel — {frequency: once vs q12–24h} {focus: creatinine, K⁺, bicarbonate} citeturn2search18\n- Order: Creatine kinase (CK) — {indication: myalgias/weakness/dark urine} {repeat: q12–24h if rising} citeturn2search18\n- Order: Hepatic function panel — {baseline before intensifying lipid therapy} {repeat interval: 48–72h if concern} citeturn2search8turn2search18\n- Order: Regular insulin infusion (for hypertriglyceridemia lowering) — {start rate: 0.05–0.1 units/kg/h} {dextrose protocol: per glucose} {glucose checks: q1h} {K⁺ checks: q4h} citeturn2search19turn2search20\n\n## ABIM Style Question 1\n### Stem\nA 62-year-old man is admitted with non–ST-elevation myocardial infarction. He has a history of hypertension and is not taking lipid-lowering therapy. Initial labs show LDL-C 142 mg/dL and triglycerides 180 mg/dL. He is hemodynamically stable and tolerating oral intake. Which intervention is most appropriate to start tonight to reduce his future cardiovascular risk?\n### Options\nA. Start atorvastatin 80 mg daily  \nB. Start gemfibrozil 600 mg twice daily  \nC. Start cholestyramine 4 g twice daily  \nD. Start niacin extended-release 2 g nightly  \nE. Defer lipid therapy until an outpatient fasting lipid panel is obtained\n### Correct answer\nA\n### Rationale\nHigh-intensity statin therapy is recommended for secondary prevention in patients with clinical ASCVD, including those hospitalized with ACS, and should be initiated as early as feasible during the hospitalization. citeturn2search8turn2search1 Nonstatin agents are considered only after maximally tolerated statin therapy if LDL-C remains above guideline thresholds. citeturn2search13turn2search18\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 70-year-old woman with CAD is admitted for pneumonia and is started on clarithromycin. She takes simvastatin 40 mg nightly at home. On hospital day 2 she develops diffuse muscle pain and weakness; creatinine rises from 0.9 to 1.6 mg/dL, and CK returns at 9,800 U/L. Which is the best next step?\n### Options\nA. Continue simvastatin and add ezetimibe  \nB. Hold simvastatin, stop clarithromycin if possible, and start aggressive IV fluids with close electrolyte monitoring  \nC. Switch simvastatin to atorvastatin 80 mg and continue clarithromycin  \nD. Add fenofibrate to lower triglycerides quickly  \nE. Give intramuscular ketorolac and reassess in the morning\n### Correct answer\nB\n### Rationale\nThis presentation is consistent with statin-associated rhabdomyolysis, and the key pitfall is a high-risk drug interaction (simvastatin with a strong CYP3A4 inhibitor) that increases statin exposure; immediate statin cessation and supportive care to prevent renal failure is indicated. citeturn2search18turn2search8 Addressing the interacting medication is part of the acute management to prevent recurrence and worsening toxicity. citeturn2search18\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What LDL-C threshold on maximally tolerated statin is commonly used to consider adding nonstatin therapy in very-high-risk ASCVD per ACC pathways? A: **LDL-C ≥55 mg/dL**. citeturn2search13turn2search18\n- Q: What triglyceride level is considered very high and associated with pancreatitis risk requiring urgent secondary-cause management and possible rapid lowering strategies? A: **TG ≥1000 mg/dL**. citeturn2search19\n- Q: In adults with clinical ASCVD, what statin intensity is generally recommended if tolerated? A: **High-intensity statin** (or maximally tolerated). citeturn2search8\n- Q: Name one classic medication interaction that increases myopathy risk with simvastatin. A: Strong CYP3A4 inhibitors such as **clarithromycin**. citeturn2search18\n\n## Guidelines & Key References (3–5 bullets)\n- 2018 AHA/ACC Multisociety Guideline on the Management of Blood Cholesterol (executive summary; Circulation 2019) — https://www.ahajournals.org/doi/pdf/10.1161/CIR.0000000000000624 citeturn2search9\n- 2022 ACC Expert Consensus Decision Pathway on Nonstatin Therapies for LDL-C Lowering — https://www.acc.org/Guidelines/Guidelines/2022/08/25/13/04/Role-of-Nonstatin-Therapies-for-LDL-Cholesterol-Lowering-in-Atherosclerotic-CV-Disease-Risk-Management citeturn2search13\n- 2021 ACC Expert Consensus Decision Pathway on Persistent Hypertriglyceridemia — https://www.acc.org/Guidelines/Guidelines/2021/07/28/12/16/ASVD-Risk-Reduction-in-Patients-With-Persistent-Hypertriglyceridemia-ECDP citeturn2search19\n- 2023 AHA/ACC/ACCP/ASPC/NLA/PCNA Guideline for Chronic Coronary Disease — https://www.acc.org/Guidelines/Hubs/Chronic-Coronary-Disease citeturn2search1\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Hypertriglyceridemia — {acuity: severe/very severe} {peak TG: __ mg/dL} {secondary cause: uncontrolled diabetes/alcohol/medication/other} {complication: pancreatitis yes/no with lipase/imaging} {treatment: NPO/IV fluids/insulin infusion/other}. citeturn2search19\n- Statin-associated myopathy — {type: myalgia/myositis/rhabdomyolysis} {CK: __ U/L} {renal injury: creatinine __ from __} {trigger: interacting drug/AKI/sepsis/hypothyroid} {actions: statin held, interacting drug stopped, IV fluids}. citeturn2search18\n- Clinical ASCVD risk state — {event: ACS/stroke/PAD} {date/context} {lipid plan: high-intensity statin started/continued or contraindication documented} {add-on plan if LDL above threshold} {follow-up timing}. citeturn2search8turn2search13\n- Drug-induced liver injury concern — {pattern: hepatocellular/cholestatic/mixed} {AST/ALT: __} {bilirubin: __} {INR: __} {suspected agent: __} {therapy held and evaluation initiated}. citeturn2search2turn2search18\n", "obesity-metabolic-syndrome.md": "---\nfilename: obesity-metabolic-syndrome.md\nid: obesity-metabolic-syndrome\ntitle: Obesity & Metabolic Syndrome\nslug: obesity-metabolic-syndrome\ntags: [endocrinology, obesity, metabolic-syndrome, inpatient, night-float, respiratory-failure]\nlevel: resident\nestimatedtimemin: 20\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Obesity & Metabolic Syndrome\n\n## Panic Card (3–6 bullets)\n- If somnolent/hypoventilating: airway positioning, continuous pulse oximetry + capnography if available, get ABG/VBG now; avoid escalating oxygen alone if hypercapnic risk. citeturn2search13\n- Start noninvasive ventilation for suspected OHS/OSA decompensation: **BiPAP IPAP 12–16 cmH₂O / EPAP 5–8 cmH₂O**, titrate to **RR <24/min** and improving pH/PaCO₂; call ICU/RT early. citeturn2search13\n- Treat opioid/sedative contribution: **naloxone 0.04 mg IV**, repeat q2–3 min to adequate ventilation (avoid abrupt withdrawal), hold sedatives; recheck gas in **30–60 min**. citeturn2search13\n- Hyperglycemia harming outcomes: if persistent **BG >180 mg/dL (10 mmol/L)**, start scheduled insulin (basal + prandial/correction) rather than sliding scale alone (unless very mild/new). citeturn2search7turn2search11\n- Escalate VTE prevention immediately in immobility/high risk; ensure correct anticoagulant dosing strategy in severe obesity and renal dysfunction (do not “set and forget”). citeturn2search19\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Obesity on nights is less about “weight counseling” and more about hidden physiology: difficult airway, rapid desaturation, OSA/OHS hypercapnia, higher VTE risk, and medication/diagnostic errors (e.g., inadequate imaging, underdosing anticoagulants, and missing respiratory failure until late). citeturn2search13turn2search19\n- Metabolic syndrome is a risk cluster (not a single diagnosis) that predicts ASCVD and diabetes; harmonized criteria are **≥3 of 5**: increased waist circumference (region/ethnicity cut points), **TG ≥150 mg/dL (1.7 mmol/L)**, **HDL <40 mg/dL (men) or <50 mg/dL (women)**, **BP ≥130/85 mmHg or on therapy**, **fasting glucose ≥100 mg/dL (5.6 mmol/L) or on therapy**. citeturn2search5turn2search1\n- Guideline Must Know: Obesity hypoventilation syndrome (OHS) screening: in obese patients with sleep-disordered breathing and low–moderate suspicion, a **serum bicarbonate <27 mmol/L** makes OHS unlikely; if **≥27 mmol/L** or high suspicion, obtain **ABG** to confirm awake hypercapnia (**PaCO₂ ≥45 mmHg**). citeturn2search13\n- Guideline Must Know: Hospitalized patients with respiratory failure suspected due to OHS should be managed with positive airway pressure; if stabilized for discharge but still suspected OHS, discharge with **noninvasive ventilation** until outpatient diagnostic testing and PAP titration, ideally within **2–3 months** (do not discharge with oxygen-only if hypercapnia risk persists). citeturn2search13\n- Guideline Must Know: Inpatient hyperglycemia management targets begin with recognizing risk: check A1C if none in prior 3 months when diabetes or random **BG >140 mg/dL (7.8 mmol/L)** on admission; address glucocorticoids, enteral feeds, infection, and stress hyperglycemia explicitly in the plan. citeturn2search7turn2search11\n- Guideline Must Know: For noncritically ill inpatients, use scheduled insulin when glucose is persistently **>180 mg/dL (10 mmol/L)**; avoid sliding scale as sole therapy except possibly transient/mild new hyperglycemia with close monitoring; prioritize hypoglycemia prevention and consistent nutrition assessment. citeturn2search7turn2search11\n- Guideline Must Know: Obesity classification in adults uses **BMI ≥30 kg/m²** for obesity; BMI and waist circumference help risk-stratify and guide intensity of interventions and documentation (important for peri-procedural sedation and discharge planning). citeturn2search19\n- Guideline Must Know: Lifestyle/weight-loss interventions are foundational; in OHS, sustained **25%–30%** weight loss is most associated with resolution (often requiring bariatric-level interventions), which matters when counseling on follow-up after an OHS admission. citeturn2search13\n- What must happen now (night shift): if unexplained hypoxemia, somnolence, morning headaches, or high baseline bicarbonate, assume OSA/OHS until proven otherwise; get ABG/VBG, start NIV early, and avoid “more oxygen” reflex that can worsen CO₂ retention in OHS. citeturn2search13\n- What must happen now (night shift): anticipate rapid desaturation and difficult ventilation in obesity; if deterioration, call anesthesia/ICU early, prepare for ramped positioning, and ensure appropriate equipment (large BP cuff, longer needles, bariatric bed) to avoid false vitals and procedure delays. citeturn2search19\n- What must happen now (night shift): correct insulin strategy prevents complications: if NPO or poor intake, hold prandial insulin but continue basal (unless clear reason to reduce) and use correctional insulin; re-evaluate after steroids or tube feeds start/stop to avoid severe swings. citeturn2search7turn2search11\n- What can wait until day team: formal metabolic syndrome counseling, long-term anti-obesity pharmacotherapy initiation, and outpatient bariatric referrals are usually discharge-planning items unless they affect immediate safety (e.g., ensuring PAP/NIV access after hypercapnic event). citeturn2search13turn2search19\n- Common pitfall: labeling all dyspnea as “OSA” and ignoring hypercapnia; OHS is defined by obesity with awake hypercapnia and has higher short-term mortality when undertreated—treat the physiology (ventilation) rather than oxygen saturation alone. citeturn2search13\n- Common pitfall: missing metabolic drivers of hyperglycemia—steroids/enteral feeds raise insulin needs; stopping steroids/feeds abruptly raises hypoglycemia risk, so proactively down-titrate insulin and increase monitoring. citeturn2search11turn2search7\n- Consult considerations: ICU for worsening hypercapnia/acidemia or NIV failure; sleep/pulm for suspected OHS/OSA discharge planning; endocrine for brittle hyperglycemia, high insulin requirements, steroid/tube-feed complexity; cardiology if metabolic syndrome features present with acute chest pain or hypertensive emergency. citeturn2search13turn2search7\n- Confirm Before Proceed: before escalating oxygen to high flow or nonrebreather in a suspected OHS patient, confirm ventilation status (ABG/VBG, end-tidal CO₂ if available) and prioritize NIV if hypercapnic; oxygen without ventilation can mask deterioration. citeturn2search13\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- pH **<7.30** or rising PaCO₂ despite NIV, inability to protect airway, or escalating work of breathing needing intubation consideration. citeturn2search13\n- Refractory hypoxemia needing **FiO₂ ≥0.60** or rapidly increasing oxygen requirement, especially with altered mental status. citeturn2search13\n- Recurrent severe hypoglycemia or persistent hyperglycemia **>300 mg/dL (16.7 mmol/L)** with ketones/anion gap concern, or insulin needs exceeding safe ward protocols. citeturn2search7turn2search11\n- Suspected PE/acute coronary syndrome with hemodynamic instability, syncope, or escalating chest pain in high-risk metabolic syndrome phenotype. citeturn2search5turn2search1\n\n## Orders to Place Now (3–6 bullets)\n- Order: ABG (or VBG if ABG unavailable) — {indication: somnolence/hypoxemia/opioids} {repeat_in: 30–60 min after NIV/antidote}\n- Order: Noninvasive ventilation (BiPAP) — {IPAP: 12–16} {EPAP: 5–8} {FiO2: titrate to SpO2 goal} {SpO2_goal: 88–92% if hypercapnia risk, otherwise per condition}\n- Order: Continuous pulse oximetry + capnography (if available) — {location: floor/stepdown} {alarm_limits: SpO2/RR}\n- Order: Point-of-care glucose monitoring — {frequency: q4–6h or before meals/bedtime} {notify_thresholds: <70 or >250 mg/dL}\n- Order: Basal-bolus-correction insulin regimen — {basal_type: glargine} {starting_TDD_units_per_kg: 0.3–0.5} {adjust_for: CKD/elderly/steroids} {correction_scale: low/medium/high}\n- Order: VTE prophylaxis anticoagulant — {agent: heparin or enoxaparin} {renal_function: CrCl} {body_weight_kg: } {contraindications: bleed/thrombocytopenia}\n\n## ABIM Style Question 1\n\n### Stem\nA 54-year-old man with BMI 46 kg/m² is admitted for cellulitis. Overnight he becomes increasingly somnolent with shallow breathing after receiving opioids for pain. Vitals: T 37.2°C, HR 96, BP 138/84 mmHg, RR 10/min, SpO₂ 90% on 4 L/min nasal cannula. Labs show serum bicarbonate 33 mmol/L. Which is the best next step to evaluate suspected obesity hypoventilation syndrome contributing to his deterioration?\n\n### Options\nA. Increase oxygen to a nonrebreather mask and reassess in 1 hour  \nB. Obtain an arterial blood gas to assess for daytime hypercapnia  \nC. Order a D-dimer to evaluate for pulmonary embolism  \nD. Start diuretics for presumed heart failure exacerbation  \nE. Schedule outpatient polysomnography after discharge without additional inpatient testing\n\n### Correct answer\nB\n\n### Rationale\nIn obese patients with sleep-disordered breathing and possible OHS, a **serum bicarbonate ≥27 mmol/L** warrants confirmation of hypercapnia with **arterial blood gas** testing, especially when clinical suspicion is high due to somnolence and hypoventilation. citeturn2search13 Oxygen escalation alone can mask worsening ventilation and delay definitive support. citeturn2search13\n\n## Second ABIM Style Case (Pitfall Variant)\n\n### Stem\nA 62-year-old woman with BMI 52 kg/m² and known severe obstructive sleep apnea is hospitalized for pneumonia. She is improving and ready for discharge, but on the last night she developed acute-on-chronic hypercapnic respiratory failure requiring BiPAP. This morning she is awake and stable on room air with SpO₂ 93%, but her ABG overnight showed PaCO₂ 58 mmHg. The team plans to discharge her home with supplemental oxygen only “because her saturation is fine.” What is the best discharge plan?\n\n### Options\nA. Discharge with supplemental oxygen only and stop BiPAP since SpO₂ is normal  \nB. Discharge with empiric noninvasive ventilation until outpatient diagnostic evaluation and PAP titration  \nC. Discharge with no respiratory support and arrange outpatient follow-up as needed  \nD. Discharge with inhaled bronchodilators and steroids for presumed COPD  \nE. Keep inpatient until she loses 10% body weight\n\n### Correct answer\nB\n\n### Rationale\nFor hospitalized patients with respiratory failure and suspected OHS, guideline-based care supports discharge with **noninvasive ventilation** until outpatient diagnostic procedures and PAP titration can be completed (ideally within **2–3 months**). citeturn2search13 The pitfall is relying on **SpO₂ alone**; oxygen without ventilatory support may worsen hypercapnia and miss ongoing ventilatory failure risk. citeturn2search13\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What serum bicarbonate cutoff can help exclude OHS when suspicion is low to moderate? A: **<27 mmol/L** makes OHS unlikely in that context. citeturn2search13\n- Q: In noncritically ill hospitalized adults, when is scheduled insulin preferred over correction-only insulin? A: When glucose is persistently **>180 mg/dL (10 mmol/L)**. citeturn2search7turn2search11\n- Q: How many abnormal criteria define metabolic syndrome using harmonized criteria? A: **At least 3 of 5** criteria. citeturn2search5\n- Q: What BMI threshold defines obesity in adults in major cardiology obesity guidance? A: **BMI ≥30 kg/m²**. citeturn2search19\n\n## Guidelines & Key References (3–5 bullets)\n- ADA Standards of Care in Diabetes—2026: Diabetes Care in the Hospital (2026) https://diabetesjournals.org/care/article/49/Supplement_1/S339/163925/16-Diabetes-Care-in-the-Hospital-Standards-of-Care citeturn2search7\n- Endocrine Society: Management of Hyperglycemia in Hospitalized Adult Patients in Non-Critical Care Settings (2022) https://www.endocrine.org/clinical-practice-guidelines/inpatient-hyperglycemia-guideline-resources citeturn2search11\n- American Thoracic Society: Evaluation and Management of Obesity Hypoventilation Syndrome (2019) https://www.atsjournals.org/doi/10.1164/rccm.201905-1071ST citeturn2search13\n- AHA/ACC/TOS: Guideline for the Management of Overweight and Obesity in Adults (2013) https://www.acc.org/guidelines/hubs/overweight-and-obesity citeturn2search19\n- Joint Interim Statement: Harmonizing the Metabolic Syndrome (2009) https://www.ahajournals.org/doi/pdf/10.1161/circulationaha.109.192644?download=true citeturn2search5\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Morbid obesity (class {I/II/III}) with BMI {value} kg/m²; complicating factors {OSA/OHS/difficult airway/limited mobility}\n- Acute respiratory failure, type {hypercapnic/hypoxemic} due to {suspected OHS/OSA + opioid effect/pneumonia}; severity criteria {pH, PaCO₂, RR, mental status}; treatment {BiPAP settings, naloxone, monitoring}\n- Stress hyperglycemia vs diabetes (type {known/new}); objective evidence {BG values, A1C if available}; treatment {basal-bolus regimen, correction scale, monitoring frequency}\n- Metabolic syndrome (meets {3+ criteria}); list criteria met {BP, TG, HDL, glucose, waist}; associated acute issue {hypertensive urgency/chest pain}\n- VTE risk high due to {immobility + obesity}; prophylaxis {agent/dose} with renal function {CrCl} and bleeding risk assessment {platelets/bleed history}\n"};
