<script>
function parseMD(text,filename){
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  if(text.trim().startsWith('<!'))return{id:filename.replace(/\.md$/,''),title:filename.replace(/\.md$/,'').replace(/-/g,' '),tags:[],sections:{},quizzes:[],micros:[],refs:[]};
  var lines=text.split('\n'),id=filename.replace(/\.md$/,''),title=id.replace(/-/g,' '),tags=[],i,line;
  var inFM=false,fmEnd=0;
  for(i=0;i<lines.length;i++){line=lines[i].trim();if(i===0&&line==='---'){inFM=true;continue;}if(inFM&&line==='---'){fmEnd=i+1;break;}if(inFM){if(line.indexOf('title:')===0)title=line.substring(6).trim().replace(/^["']|["']$/g,'');if(line.indexOf('tags:')===0){var tm=line.match(/\[([^\]]*)\]/);if(tm)tags=tm[1].split(',').map(function(t){return t.trim();});}}}
  for(i=fmEnd;i<lines.length;i++){if(lines[i].trim().indexOf('# ')===0&&lines[i].trim().indexOf('## ')!==0){title=lines[i].trim().substring(2).trim();break;}}
  var secList=[],cur=null;
  for(i=fmEnd;i<lines.length;i++){line=lines[i];if(line.trim().indexOf('## ')===0){if(cur)secList.push(cur);cur={heading:line.trim().substring(3).trim(),lines:[]};}else if(cur){cur.lines.push(line);}}
  if(cur)secList.push(cur);
  var sections={},quizzes=[],micros=[],refs=[],qIdx=0;
  for(var s=0;s<secList.length;s++){
    var sec=secList[s],h=sec.heading.toLowerCase();
    if(/abim|quiz.*case|style.*case|pitfall/i.test(h)){var q=parseQuiz(sec.lines,id,qIdx);if(q){quizzes.push(q);qIdx++;}}
    else if(/check.*micro|check.*yourself|micro.*question/i.test(h)){micros=parseMicro(sec.lines,id);}
    else if(/reference|guideline.*ref/i.test(h)){refs=parseRefs(sec.lines);}
    else{var key='other';if(/panic/i.test(h))key='panic_card';else if(/brief.*overview|overview/i.test(h))key='brief_overview';else if(/icu|consult.*trigger/i.test(h))key='icu_consult_triggers';else if(/order/i.test(h))key='orders_to_place_now';else if(/cdi/i.test(h))key='cdi';sections[key]=parseBullets(sec.lines);}
  }
  return{id:id,title:title,tags:tags,sections:sections,quizzes:quizzes,micros:micros,refs:refs};
}
function parseBullets(lines){var r=[];for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(l.indexOf('- ')===0)r.push(l.substring(2));else if(l.length>0&&r.length>0)r[r.length-1]+=' '+l;}return r;}
function parseRefs(lines){var r=[];for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(l.indexOf('- ')===0)l=l.substring(2);else continue;var parts=l.split(/ [—|] /);if(parts.length>=2){var um=parts[parts.length-1].match(/https?:\/\/[^\s)]+/);r.push({label:parts[0].trim(),url:um?um[0]:''});}else{var um2=l.match(/https?:\/\/[^\s)]+/);r.push({label:l.replace(/https?:\/\/[^\s)]+/,'').trim(),url:um2?um2[0]:''});}}return r;}
function parseMicro(lines,topicId){var r=[],idx=0;for(var i=0;i<lines.length;i++){var l=lines[i].trim(),qm=l.match(/^-?\s*Q:\s*(.+)/);if(qm){var q=qm[1],a='';var inlineA=q.match(/^(.+?)\s+A:\s*(.+)$/);if(inlineA){q=inlineA[1];a=inlineA[2];}else{for(var j=i+1;j<lines.length;j++){var am=lines[j].trim().match(/^A:\s*(.+)/);if(am){a=am[1];i=j;break;}if(lines[j].trim().match(/^-?\s*Q:/))break;}}r.push({id:topicId+'M'+idx,q:q,a:a});idx++;}}return r;}
function parseQuiz(lines,topicId,qIdx){var sub={},ck='';for(var i=0;i<lines.length;i++){var l=lines[i];if(l.trim().indexOf('### ')===0){ck=l.trim().substring(4).trim().toLowerCase();sub[ck]=[];}else if(ck){sub[ck].push(l);}}if(!sub['stem']&&!sub['options'])return null;var stem=(sub['stem']||[]).filter(function(l){return l.trim().length>0;}).join(' ');var options=[];var ol=sub['options']||[];for(var o=0;o<ol.length;o++){var om=ol[o].trim().match(/^([A-E])\.\s*(.+)/);if(om)options.push(om[0]);}var cl=((sub['correct answer']||sub['correct']||[])[0]||'').trim();var correct=cl.charAt(0);if(!/[A-E]/.test(correct))correct='A';var rat=(sub['rationale']||sub['rationale (2\u20134 sentences)']||sub['rationale (2-4 sentences)']||[]).filter(function(l){return l.trim().length>0;}).join(' ');return{id:topicId+'Q'+qIdx,stem:stem,options:options,correct:correct,rationale:rat};}
window.parseMD=parseMD;

<script>
window.PRETEST_DATA={"assessmentType": "pretest", "totalQuestions": 20, "questions": [{"id": "pre-01", "questionNumber": 1, "topicSlug": "diabetes-diagnosis-classification", "topicTitle": "Diabetes Diagnosis & Classification", "stem": "A 58-year-old man without known diabetes is found to have a fasting plasma glucose of 134 mg/dL on routine morning labs during a hospitalization for cellulitis. He denies polyuria, polydipsia, or weight loss, and his repeat point-of-care glucoses range from 145–175 mg/dL. He has not received dextrose-containing fluids or glucocorticoids. Which of the following is the most appropriate approach to establishing a diagnosis of diabetes?", "options": ["A. Diagnose diabetes immediately based on a single fasting glucose ≥126 mg/dL", "B. Start metformin now and confirm the diagnosis at an outpatient visit", "C. Obtain confirmatory testing (repeat fasting glucose or A1c) on a separate occasion since he lacks unequivocal hyperglycemia", "D. Perform a 75-g oral glucose tolerance test tonight as the only acceptable confirmatory method", "E. Diagnose type 2 diabetes based on inpatient hyperglycemia alone without further testing"], "correct": "C", "rationale": "In the absence of unequivocal hyperglycemia (such as DKA/HHS or classic symptoms with random glucose ≥200 mg/dL), ADA Standards of Care require confirmatory testing—either repeating the same test or using a different diagnostic test on a separate occasion. A single fasting glucose ≥126 mg/dL (A) does not confirm the diagnosis alone without symptoms or crisis. Starting treatment (B) does not replace diagnostic confirmation. An OGTT is one option but is not the only method (D)."}, {"id": "pre-02", "questionNumber": 2, "topicSlug": "inpatient-hyperglycemia-management", "topicTitle": "Inpatient Hyperglycemia Management", "stem": "A 65-year-old woman with type 2 diabetes is admitted for urinary tract infection. She is hemodynamically stable and eating most meals. Her bedside glucose readings over the past 24 hours have been 205–274 mg/dL on correctional rapid-acting insulin only. Creatinine is stable at 1.1 mg/dL. Which of the following is the recommended inpatient glucose target range for this noncritically ill patient?", "options": ["A. 80–110 mg/dL", "B. 100–140 mg/dL", "C. 140–180 mg/dL", "D. 180–250 mg/dL", "E. 250–350 mg/dL"], "correct": "C", "rationale": "ADA Standards of Care and the Endocrine Society recommend a target of 140–180 mg/dL for most noncritically ill hospitalized adults. Tight control (80–110 mg/dL) increases hypoglycemia risk without benefit in this population. Targets above 180 mg/dL represent inadequate control associated with worse outcomes."}, {"id": "pre-03", "questionNumber": 3, "topicSlug": "insulin-therapy-basics", "topicTitle": "Insulin Therapy Basics", "stem": "A 50-year-old woman with type 1 diabetes is admitted for small bowel obstruction and is NPO with a nasogastric tube. Her home regimen includes insulin glargine 22 units nightly and insulin lispro with meals. Her current glucose is 158 mg/dL. The cross-covering resident considers stopping all insulin since she is not eating. Which of the following best describes why basal insulin should be continued in this patient?", "options": ["A. Basal insulin is needed to cover the carbohydrates in IV maintenance fluids", "B. Stopping basal insulin in type 1 diabetes can rapidly precipitate diabetic ketoacidosis even without severe hyperglycemia", "C. Basal insulin prevents hypoglycemia during fasting states", "D. Basal insulin is only needed if the patient is receiving total parenteral nutrition", "E. All insulin should be held in NPO patients to avoid hypoglycemia"], "correct": "B", "rationale": "Patients with type 1 diabetes have absolute insulin deficiency and require basal insulin at all times to prevent ketosis and DKA, even when NPO. The dose is typically reduced (often by 20–30%) with careful monitoring, but it should never be stopped entirely. Stopping basal insulin is one of the most dangerous inpatient errors in type 1 diabetes management."}, {"id": "pre-04", "questionNumber": 4, "topicSlug": "outpatient-t2dm-medication-selection", "topicTitle": "Outpatient T2DM Medication Selection", "stem": "A 60-year-old man with type 2 diabetes (A1c 8.2%), prior myocardial infarction, and stage 3b CKD (eGFR 38 mL/min/1.73 m²) is on metformin 1000 mg twice daily. His blood pressure is well controlled on an ACE inhibitor. He asks about adding a medication to lower his cardiovascular and kidney risk. Which of the following classes of medication is most appropriate to add?", "options": ["A. Sulfonylurea", "B. Thiazolidinedione", "C. SGLT2 inhibitor with proven cardiovascular and kidney benefit", "D. Alpha-glucosidase inhibitor", "E. DPP-4 inhibitor"], "correct": "C", "rationale": "ADA and KDIGO guidelines recommend adding an SGLT2 inhibitor with proven cardiorenal benefit for patients with T2DM and established ASCVD and/or CKD, independent of A1c or background metformin use. SGLT2 inhibitors can be initiated at eGFR ≥20 mL/min/1.73 m². DPP-4 inhibitors and sulfonylureas do not provide comparable cardiorenal outcome benefits, and TZDs are not preferred in this setting."}, {"id": "pre-05", "questionNumber": 5, "topicSlug": "hypoglycemia-evaluation-and-acute-management", "topicTitle": "Hypoglycemia: Evaluation & Acute Management", "stem": "A 64-year-old man with type 2 diabetes is found confused on night float with a point-of-care glucose of 38 mg/dL. He has a peripheral IV in place and is not protecting his airway well but is still breathing spontaneously. Which of the following is the most appropriate immediate treatment?", "options": ["A. 15 g oral glucose tablets and recheck in 15 minutes", "B. 25 g IV dextrose (D50W 50 mL) and recheck glucose in 10–15 minutes", "C. 1 L normal saline bolus and recheck glucose in 30 minutes", "D. Subcutaneous regular insulin 5 units to stimulate counter-regulatory response", "E. Oral orange juice 8 oz and wait until morning labs"], "correct": "B", "rationale": "Severe symptomatic hypoglycemia (<54 mg/dL) with altered mental status in a patient who cannot safely take oral intake should be treated immediately with IV dextrose (typically 25 g) with glucose recheck in 10–15 minutes. Oral treatment (A, E) is unsafe when the patient is confused and may aspirate. Normal saline (C) does not correct hypoglycemia. Insulin (D) would worsen the situation."}, {"id": "pre-06", "questionNumber": 6, "topicSlug": "diabetic-ketoacidosis-dka", "topicTitle": "Diabetic Ketoacidosis (DKA)", "stem": "A 29-year-old man with type 1 diabetes presents with nausea, vomiting, and Kussmaul respirations. Labs show glucose 490 mg/dL, anion gap 26, bicarbonate 8 mmol/L, pH 7.18, and elevated β-hydroxybutyrate. After starting isotonic IV fluids, his potassium returns at 2.8 mmol/L. What is the most important next step before starting insulin?", "options": ["A. Start IV regular insulin immediately at 0.1 units/kg/hour", "B. Administer IV sodium bicarbonate to correct the acidosis first", "C. Replace potassium intravenously and hold insulin until K⁺ is ≥3.3 mmol/L", "D. Give subcutaneous rapid-acting insulin every 2 hours", "E. Administer oral potassium and start insulin simultaneously"], "correct": "C", "rationale": "When K⁺ is <3.3 mmol/L, insulin must be held and potassium replaced first. Insulin shifts potassium intracellularly and can precipitate life-threatening hypokalemia and cardiac arrhythmias. This is a hard safety stop emphasized in DKA consensus guidelines. Bicarbonate (B) is not indicated at pH 7.18, and subcutaneous insulin (D) is inappropriate for DKA management."}, {"id": "pre-07", "questionNumber": 7, "topicSlug": "euglycemic-dka", "topicTitle": "Euglycemic DKA", "stem": "A 55-year-old woman with type 2 diabetes on empagliflozin presents with nausea and tachypnea. Glucose is 192 mg/dL, anion gap is 22, bicarbonate is 13 mmol/L, and β-hydroxybutyrate is markedly elevated. Which of the following best describes why this presentation is consistent with euglycemic DKA rather than typical DKA?", "options": ["A. The anion gap is below 20, excluding typical DKA", "B. β-hydroxybutyrate is elevated but glucose is <250 mg/dL, a recognized phenotype associated with SGLT2 inhibitors", "C. SGLT2 inhibitors prevent ketone formation, so this must be lactic acidosis", "D. Euglycemic DKA only occurs in type 1 diabetes", "E. A normal glucose rules out any form of diabetic ketoacidosis"], "correct": "B", "rationale": "Euglycemic DKA is defined by significant ketoacidosis (elevated β-hydroxybutyrate, anion gap metabolic acidosis) with glucose <250 mg/dL. SGLT2 inhibitors increase urinary glucose excretion, keeping glucose lower while ketogenesis proceeds unchecked due to relative insulin deficiency. This is a well-recognized phenotype in consensus hyperglycemic crisis guidance. It occurs in both type 1 and type 2 diabetes (D is incorrect)."}, {"id": "pre-08", "questionNumber": 8, "topicSlug": "hyperosmolar-hyperglycemic-state-hhs", "topicTitle": "Hyperosmolar Hyperglycemic State (HHS)", "stem": "A 74-year-old man with type 2 diabetes is admitted overnight with confusion and severe dehydration. Labs show glucose 48 mmol/L (864 mg/dL), Na⁺ 152 mmol/L, effective osmolality 348 mOsm/kg, bicarbonate 21 mmol/L, pH 7.34, and β-hydroxybutyrate 1.4 mmol/L. Which of the following is the most appropriate initial therapy?", "options": ["A. Start IV regular insulin at 0.1 units/kg/hour immediately with an IV bolus", "B. Administer 0.9% sodium chloride for volume resuscitation before starting insulin", "C. Give 0.45% sodium chloride to rapidly correct the hypernatremia", "D. Administer IV sodium bicarbonate to prevent neurologic injury", "E. Give subcutaneous rapid-acting insulin every hour and restrict fluids"], "correct": "B", "rationale": "In HHS, fluid resuscitation with isotonic crystalloid is the first and most important therapy to restore perfusion and begin gradual osmolality reduction. Insulin should be delayed until after initial fluid resuscitation in 'pure' HHS (without significant ketoacidosis) because premature insulin can drop osmolality too rapidly, risking neurologic complications. Hypotonic fluid (C) is not first-line initially, and bicarbonate (D) is not indicated without severe acidosis."}, {"id": "pre-09", "questionNumber": 9, "topicSlug": "chronic-diabetes-complications", "topicTitle": "Chronic Diabetes Complications", "stem": "A 63-year-old man with type 2 diabetes (A1c 9.1%) and peripheral neuropathy is admitted for pneumonia. On exam you notice a plantar ulcer with surrounding erythema. He denies foot pain. WBC is 14.1 ×10⁹/L and he has faint pedal pulses. Which bedside assessment is most important to evaluate for osteomyelitis in this diabetic foot?", "options": ["A. Superficial wound swab culture", "B. Ankle-brachial index measurement", "C. Probe-to-bone test and plain foot radiographs", "D. Serum procalcitonin level", "E. Duplex ultrasonography of the lower extremity"], "correct": "C", "rationale": "Per IWGDF/IDSA guidance on diabetic foot infections, probe-to-bone assessment and plain radiographs are appropriate initial steps to evaluate for osteomyelitis and detect gas or foreign bodies. Neuropathy can mask pain, so evaluation should not depend on symptoms. Superficial wound swabs (A) are discouraged when deeper sampling is feasible. ABI (B) evaluates vascular status but does not assess for bone infection."}, {"id": "pre-10", "questionNumber": 10, "topicSlug": "hypothyroidism", "topicTitle": "Hypothyroidism", "stem": "A 70-year-old man is admitted with pneumonia and becomes progressively somnolent overnight. Vitals: T 33.5°C, HR 44/min, BP 84/50 mmHg, RR 8/min. ABG shows pH 7.20 and PaCO₂ 72 mmHg. Labs show Na⁺ 118 mmol/L. Which medication should be administered before or simultaneously with IV levothyroxine in this clinical scenario?", "options": ["A. Propranolol", "B. Liothyronine alone", "C. Hydrocortisone 100 mg IV", "D. Furosemide", "E. Oral levothyroxine 200 mcg"], "correct": "C", "rationale": "This presentation is consistent with myxedema coma (hypothermia, bradycardia, hypoventilation with hypercapnia, hypotension, hyponatremia). Stress-dose hydrocortisone (100 mg IV q8h) must be given before or with thyroid hormone because unrecognized adrenal insufficiency can coexist, and thyroid hormone replacement increases cortisol clearance, potentially precipitating adrenal crisis. Propranolol (A) would worsen bradycardia and hypotension."}, {"id": "pre-11", "questionNumber": 11, "topicSlug": "hyperthyroidism", "topicTitle": "Hyperthyroidism", "stem": "A 48-year-old woman presents with palpitations, tremor, and weight loss. Labs show TSH <0.01 mIU/L with elevated free T4. She reports a painful, tender anterior neck for 10 days after a viral illness. She has no eye findings. Which of the following is the most appropriate treatment for her thyrotoxicosis?", "options": ["A. Methimazole 20 mg PO every 6 hours", "B. Propranolol for symptom control and NSAIDs for thyroid pain", "C. Potassium iodide to block thyroid hormone release", "D. Radioactive iodine therapy", "E. Propylthiouracil and urgent thyroidectomy referral"], "correct": "B", "rationale": "The painful tender thyroid after a viral illness suggests subacute thyroiditis, where thyrotoxicosis results from hormone release (not overproduction). Thionamides (A, E) are ineffective against release-mediated thyrotoxicosis. Symptom control with beta-blockers plus anti-inflammatory therapy (NSAIDs or glucocorticoids for more severe cases) is the appropriate approach per ATA guidelines. The pitfall is treating thyroiditis like Graves disease."}, {"id": "pre-12", "questionNumber": 12, "topicSlug": "thyroid-storm", "topicTitle": "Thyroid Storm", "stem": "A 44-year-old woman with known Graves disease presents with fever (39.8°C), delirium, atrial fibrillation with RVR (HR 162), and diaphoresis after stopping methimazole one week ago. Thyroid storm is suspected. In what order should the key medications be administered?", "options": ["A. Iodine first, then thionamide, then beta-blocker", "B. Beta-blocker and thionamide first, then iodine at least 1 hour after the thionamide", "C. Aspirin for fever first, then iodine and thionamide simultaneously", "D. Levothyroxine and beta-blocker simultaneously", "E. Glucocorticoid only, deferring all other agents until TSH results return"], "correct": "B", "rationale": "Thyroid storm requires multimodal therapy in the correct sequence: beta-blocker for adrenergic control plus thionamide to block new hormone synthesis, then iodine at least 1 hour after the thionamide to block hormone release. Giving iodine before thionamide (A) can worsen thyrotoxicosis by providing substrate for hormone synthesis. Aspirin (C) should be avoided because it can increase free thyroid hormone levels. Glucocorticoids are also given but treatment should not be delayed for labs."}, {"id": "pre-13", "questionNumber": 13, "topicSlug": "thyroid-function-test-interpretation", "topicTitle": "Thyroid Function Test Interpretation", "stem": "A 56-year-old man with a history of pituitary macroadenoma resection presents with fatigue and cold intolerance. Labs show free T4 below the reference range with a low-normal TSH. Which pattern of thyroid dysfunction does this represent?", "options": ["A. Primary hypothyroidism", "B. Subclinical hypothyroidism", "C. Central (secondary) hypothyroidism", "D. Euthyroid sick syndrome", "E. Primary hyperthyroidism"], "correct": "C", "rationale": "Low free T4 with a low or inappropriately normal TSH in a patient with pituitary disease indicates central hypothyroidism. In primary hypothyroidism (A), TSH would be elevated in response to low thyroid hormone. In subclinical hypothyroidism (B), free T4 is normal. The pituitary history is key to recognizing that the TSH cannot appropriately respond to low thyroid hormone levels."}, {"id": "pre-14", "questionNumber": 14, "topicSlug": "thyroid-nodules", "topicTitle": "Thyroid Nodules", "stem": "A 52-year-old woman has an incidental 1.5 cm thyroid nodule found on CT during a hospitalization for pneumonia. TSH is normal. What is the most appropriate next step in evaluation?", "options": ["A. Immediate fine-needle aspiration based on the CT finding", "B. Radionuclide thyroid uptake scan", "C. High-resolution thyroid ultrasound with cervical lymph node survey", "D. Start levothyroxine suppression therapy", "E. Repeat CT in 6 months"], "correct": "C", "rationale": "When TSH is normal, the next step is a dedicated high-resolution thyroid ultrasound to characterize the nodule using sonographic risk stratification (ATA pattern or ACR TI-RADS). CT size alone is insufficient to determine FNA need—ultrasound features plus size guide biopsy decisions. Radionuclide scanning (B) is indicated when TSH is suppressed (low), not when it is normal. FNA without ultrasound characterization first (A) is premature."}, {"id": "pre-15", "questionNumber": 15, "topicSlug": "hypercalcemia", "topicTitle": "Hypercalcemia", "stem": "A 68-year-old man with metastatic lung cancer presents with confusion and dehydration. Total calcium is 3.7 mmol/L (14.8 mg/dL) and PTH is suppressed. After 1 L of 0.9% sodium chloride, he remains confused. Which combination therapy should be started next to rapidly lower calcium while awaiting definitive antiresorptive effect?", "options": ["A. Furosemide infusion as primary calcium-lowering therapy", "B. Calcitonin plus an IV bisphosphonate or denosumab", "C. Oral cinacalcet as monotherapy", "D. IV sodium bicarbonate infusion", "E. High-dose oral calcium to suppress PTH"], "correct": "B", "rationale": "For severe hypercalcemia of malignancy, Endocrine Society guidelines recommend hydration plus calcitonin (for rapid but short-lived effect) combined with an antiresorptive agent (denosumab or IV bisphosphonate) for sustained calcium reduction over 24–72 hours. Loop diuretics (A) are not primary therapy and are reserved only for volume overload after adequate rehydration. Cinacalcet (C) is for PTH-mediated hypercalcemia, not malignancy with suppressed PTH."}, {"id": "pre-16", "questionNumber": 16, "topicSlug": "hypocalcemia", "topicTitle": "Hypocalcemia", "stem": "A 64-year-old man with alcohol use disorder develops perioral tingling, hand cramping, and a QTc of 528 ms. Labs show ionized calcium 0.84 mmol/L and magnesium 1.0 mg/dL. Which of the following is the most appropriate calcium preparation for peripheral IV administration in this setting?", "options": ["A. Calcium chloride 1 g IV push through a peripheral line", "B. Calcium gluconate 2 g IV over 10–20 minutes with telemetry", "C. Oral calcium carbonate 1000 mg and recheck in 4 hours", "D. Calcitriol 0.5 mcg PO as sole therapy", "E. No calcium replacement needed; treat the magnesium only"], "correct": "B", "rationale": "Symptomatic hypocalcemia with QTc prolongation requires IV calcium with ECG monitoring. Calcium gluconate is preferred for peripheral IV administration because calcium chloride carries high risk of tissue necrosis with extravasation and should be reserved for central line access. Oral calcium (C) is too slow for symptomatic acute hypocalcemia with arrhythmia risk. Both calcium and magnesium need to be addressed."}, {"id": "pre-17", "questionNumber": 17, "topicSlug": "hyperparathyroidism", "topicTitle": "Hyperparathyroidism", "stem": "A 47-year-old woman is found to have calcium 2.74 mmol/L (11.0 mg/dL) with an elevated intact PTH. She is asymptomatic with no kidney stones or fractures. A 24-hour urine calcium collection returns markedly low. Her father also had lifelong mild hypercalcemia. What is the most likely diagnosis?", "options": ["A. Primary hyperparathyroidism requiring parathyroidectomy", "B. Familial hypocalciuric hypercalcemia (FHH)", "C. Tertiary hyperparathyroidism", "D. Vitamin D toxicity", "E. Hypercalcemia of malignancy"], "correct": "B", "rationale": "Mild hypercalcemia with non-suppressed PTH plus markedly low urinary calcium and a suggestive family history is the classic presentation of familial hypocalciuric hypercalcemia (FHH). The key discriminator is hypocalciuria (low 24-hour urine calcium or calcium-creatinine clearance ratio). This distinction is critical because FHH does not benefit from parathyroidectomy, unlike primary hyperparathyroidism."}, {"id": "pre-18", "questionNumber": 18, "topicSlug": "osteoporosis", "topicTitle": "Osteoporosis", "stem": "A 73-year-old woman with osteoporosis treated with denosumab for 3 years is admitted for pneumonia. Her last denosumab injection was 7 months ago (1 month overdue). She is clinically improving and expected to discharge in 2 days. Calcium and renal function are normal. What is the most important next step regarding her osteoporosis therapy?", "options": ["A. Stop denosumab permanently and switch to calcitonin nasal spray", "B. Administer denosumab now or before discharge to prevent rebound bone loss", "C. Defer all osteoporosis therapy until a repeat DXA scan is obtained", "D. Start a bisphosphonate holiday since she has been treated for over 3 years", "E. Wait until her next scheduled outpatient visit in 3 months"], "correct": "B", "rationale": "Denosumab should not be substantially delayed beyond its scheduled interval because interruption can cause rapid bone loss and rebound vertebral fractures. Administering the dose during this hospitalization (with confirmed normal calcium and vitamin D adequacy) is the most appropriate action. A bisphosphonate holiday (D) applies to bisphosphonate-treated patients, not denosumab, which has a distinct discontinuation risk."}, {"id": "pre-19", "questionNumber": 19, "topicSlug": "dyslipidemia", "topicTitle": "Dyslipidemia", "stem": "A 61-year-old man is admitted with non-ST-elevation myocardial infarction. He is not currently on lipid-lowering therapy. LDL-C is 148 mg/dL and triglycerides are 190 mg/dL. He is hemodynamically stable and tolerating oral intake. Which lipid therapy should be started during this hospitalization?", "options": ["A. Gemfibrozil 600 mg twice daily", "B. Niacin extended-release 2 g nightly", "C. Atorvastatin 80 mg daily", "D. Ezetimibe alone without a statin", "E. Defer all lipid therapy until an outpatient fasting lipid panel is obtained"], "correct": "C", "rationale": "High-intensity statin therapy (e.g., atorvastatin 80 mg or rosuvastatin 20–40 mg) is recommended for secondary prevention in patients with clinical ASCVD, including those hospitalized with ACS, and should be initiated during the hospitalization. Nonstatin agents are considered only after maximally tolerated statin therapy if LDL-C remains above guideline thresholds. Deferring therapy (E) misses a key window for secondary prevention."}, {"id": "pre-20", "questionNumber": 20, "topicSlug": "obesity-metabolic-syndrome", "topicTitle": "Obesity & Metabolic Syndrome", "stem": "A 56-year-old man with BMI 48 kg/m² is admitted for cellulitis. Overnight he becomes increasingly somnolent with shallow breathing (RR 10/min) after receiving opioids. SpO₂ is 89% on 4 L nasal cannula. Serum bicarbonate is 31 mmol/L. Which test is most appropriate to evaluate for obesity hypoventilation syndrome contributing to his deterioration?", "options": ["A. Chest CT angiography for pulmonary embolism", "B. Arterial blood gas to assess for hypercapnia", "C. Echocardiogram to assess ejection fraction", "D. Sleep study (polysomnography) performed tonight", "E. Peak expiratory flow rate measurement"], "correct": "B", "rationale": "In obese patients with somnolence and suspected OHS, a serum bicarbonate ≥27 mmol/L raises concern for chronic CO₂ retention and warrants arterial blood gas to confirm awake hypercapnia (PaCO₂ ≥45 mmHg). The ATS guideline on OHS recommends ABG when clinical suspicion and bicarbonate suggest chronic hypoventilation. Increasing oxygen alone without assessing ventilation can mask worsening CO₂ retention."}]};
window.POSTTEST_DATA={"assessmentType": "posttest", "totalQuestions": 20, "questions": [{"id": "post-01", "questionNumber": 1, "topicSlug": "diabetes-diagnosis-classification", "topicTitle": "Diabetes Diagnosis & Classification", "stem": "A 69-year-old man is admitted for GI bleeding and receives 3 units of packed red blood cells. Two days later, fasting glucose is 131 mg/dL and random glucoses are 195–225 mg/dL. An A1c returns at 5.9%. He has no diabetes symptoms. The team reassures him that the A1c excludes diabetes. Which of the following is the most appropriate interpretation?", "options": ["A. The A1c of 5.9% reliably excludes diabetes; no further testing is needed", "B. Diagnose diabetes based on random glucoses alone regardless of symptoms", "C. The A1c may be falsely low due to recent transfusion; use plasma glucose criteria and arrange outpatient confirmatory testing", "D. Immediately start insulin based on the fasting glucose of 131 mg/dL", "E. Order islet autoantibodies to classify diabetes type before any glucose-based testing"], "correct": "C", "rationale": "Recent blood transfusion alters red blood cell age and hemoglobin glycation kinetics, making A1c unreliable (often falsely low). The elevated fasting and random glucoses should prompt use of plasma glucose diagnostic criteria with confirmatory testing once the patient is stable. The pitfall is being falsely reassured by a normal-appearing A1c after transfusion, which can delay diagnosis and follow-up."}, {"id": "post-02", "questionNumber": 2, "topicSlug": "inpatient-hyperglycemia-management", "topicTitle": "Inpatient Hyperglycemia Management", "stem": "A 71-year-old woman with type 2 diabetes is hospitalized for a COPD exacerbation and started on prednisone 60 mg every morning. Her fasting glucose is 128 mg/dL, but pre-dinner glucoses for the past 2 days have been 290–325 mg/dL despite a standard correction scale. Kidney function is stable. Which insulin strategy best addresses her hyperglycemia pattern?", "options": ["A. Double her basal glargine dose to cover the entire day", "B. Add morning NPH insulin timed with prednisone plus mealtime and correction insulin", "C. Use correction-only insulin at higher doses and avoid scheduled insulin", "D. Start a DPP-4 inhibitor for rapid inpatient glycemic control", "E. Target glucose 80–110 mg/dL with aggressive prandial insulin at every meal"], "correct": "B", "rationale": "Glucocorticoid-induced hyperglycemia from morning prednisone characteristically causes afternoon and evening glucose spikes. NPH insulin timed with the steroid dose provides a pharmacokinetic match to the steroid's peak effect. Over-escalating basal glargine alone risks overnight hypoglycemia when the steroid effect wanes. Doses must be adjusted as steroids are tapered to prevent delayed hypoglycemia. DPP-4 inhibitors (D) have insufficient acute potency for this degree of hyperglycemia."}, {"id": "post-03", "questionNumber": 3, "topicSlug": "insulin-therapy-basics", "topicTitle": "Insulin Therapy Basics", "stem": "A 66-year-old man with type 2 diabetes is recovering from DKA and has been on an IV insulin infusion for 18 hours. His anion gap has closed, bicarbonate is 22 mmol/L, and he is now eating breakfast. The team plans to stop the IV insulin infusion. Which of the following is the best approach to prevent rebound hyperglycemia or ketosis during the transition?", "options": ["A. Stop the IV insulin infusion and start subcutaneous rapid-acting insulin with the next meal", "B. Give long-acting basal insulin 2–4 hours before stopping the IV infusion, then add prandial insulin with meals", "C. Stop the IV insulin and observe for 6 hours before starting any subcutaneous insulin", "D. Switch directly to metformin and a sulfonylurea without any subcutaneous insulin overlap", "E. Continue the IV insulin infusion indefinitely until discharge"], "correct": "B", "rationale": "The transition from IV to subcutaneous insulin is a common failure point. Long-acting basal insulin should be given 2–4 hours before stopping the IV infusion to allow the subcutaneous insulin to reach therapeutic levels. Stopping the infusion without this overlap period risks rebound hyperglycemia and ketosis. Oral agents alone (D) are insufficient for this acute transition, and observation without insulin (C) invites metabolic decompensation."}, {"id": "post-04", "questionNumber": 4, "topicSlug": "outpatient-t2dm-medication-selection", "topicTitle": "Outpatient T2DM Medication Selection", "stem": "A 63-year-old woman with type 2 diabetes (A1c 8.3%), obesity, and HFpEF was hospitalized with DKA 2 months ago after several days of vomiting and poor intake. She is now stable on metformin and wants to avoid hypoglycemia and lose weight. Her eGFR is 44 mL/min/1.73 m². Which additional agent is most appropriate?", "options": ["A. Empagliflozin", "B. Dulaglutide", "C. Glyburide", "D. Pioglitazone", "E. NPH insulin twice daily"], "correct": "B", "rationale": "Despite her HFpEF (where SGLT2 inhibitors are otherwise attractive), her recent DKA episode is a key safety concern that shifts selection away from SGLT2 inhibitors due to recurrent ketoacidosis risk during illness or reduced intake. A GLP-1 receptor agonist like dulaglutide provides A1c lowering with weight loss and low hypoglycemia risk. Glyburide (C) has high hypoglycemia risk especially in CKD, and pioglitazone (D) is contraindicated in HF due to fluid retention."}, {"id": "post-05", "questionNumber": 5, "topicSlug": "hypoglycemia-evaluation-and-acute-management", "topicTitle": "Hypoglycemia: Evaluation & Acute Management", "stem": "A 79-year-old woman with type 2 diabetes and stage 4 CKD is admitted for heart failure. Her home medications include glipizide. At 3 AM she is found somnolent with glucose 34 mg/dL. She receives 25 g IV dextrose with improvement, but glucose falls again to 42 mg/dL within 45 minutes despite eating crackers. Which is the best next step?", "options": ["A. Give repeated dextrose boluses only when glucose drops below 54 mg/dL", "B. Administer octreotide subcutaneously and continue dextrose support with close monitoring", "C. Increase her basal insulin dose to prevent glucose variability", "D. Start metformin to reduce hepatic glucose output", "E. Give glucagon 1 mg IM every hour as needed"], "correct": "B", "rationale": "This is sulfonylurea-induced recurrent hypoglycemia, which is prolonged in CKD due to reduced drug clearance. Dextrose alone can paradoxically worsen the cycle by stimulating more endogenous insulin release from the sulfonylurea effect. Octreotide (50–100 mcg SQ q6h) suppresses insulin secretion and breaks this cycle. Repeated dextrose-only strategies (A) perpetuate the rebound, and increasing insulin (C) would be harmful."}, {"id": "post-06", "questionNumber": 6, "topicSlug": "diabetic-ketoacidosis-dka", "topicTitle": "Diabetic Ketoacidosis (DKA)", "stem": "A 32-year-old woman with type 1 diabetes is being treated for DKA with IV insulin infusion and fluids. Her glucose has fallen from 480 to 218 mg/dL over 4 hours, but her anion gap remains 22 and β-hydroxybutyrate is still elevated. Which of the following is the most appropriate next step?", "options": ["A. Stop the insulin infusion since glucose is approaching normal", "B. Add dextrose to IV fluids and continue the insulin infusion until the anion gap closes", "C. Switch to subcutaneous insulin and discharge planning", "D. Administer IV sodium bicarbonate to close the anion gap faster", "E. Decrease IV fluids to prevent cerebral edema"], "correct": "B", "rationale": "The goal of DKA treatment is resolution of ketoacidosis (closed anion gap, clearing ketones, normalizing pH/bicarbonate), not simply normalizing glucose. When glucose falls to 200–250 mg/dL but ketoacidosis persists, dextrose must be added to IV fluids to allow continued insulin infusion for ketone clearance. Stopping insulin prematurely (A) is a common and dangerous pitfall that leads to rebound ketoacidosis. Bicarbonate (D) is rarely indicated and does not speed routine DKA recovery."}, {"id": "post-07", "questionNumber": 7, "topicSlug": "euglycemic-dka", "topicTitle": "Euglycemic DKA", "stem": "A 65-year-old woman with insulin-treated type 2 diabetes and ESRD on hemodialysis (anuric) takes dapagliflozin at home. She presents vomiting after missing a dialysis session. Glucose is 168 mg/dL, K⁺ 6.1 mmol/L, bicarbonate 11 mmol/L, anion gap 25, and β-hydroxybutyrate is markedly elevated. She has bibasilar crackles and 2+ edema. What is the best management approach?", "options": ["A. Give 2 L isotonic fluid bolus followed by insulin infusion", "B. Start insulin infusion with dextrose and treat hyperkalemia while arranging urgent hemodialysis with cautious fluids", "C. Hold all insulin because glucose is not elevated and give only dextrose", "D. Give sodium bicarbonate as sole therapy", "E. Discharge after symptom control with subcutaneous basal insulin"], "correct": "B", "rationale": "This patient has euglycemic DKA complicated by ESRD with volume overload and dangerous hyperkalemia. The standard aggressive fluid approach is contraindicated due to anuric ESRD with pulmonary edema. Management requires insulin (with dextrose to prevent hypoglycemia) to suppress ketogenesis, immediate hyperkalemia treatment, and urgent hemodialysis for potassium/acid removal and volume management. The pitfall is applying standard DKA fluid protocols to a patient who cannot tolerate volume."}, {"id": "post-08", "questionNumber": 8, "topicSlug": "hyperosmolar-hyperglycemic-state-hhs", "topicTitle": "Hyperosmolar Hyperglycemic State (HHS)", "stem": "A 70-year-old woman with type 2 diabetes and HFrEF (EF 20%) presents at 2 AM with lethargy. BP 94/58, HR 112, SpO₂ 90% on 2 L with bibasilar crackles. Glucose is 44 mmol/L (792 mg/dL), Na⁺ 149, bicarbonate 23, β-hydroxybutyrate 0.8 mmol/L, effective osmolality 344 mOsm/kg. CXR shows pulmonary edema. What is the best management approach?", "options": ["A. Give 2 L of 0.9% sodium chloride rapidly then start insulin infusion", "B. Start insulin infusion first without any fluids to rapidly lower glucose", "C. Give cautious small isotonic fluid boluses with close reassessment and early ICU/cardiology involvement", "D. Switch to 0.45% sodium chloride immediately to correct sodium", "E. Administer IV bicarbonate to prevent neurologic injury"], "correct": "C", "rationale": "The pitfall is severe HFrEF with active pulmonary edema, which prevents standard aggressive fluid resuscitation. Management requires small, carefully titrated isotonic boluses with frequent hemodynamic and respiratory reassessment, early ICU-level monitoring, and cardiology co-management. Aggressive fluids (A) will worsen pulmonary edema. Insulin without addressing perfusion (B) is unsafe, and hypotonic fluids/bicarbonate (D, E) are not first-line interventions."}, {"id": "post-09", "questionNumber": 9, "topicSlug": "chronic-diabetes-complications", "topicTitle": "Chronic Diabetes Complications", "stem": "A 72-year-old woman with type 2 diabetes, stage 4 CKD (eGFR 20 mL/min/1.73 m²), and autonomic neuropathy is admitted for cellulitis. She is NPO for a procedure and receives her full home dose of insulin glargine 38 units. At 2 AM she is diaphoretic and confused with glucose 44 mg/dL. After IV dextrose and recovery, which overnight insulin adjustment is most appropriate?", "options": ["A. Continue full-dose glargine and hold only prandial insulin", "B. Reduce the basal insulin dose and stop scheduled prandial insulin; use a conservative correction scale", "C. Increase basal insulin to prevent rebound hyperglycemia", "D. Switch to sliding-scale insulin only with no basal component", "E. Add a sulfonylurea to reduce the total insulin requirement"], "correct": "B", "rationale": "Advanced CKD markedly reduces insulin clearance, and NPO status eliminates the need for prandial insulin. The combination of full-dose basal insulin with CKD and no oral intake created the hypoglycemia. The appropriate response is to reduce the basal insulin dose (often significantly in eGFR <30) and stop prandial insulin while NPO, using a conservative correction scale for safety. Sliding-scale-only without basal (D) increases glycemic variability and hyperglycemia risk. Adding a sulfonylurea (E) would worsen hypoglycemia risk."}, {"id": "post-10", "questionNumber": 10, "topicSlug": "hypothyroidism", "topicTitle": "Hypothyroidism", "stem": "A 76-year-old woman with coronary artery disease and prior MI is admitted for cellulitis. She is alert and hemodynamically stable. Overnight labs reveal TSH 42 mIU/L and low free T4. She has no hypothermia, altered mental status, or hypoventilation. The intern suggests a large IV loading dose of levothyroxine. What is the safest approach?", "options": ["A. Give levothyroxine 400 mcg IV loading dose immediately", "B. Start levothyroxine 12.5–25 mcg PO daily with slow titration and outpatient follow-up", "C. Start liothyronine three times daily for faster correction", "D. Defer all therapy until TSH normalizes on its own after the infection clears", "E. Start levothyroxine 100 mcg PO daily as standard full replacement"], "correct": "B", "rationale": "In stable primary hypothyroidism without myxedema features, older adults with CAD should start low-dose levothyroxine (often 12.5–25 mcg daily) with gradual titration to avoid precipitating myocardial ischemia or arrhythmias. Rapid loading doses (A) are reserved for myxedema coma with hemodynamic instability, not stable patients. Full replacement doses (E) are inappropriate as initial therapy in high-cardiac-risk patients. TSH normalization takes weeks with appropriate therapy."}, {"id": "post-11", "questionNumber": 11, "topicSlug": "hyperthyroidism", "topicTitle": "Hyperthyroidism", "stem": "A 47-year-old woman with untreated Graves disease presents with fever (39.4°C), agitation, and atrial fibrillation with RVR (HR 154). TSH is suppressed with markedly elevated free T4. Thyroid storm therapy is initiated. After starting propylthiouracil 500 mg, how long must you wait before administering potassium iodide, and why?", "options": ["A. No wait is needed; iodide can be given simultaneously with thionamide", "B. Wait at least 1 hour because giving iodide before thionamide provides substrate for new hormone synthesis, potentially worsening thyrotoxicosis", "C. Wait 24 hours to ensure PTU reaches full therapeutic effect", "D. Iodide is contraindicated in thyroid storm and should never be given", "E. Wait 1 hour because iodide blocks PTU absorption from the GI tract"], "correct": "B", "rationale": "Iodide must be given at least 1 hour after a thionamide in thyroid storm management. The thionamide blocks new hormone synthesis first; only then can iodide safely inhibit hormone release via the Wolff-Chaikoff effect. If iodide is given before synthesis is blocked, it provides substrate (iodine) for the thyroid to produce even more hormone, potentially worsening the crisis. This sequencing is emphasized in ATA 2016 and JTA/JES guidelines."}, {"id": "post-12", "questionNumber": 12, "topicSlug": "thyroid-storm", "topicTitle": "Thyroid Storm", "stem": "A 59-year-old man with untreated hyperthyroidism develops thyroid storm during a pneumonia admission. He has a history of severe asthma with prior ICU admissions for bronchospasm. HR is 150, BP 130/76, and he is confused and febrile. Which is the best initial agent for ventricular rate control in this patient?", "options": ["A. Propranolol 80 mg PO every 4 hours", "B. Metoprolol 5 mg IV push repeated every 5 minutes", "C. Diltiazem IV with careful blood pressure monitoring while initiating full thyroid storm therapy", "D. Amiodarone IV as first-line rate control", "E. Digoxin as sole rate-controlling agent"], "correct": "C", "rationale": "Severe asthma is a contraindication to nonselective beta-blockers (propranolol) and a relative contraindication even to cardioselective beta-blockers at higher doses. Diltiazem is an accepted alternative for rate control in thyrotoxicosis when beta-blockers cannot be used safely. It should be given alongside the full thyroid storm medication sequence (thionamide, iodine after thionamide, glucocorticoids). Amiodarone (D) contains iodine and is not standard first-line for this indication."}, {"id": "post-13", "questionNumber": 13, "topicSlug": "thyroid-function-test-interpretation", "topicTitle": "Thyroid Function Test Interpretation", "stem": "A 43-year-old woman is admitted for cellulitis. Routine labs show a suppressed TSH with elevated free T4. She has no symptoms of thyrotoxicosis—no weight loss, tremor, palpitations, or heat intolerance. Vitals are normal. She mentions taking a daily supplement for 'hair and nails.' What is the best next step?", "options": ["A. Start methimazole immediately for presumed Graves disease", "B. Administer iodinated contrast to suppress the thyroid", "C. Repeat thyroid tests using a method less susceptible to biotin interference and document supplement use", "D. Start levothyroxine because TSH is abnormal", "E. Diagnose thyroiditis and start prednisone"], "correct": "C", "rationale": "High-dose biotin (commonly found in hair/skin/nail supplements) can interfere with certain thyroid immunoassays, producing falsely suppressed TSH and falsely elevated free T4 that mimics hyperthyroidism. When the clinical picture does not match the lab results, the appropriate step is to repeat testing using an assay less susceptible to biotin interference and document the supplement exposure. Treating presumed thyrotoxicosis without confirming the results risks unnecessary and potentially harmful therapy."}, {"id": "post-14", "questionNumber": 14, "topicSlug": "thyroid-nodules", "topicTitle": "Thyroid Nodules", "stem": "A 67-year-old man admitted for heart failure is found to have a 2.0 cm solid, mildly hypoechoic thyroid nodule on ultrasound without suspicious lymph nodes. His TSH is suppressed. He has no compressive symptoms. What is the most appropriate next diagnostic step?", "options": ["A. Ultrasound-guided fine-needle aspiration now", "B. Radionuclide thyroid uptake/scan to assess nodule function", "C. Start levothyroxine to normalize TSH", "D. CT neck with iodinated contrast to stage for malignancy", "E. Repeat ultrasound in 6 months without additional testing"], "correct": "B", "rationale": "With a suppressed TSH, the correct next step is radionuclide thyroid imaging to determine if the nodule is hyperfunctioning ('hot'). Hot nodules are rarely malignant and typically do not require FNA. The pitfall is proceeding directly to FNA without functional assessment when TSH is low. FNA decision thresholds based on ultrasound features apply after confirming the nodule is not autonomously functioning, or when TSH is normal/high."}, {"id": "post-15", "questionNumber": 15, "topicSlug": "hypercalcemia", "topicTitle": "Hypercalcemia", "stem": "A 73-year-old woman with ESRD on hemodialysis (missed her last session) presents with lethargy and dyspnea. She has crackles to mid-lung fields and elevated JVP. Total calcium is 3.8 mmol/L (15.2 mg/dL), potassium 5.8 mmol/L, and ECG shows shortened QT. She cannot tolerate aggressive IV fluids. What is the best next step?", "options": ["A. Give 2 L of 0.9% sodium chloride rapidly", "B. Administer zoledronic acid 4 mg IV as sole therapy", "C. Arrange urgent hemodialysis with low-calcium dialysate", "D. Start hydrochlorothiazide to promote calcium excretion", "E. Observe overnight with calcitonin only"], "correct": "C", "rationale": "In ESRD with volume overload and life-threatening hypercalcemia, the patient cannot tolerate aggressive hydration, and renal calcium excretion is negligible. Urgent hemodialysis with low-calcium dialysate provides the fastest and most controllable method of calcium removal. IV bisphosphonates (B) have delayed onset and can worsen renal complications. Thiazides (D) paradoxically increase calcium reabsorption. Aggressive fluids (A) would worsen the pulmonary edema."}, {"id": "post-16", "questionNumber": 16, "topicSlug": "hypocalcemia", "topicTitle": "Hypocalcemia", "stem": "A 71-year-old woman with diarrhea and poor intake develops tingling and hand cramping at 2 AM. QTc is 510 ms. Ionized calcium is 0.90 mmol/L and magnesium is 0.7 mg/dL. She receives 2 g IV calcium gluconate with minimal improvement—repeat ionized calcium is 0.91 mmol/L. What is the most important next step?", "options": ["A. Give additional calcium gluconate boluses only", "B. Switch to calcium chloride via peripheral IV for faster correction", "C. Administer magnesium sulfate 2 g IV and replete magnesium", "D. Start calcitriol 0.5 mcg PO and stop IV calcium", "E. Administer phosphate replacement"], "correct": "C", "rationale": "Severe hypomagnesemia causes functional hypoparathyroidism by impairing PTH secretion and inducing end-organ PTH resistance. Hypocalcemia will often not correct until magnesium is repleted. This is a classic refractory hypocalcemia pitfall. Additional calcium alone (A) will continue to fail without addressing the magnesium deficiency. Calcium chloride via peripheral IV (B) carries high tissue necrosis risk and does not address the underlying problem."}, {"id": "post-17", "questionNumber": 17, "topicSlug": "hyperparathyroidism", "topicTitle": "Hyperparathyroidism", "stem": "A 64-year-old man presents with confusion and dehydration. Corrected calcium is 3.7 mmol/L (14.8 mg/dL), creatinine is 2.3 mg/dL (baseline 1.0), and intact PTH is elevated. ECG shows a shortened QT interval. After starting IV normal saline, which combination therapy should be initiated for acute calcium lowering?", "options": ["A. Furosemide infusion before completing volume resuscitation", "B. IV saline hydration plus calcitonin as a rapid bridge while arranging longer-acting therapy", "C. Oral cinacalcet as monotherapy and reassess in the morning", "D. Immediate sestamibi scan to localize the adenoma before any treatment", "E. High-dose oral calcium to suppress PTH via feedback"], "correct": "B", "rationale": "In severe symptomatic hypercalcemia from hyperparathyroidism, immediate therapy includes IV saline for volume repletion plus calcitonin for rapid (though short-lived) calcium lowering while planning definitive management. Loop diuretics (A) are reserved only for volume overload after adequate rehydration—using them prematurely worsens dehydration. Localization imaging (D) is for surgical planning after stabilization, not acute management. Cinacalcet (C) takes days to reach full effect and is insufficient for acute crisis."}, {"id": "post-18", "questionNumber": 18, "topicSlug": "osteoporosis", "topicTitle": "Osteoporosis", "stem": "A 78-year-old woman with ESRD on hemodialysis is admitted after a low-trauma vertebral compression fracture. The admitting team plans to give zoledronic acid 5 mg IV to treat osteoporosis. Her labs show calcium 2.05 mmol/L (low-normal), elevated phosphate, and long-standing secondary hyperparathyroidism. What is the most appropriate next step?", "options": ["A. Administer zoledronic acid 5 mg IV now", "B. Give denosumab 60 mg SC since it is not renally cleared", "C. Hold antiresorptive therapy and consult nephrology to evaluate CKD-mineral and bone disorder before selecting therapy", "D. Start oral alendronate 70 mg weekly", "E. Begin high-dose calcium supplementation only"], "correct": "C", "rationale": "In dialysis patients, fracture risk often reflects CKD-mineral and bone disorder (CKD-MBD) with abnormal bone turnover rather than simple osteoporosis. Antiresorptive agents may be inappropriate or harmful without first evaluating the underlying bone metabolism (calcium, phosphate, PTH trends, bone turnover markers). KDIGO guidelines recommend coordinated nephrology input before initiating osteoporosis-directed therapy in advanced CKD/ESRD. The pitfall is treating presumed primary osteoporosis without accounting for renal bone disease."}, {"id": "post-19", "questionNumber": 19, "topicSlug": "dyslipidemia", "topicTitle": "Dyslipidemia", "stem": "A 71-year-old woman with CAD is admitted for pneumonia and started on clarithromycin. She takes simvastatin 40 mg nightly at home. On hospital day 2 she develops diffuse muscle pain and dark urine. Creatinine rises from 0.9 to 1.8 mg/dL and CK is 11,200 U/L. What is the best immediate management?", "options": ["A. Continue simvastatin and add ezetimibe", "B. Hold simvastatin, stop clarithromycin if possible, and start aggressive IV fluids with electrolyte monitoring", "C. Switch simvastatin to atorvastatin 80 mg and continue clarithromycin", "D. Add fenofibrate to lower triglycerides", "E. Give intramuscular ketorolac for myalgias and reassess in the morning"], "correct": "B", "rationale": "This presentation is consistent with statin-associated rhabdomyolysis precipitated by a dangerous CYP3A4 drug interaction (clarithromycin with simvastatin increases statin exposure dramatically). Immediate management includes stopping both the statin and the interacting antibiotic (substituting a non-interacting alternative), plus aggressive IV fluid resuscitation to prevent acute kidney injury from myoglobin deposition. Continuing or substituting another CYP3A4-metabolized statin (C) while the interacting drug remains would perpetuate the toxicity. NSAIDs (E) can worsen renal injury."}, {"id": "post-20", "questionNumber": 20, "topicSlug": "obesity-metabolic-syndrome", "topicTitle": "Obesity & Metabolic Syndrome", "stem": "A 64-year-old woman with BMI 50 kg/m² and severe OSA was hospitalized for pneumonia. She developed acute-on-chronic hypercapnic respiratory failure requiring BiPAP overnight. This morning she is awake and stable on room air with SpO₂ 92%, but her overnight ABG showed PaCO₂ 56 mmHg. The team plans to discharge her with supplemental oxygen only since her saturation is acceptable. What is the best discharge respiratory plan?", "options": ["A. Discharge with supplemental oxygen only and no ventilatory support", "B. Discharge with empiric noninvasive ventilation until outpatient diagnostic evaluation and PAP titration", "C. Discharge with no respiratory support and arrange outpatient follow-up as needed", "D. Discharge with inhaled bronchodilators and steroids for presumed COPD", "E. Keep inpatient until she loses 10% body weight"], "correct": "B", "rationale": "For hospitalized patients with suspected OHS and documented hypercapnic respiratory failure, ATS guidelines support discharge with empiric noninvasive ventilation (NIV) until outpatient diagnostic evaluation and PAP titration can be completed (ideally within 2–3 months). The pitfall is relying on SpO₂ alone—oxygen without ventilatory support may mask ongoing hypoventilation and CO₂ retention. The patient demonstrated PaCO₂ 56 mmHg, confirming chronic hypoventilation that requires ventilatory, not just oxygenation, support."}]};

window.TOPIC_FILES={"diabetes-diagnosis-classification.md": "---\nfilename: diabetes-diagnosis-classification.md\nid: diabetes-diagnosis-classification\ntitle: Diabetes Diagnosis & Classification\nslug: diabetes-diagnosis-classification\ntags: [endocrinology, diabetes, inpatient, diagnosis, classification]\nlevel: resident\nestimatedtimemin: 12\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Diabetes Diagnosis & Classification\n\n## Panic Card (3–6 bullets)\n- If glucose **≥300 mg/dL (≥16.7 mmol/L)** or patient ill/toxic: assess for **DKA/HHS now** (mental status, vitals, **anion gap**, **β-hydroxybutyrate**, venous pH/HCO₃⁻, serum osmolality) and start crisis pathway if present.\n- If symptomatic hyperglycemia with dehydration or crisis features: start **isotonic IV fluids** and obtain ECG, BMP, ketones; do not delay escalation if shock/AMS.\n- If known/suspected type 1 diabetes or insulin-dependent patient: **do not stop basal insulin**; prevent ketoacidosis when NPO (use basal + correction strategy).\n- If hypoglycemia (<**70 mg/dL [3.9 mmol/L]**): treat immediately; recheck in **15 min** and identify iatrogenic causes (insulin/sulfonylurea, renal failure, poor intake).\n- Confirm Before Proceed: before labeling “new diabetes” or “type 2,” verify reliability of A1C (recent transfusion/hemolysis/ESRD) and confirm diagnosis with repeat testing unless **unequivocal hyperglycemia**.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Night-float reality: most “new diabetes” calls start as incidental hyperglycemia; your first job is triage—rule out **DKA/HHS**, medication triggers (glucocorticoids, pressors), infection/stress, and iatrogenic nutrition (dextrose-containing fluids, tube feeds, TPN) before debating phenotype.\n- Guideline Must Know: ADA Standards of Care define diabetes by any of: **A1C ≥6.5% (≥48 mmol/mol)**, **fasting plasma glucose ≥126 mg/dL (≥7.0 mmol/L)** after **≥8 h** fast, **2-h OGTT ≥200 mg/dL (≥11.1 mmol/L)** with **75 g** glucose, or **random glucose ≥200 mg/dL (≥11.1 mmol/L)** with classic symptoms or hyperglycemic crisis.\n- Guideline Must Know: In the absence of **unequivocal hyperglycemia** (e.g., DKA/HHS or classic symptoms with random glucose ≥200), diagnosis requires **confirmatory testing**—repeat the same test or a different test on a different day; if two tests are discordant, repeat the abnormal test to confirm.\n- Guideline Must Know: Prediabetes (increased risk) is typically: **A1C 5.7–6.4%**, **fasting glucose 100–125 mg/dL (5.6–6.9 mmol/L)**, or **2-h OGTT 140–199 mg/dL (7.8–11.0 mmol/L)**; inpatient discovery should trigger outpatient follow-up, not necessarily an inpatient “new chronic diagnosis” label.\n- Guideline Must Know: A1C is best when performed in a certified lab method; marked discordance between A1C and plasma glucose should prompt concern for assay interference or altered RBC kinetics—use plasma glucose criteria when A1C may be unreliable.\n- Guideline Must Know: Situations where A1C can be misleading (common inpatient pitfalls): recent transfusion, acute blood loss, hemolysis, erythropoietin use, pregnancy (later trimesters), and advanced kidney disease—do not anchor on A1C alone when physiology makes it unreliable.\n- Guideline Must Know: Classification categories matter because they change safety-critical decisions: **type 1 diabetes** (autoimmune β-cell destruction, absolute insulin deficiency), **type 2 diabetes** (progressive insulin secretory defect with insulin resistance), **gestational diabetes**, and “other specific types” (monogenic diabetes, exocrine pancreas disease, drug/chemical-induced).\n- What must happen now: if the patient is acutely unwell, has **anion gap metabolic acidosis**, ketonemia/ketonuria, severe dehydration, or altered mental status, treat as possible **DKA/HHS** until proven otherwise; classification workup can wait until after stabilization.\n- What must happen now: determine whether the patient is at risk for rapid ketosis—lean body habitus, unintentional weight loss, autoimmune history, prior DKA, very low/absent insulin use, or SGLT2 inhibitor exposure; when in doubt, maintain **basal insulin** and monitor ketones if clinically concerning.\n- What can wait (but document a plan): if hyperglycemia appears stress- or steroid-related, diagnose “inpatient hyperglycemia” and arrange outpatient confirmation (repeat fasting glucose/A1C); avoid permanently coding chronic diabetes without confirmatory criteria unless clearly met.\n- Practical phenotype clues at night (not definitive): type 1 more likely with ketosis, low/normal BMI, rapid onset symptoms, autoimmune comorbidity; type 2 more likely with obesity/metabolic syndrome and gradual course. These clues guide safety (never omit basal insulin in suspected type 1) but do not replace criteria-based diagnosis.\n- When classification is uncertain and will affect immediate care: consider targeted labs—**C-peptide** (interpret with simultaneous glucose and renal function), **islet autoantibodies** (GAD65, IA-2, ZnT8, insulin autoantibody), and consider endocrinology input if results will change insulin dependence counseling or discharge plan.\n- Medication- and condition-associated diabetes: recognize common inpatient drivers—glucocorticoids (often afternoon/evening hyperglycemia), atypical antipsychotics, calcineurin inhibitors, pancreatitis/pancreatectomy, cystic fibrosis, and TPN; classify as “drug-induced” or “exocrine pancreas disease” when evidence supports it to improve coding and follow-up.\n- Night-float documentation and transitions: record objective criteria met (values, timing, fasting status), whether confirmation is pending, and whether A1C is interpretable; explicitly communicate “needs outpatient confirmatory testing” to prevent premature labeling or missed diagnosis.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Suspected DKA/HHS: **anion gap metabolic acidosis**, **β-hydroxybutyrate elevated**, venous pH low or HCO₃⁻ low, severe dehydration, or need for insulin infusion-level monitoring.\n- Altered mental status, seizures, or hemodynamic instability with hyperglycemia (concern for HHS, stroke, sepsis, or toxic-metabolic encephalopathy).\n- Refractory hypoglycemia, especially if sulfonylurea exposure, liver failure, adrenal insufficiency, or renal failure; need for continuous dextrose or octreotide.\n- Uncertain diabetes type where immediate insulin dependence decisions are high risk (possible type 1/LADA, ketosis-prone diabetes), especially if planning discharge soon.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Point-of-care glucose monitoring — {q4h while NPO or qACHS if eating}\n- Order: Hemoglobin A1C — {now} (note: interpret cautiously if {recent transfusion/hemolysis/ESRD})\n- Order: Basic metabolic panel — {now; repeat q6h if concern for DKA/HHS or on insulin infusion}\n- Order: Beta-hydroxybutyrate — {now if glucose ≥300 mg/dL, anion gap, nausea/vomiting, or tachypnea}\n- Order: Urinalysis with ketones — {now if ketosis suspected or SGLT2 inhibitor exposure}\n- Order: C-peptide with simultaneous glucose — {consider if unclear type and results will change discharge plan}\n\n## ABIM Style Question 1\n### Stem\nA 54-year-old inpatient without known diabetes is found to have a fasting plasma glucose of 132 mg/dL (7.3 mmol/L) on morning labs. He feels well and denies polyuria, polydipsia, or weight loss. Repeat point-of-care glucose values later that day range from 140–170 mg/dL (7.8–9.4 mmol/L) while receiving maintenance IV fluids without dextrose. What is the best next step to establish the diagnosis?\n\n### Options\nA. Diagnose diabetes now because fasting glucose ≥126 mg/dL confirms diabetes\nB. Order a hemoglobin A1C and, if elevated, diagnose diabetes without further testing\nC. Repeat a confirmatory diagnostic test on a different day (repeat fasting plasma glucose or obtain A1C in a certified lab)\nD. Start metformin immediately and diagnose type 2 diabetes based on inpatient hyperglycemia\nE. Obtain a 75-g oral glucose tolerance test tonight as the only acceptable confirmatory test\n\n### Correct answer\nC\n\n### Rationale\nIn the absence of unequivocal hyperglycemia or hyperglycemic crisis, a diagnosis of diabetes requires **confirmatory testing** with repeat abnormal testing or a different diagnostic test on a separate occasion. ADA Standards of Care allow diagnosis via A1C or plasma glucose criteria, but confirmation is needed when symptoms/crisis are absent. Starting therapy may be appropriate for inpatient glycemic control, but it does not replace diagnostic confirmation.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 67-year-old man is admitted for gastrointestinal bleeding and receives 3 units of packed red blood cells. Two days later, his fasting plasma glucose is 129 mg/dL (7.2 mmol/L) and random glucoses are 180–220 mg/dL (10.0–12.2 mmol/L). An A1C returns at 5.8%. He is asymptomatic. What is the most appropriate interpretation and next step?\n\n### Options\nA. The A1C excludes diabetes; no further testing is needed\nB. Diagnose prediabetes only and document “no diabetes”\nC. Use plasma glucose criteria and arrange outpatient confirmatory testing; consider inpatient hyperglycemia management as needed\nD. Diagnose diabetes based on random glucoses alone, regardless of symptoms\nE. Order islet autoantibodies immediately to classify diabetes before any follow-up\n\n### Correct answer\nC\n\n### Rationale\nRecent transfusion can make **A1C unreliable** by altering red blood cell age and measured glycation, so discordant A1C should not overrule elevated plasma glucose values. Use plasma glucose criteria and obtain **confirmatory testing** when the patient is stable and not in a confounded inpatient setting, while treating hyperglycemia for safety. The pitfall is falsely reassuring A1C after transfusion, leading to missed diagnosis or delayed follow-up.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What A1C threshold meets diagnostic criteria for diabetes in nonpregnant adults? A: **A1C ≥6.5% (≥48 mmol/mol)** using a certified laboratory method.\n- Q: What fasting duration defines “fasting plasma glucose” for diagnosis? A: **No caloric intake for at least 8 hours**.\n- Q: When can a single random plasma glucose diagnose diabetes without repeat confirmation? A: When **random glucose ≥200 mg/dL (≥11.1 mmol/L)** is accompanied by classic symptoms or hyperglycemic crisis.\n- Q: What 2-hour OGTT value (75 g) meets diagnostic criteria for diabetes? A: **2-h plasma glucose ≥200 mg/dL (≥11.1 mmol/L)**.\n\n## Guidelines & Key References (3–5 bullets)\n- American Diabetes Association. Standards of Care in Diabetes—2026: Diagnosis and Classification of Diabetes (2026). https://diabetesjournals.org/care/article/49/Supplement_1/S27/163926/2-Diagnosis-and-Classification-of-Diabetes\n- American Diabetes Association. Standards of Care in Diabetes (living guideline portal) (2026). https://professional.diabetes.org/standards-of-care\n- World Health Organization. Classification of diabetes mellitus (2019). https://www.who.int/publications/i/item/classification-of-diabetes-mellitus\n- International Diabetes Federation. Global Clinical Practice Recommendations for Managing Type 2 Diabetes (2025). https://idf.org/t2d-cpr-2025\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Diabetes mellitus — {type 1/type 2/other/uncertain} — {new vs known} — objective evidence: {A1C value if reliable; fasting/random glucose values with dates/times; symptoms/crisis yes/no}\n- Inpatient hyperglycemia — {stress/steroid/TPN/medication-associated suspected} — severity: {peak glucose} — objective evidence: {glucose trends; meds/nutrition context} — treatment: {insulin regimen/monitoring}\n- Hyperglycemic crisis — {DKA/HHS} — severity/organ dysfunction: {anion gap, pH/HCO₃⁻, β-hydroxybutyrate, osmolality, mental status} — treatment: {IV fluids/insulin infusion/electrolyte monitoring}\n- Hypoglycemia — {mild/severe} — cause: {insulin/sulfonylurea/renal failure/poor intake} — objective evidence: {lowest glucose, symptoms, need for assistance} — treatment: {dextrose/glucagon/infusion}\n", "inpatient-hyperglycemia-management.md": "---\nfilename: inpatient-hyperglycemia-management.md\nid: inpatient-hyperglycemia-management\ntitle: Inpatient Hyperglycemia Management\nslug: inpatient-hyperglycemia-management\ntags: [endocrinology, hyperglycemia, inpatient, insulin, night-float, hypoglycemia]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Inpatient Hyperglycemia Management\n\n## Panic Card (3–6 bullets)\n- Check ABCs and mentation; if altered or dehydrated, start **isotonic fluids** and send **BMP, venous blood gas, serum/urine ketones (beta-hydroxybutyrate), lactate** to rule out **DKA/HHS** now.\n- If glucose **≥300 mg/dL (16.7 mmol/L)** with symptoms, dehydration, or ketones: treat as possible hyperglycemic crisis until proven otherwise; consider **ICU + IV insulin** if acidosis/ketosis or hemodynamic instability.\n- If hypoglycemia: treat immediately (do not wait for labs) with **dextrose 25 g IV** (e.g., **50 mL D50W**) if unable to take PO, or **15–20 g oral glucose** if awake; recheck glucose in **15 min** and repeat until **>70 mg/dL (3.9 mmol/L)**.\n- Stop harm: hold “stacking” correction doses; confirm current **diet status (NPO/PO/continuous feeds/TPN)** and timing of last insulin to prevent recurrent hypo/hyperglycemia.\n- Transition plan now: if persistent hyperglycemia, move to **scheduled basal ± prandial insulin** plus correction with a goal **140–180 mg/dL (7.8–10 mmol/L)** for most inpatients.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Guideline Must Know: For most noncritically ill adult inpatients, target glucose is **140–180 mg/dL (7.8–10 mmol/L)**; avoid “tight control” that increases hypoglycemia risk, and individualize only if low risk and close monitoring is feasible.\n- Guideline Must Know: Define and document inpatient hyperglycemia and risk: **random glucose >140 mg/dL (7.8 mmol/L)** warrants evaluation, and obtain **A1c on admission** if none in the prior **3 months** to distinguish chronic diabetes vs stress hyperglycemia and guide discharge planning.\n- Guideline Must Know: Use insulin as the preferred inpatient agent for most patients; avoid sliding-scale-only as the main strategy when hyperglycemia is persistent—scheduled insulin reduces variability and complications compared with correction-only approaches in typical ward patients.\n- Guideline Must Know: Escalate from correction-only to scheduled therapy when glucose is persistently **>180 mg/dL (10 mmol/L)**; start **basal insulin** (and add prandial if eating) plus correction, reassessing daily and after major changes (steroids, nutrition, renal function).\n- Guideline Must Know: Choose regimen by nutrition status: “basal + correction” for **NPO/poor intake**, “basal-bolus” for reliable PO, and schedule insulin matched to **enteral/TPN** (continuous nutrition needs continuous coverage; be ready for rapid de-escalation if feeds stop).\n- Guideline Must Know: Hypoglycemia prevention is as important as hyperglycemia control: treat and document **glucose <70 mg/dL (3.9 mmol/L)**, and treat severe hypoglycemia **<54 mg/dL (3.0 mmol/L)** aggressively; after any event, reduce insulin drivers (recent dose changes, renal decline, decreased intake) before the next dose.\n- “What must happen now” on night float: verify current intake (diet order, NPO status, tube feeds/TPN), check last 6–12 hours of bedside glucoses, and identify precipitants (infection/sepsis, MI/stroke, steroids, missed home insulin, new enteral feeds, renal failure) because treating numbers without fixing the driver leads to repeated pages overnight.\n- “What can wait until morning” if stable: outpatient regimen optimization and noninsulin agents; inpatient starts of most oral antihyperglycemics are usually low yield overnight, and many are inappropriate with acute illness, NPO status, procedures, or fluctuating kidney function.\n- Dosing practicalities (ward): estimate total daily insulin (TDI) conservatively when starting—typical starting ranges are **0.2–0.4 units/kg/day** (lower end if elderly, CKD, low intake; higher end if obese, steroid-treated); give ~**40–50% as basal**, remainder as prandial divided with meals if eating, and add correction.\n- Correction insulin: choose sensitivity by factors that increase hypoglycemia risk (CKD/ESRD, liver failure, frailty, low intake); avoid “double correcting” within the same insulin action window (especially rapid-acting insulin within ~**3–4 hours**) unless directed by a protocol.\n- Steroid-induced hyperglycemia: expect postprandial/afternoon spikes with prednisone; match insulin to steroid pattern (e.g., consider **NPH** timed with morning prednisone, and increase prandial/correction during peak effect) while reducing doses as steroids taper to avoid delayed hypoglycemia.\n- Enteral nutrition: continuous feeds usually need scheduled insulin coverage (basal plus scheduled short-acting or intermediate-acting depending on protocol); the key pitfall is feed interruption—if feeds stop unexpectedly, hold scheduled nutrition insulin and consider **dextrose-containing IV fluids** with frequent checks to prevent hypoglycemia.\n- Peri-procedure/NPO: continue a reduced basal dose (often **50–80%** of usual, individualized to prior control and hypoglycemia risk) and hold prandial insulin; use correction with bedside checks every **4–6 hours** while NPO.\n- When to consider IV insulin: critically ill patients, **DKA/HHS**, or severe persistent hyperglycemia with rapid changes in hemodynamics, vasopressors, high-dose steroids, or unreliable absorption; ensure hourly or protocol-defined monitoring and a clear transition plan to subcutaneous insulin once stable.\n- Red flags that mean “this is not routine hyperglycemia”: anion gap metabolic acidosis, positive serum ketones, severe dehydration/hypotension, Kussmaul respirations, altered mental status, or suspected insulin omission in type 1 diabetes—treat as hyperglycemic crisis until excluded.\n- Confirm Before Proceed: Before initiating **IV insulin infusion** or giving large insulin “catch-up” doses, confirm **potassium** and overall DKA/HHS physiology; insulin can precipitate dangerous hypokalemia if total body K is depleted, and misclassification leads to harm.\n- Communication that prevents repeat calls: write explicit nursing instructions for hypoglycemia treatment and rechecks, parameters for calling (e.g., **<70**, **>300**, symptomatic), and state clearly which insulins are to be held if NPO or if feeds stop.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Suspected DKA/HHS: **anion gap metabolic acidosis**, **beta-hydroxybutyrate elevated**, significant dehydration, or altered mental status.\n- Hemodynamic/respiratory instability with hyperglycemia: escalating oxygen/ventilatory support, new vasopressor requirement, or **MAP <65 mmHg** despite fluids.\n- Refractory hyperglycemia: persistent glucose **>300–350 mg/dL (16.7–19.4 mmol/L)** despite appropriate scheduled insulin and correction, or need for rapid titration (e.g., high-dose steroids, post-op instability).\n- Severe or recurrent hypoglycemia: glucose **<54 mg/dL (3.0 mmol/L)**, repeated episodes, or hypoglycemia with seizures/arrhythmia concern.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Point-of-care glucose monitoring — {qac_hs_or_q4h_npo} with call parameters {notify_thresholds}\n- Order: Hypoglycemia treatment protocol — {po_glucose_or_dextrose_iv_or_glucagon} with recheck in {15_minutes} until {glucose_over_70}\n- Order: Basal insulin glargine — {units} subcutaneous nightly; hold parameters {if_glucose_below} and adjust for {ckd_or_low_intake}\n- Order: Rapid-acting insulin lispro with meals — {units_per_meal} subcutaneous TID with meals; hold if {npo_or_not_eating}\n- Order: Correctional insulin lispro scale — {sensitivity_level} for glucose {ranges} with max frequency {every_4_hours}\n- Order: Labs for hyperglycemic crisis screen — {bmp_now_and_q4_6h_if_concern} + {venous_blood_gas} + {beta_hydroxybutyrate} + {serum_osmolality_if_hhs_concern}\n\n## ABIM Style Question 1\n### Stem\nA 62-year-old man with type 2 diabetes is admitted for community-acquired pneumonia. He is hemodynamically stable and eating about half of his meals. His bedside glucose readings over the last 24 hours are 198–268 mg/dL despite receiving correctional insulin only. His creatinine is 1.0 mg/dL, and there is no history of severe hypoglycemia. Which is the most appropriate next step in glycemic management?\n### Options\nA. Continue correctional insulin only and re-evaluate in 48 hours  \nB. Start metformin and continue correctional insulin  \nC. Start scheduled basal insulin plus prandial insulin with meals, and keep correctional insulin  \nD. Start glyburide for inpatient control  \nE. Target glucose 80–110 mg/dL using aggressive insulin dosing\n### Correct answer\nC\n### Rationale\nPersistent inpatient glucose **>180 mg/dL (10 mmol/L)** warrants escalation from correction-only to scheduled insulin, typically **basal plus prandial (if eating)** with correction to reduce variability and complications. Metformin and sulfonylureas are generally avoided in acute hospitalization due to procedural/NPO risk and hypoglycemia risk, respectively. Intensive targets (80–110 mg/dL) increase hypoglycemia without benefit in typical noncritical inpatients.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 70-year-old woman with type 2 diabetes is hospitalized for COPD exacerbation and started on prednisone 60 mg each morning. She is eating well. Her fasting bedside glucose is 132 mg/dL, but her pre-dinner glucoses for the last 2 days are 280–320 mg/dL despite a standard lispro correction scale. Kidney function is stable. Which insulin strategy is most appropriate to address her hyperglycemia pattern?\n### Options\nA. Increase basal glargine substantially and stop prandial insulin  \nB. Add morning NPH insulin timed with prednisone and use mealtime/correction insulin as needed  \nC. Use sliding-scale insulin alone and avoid scheduled insulin  \nD. Start a DPP-4 inhibitor as monotherapy for rapid inpatient control  \nE. Target glucose 80–110 mg/dL with aggressive prandial insulin at every meal\n### Correct answer\nB\n### Rationale\nThe pitfall is **glucocorticoid-pattern hyperglycemia** (often later-day spikes with morning prednisone), which is better matched by insulin that peaks with the steroid effect, such as **NPH dosed with prednisone**, alongside prandial/correction insulin. Over-escalating basal alone risks overnight hypoglycemia when steroid effect wanes. What changed the decision here?\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What is the usual inpatient glucose target for most noncritically ill adults? A: **140–180 mg/dL (7.8–10 mmol/L)**.\n- Q: When should you escalate from correction-only insulin to scheduled insulin in the hospital? A: When glucose is persistently **>180 mg/dL (10 mmol/L)**.\n- Q: What is the first-line immediate treatment for an unconscious inpatient with glucose 42 mg/dL? A: **Dextrose 25 g IV** (e.g., **50 mL D50W**) and recheck in **15 minutes**.\n- Q: What key labs help rapidly screen for DKA/HHS in a hyperglycemic inpatient? A: **BMP (anion gap), venous blood gas, beta-hydroxybutyrate**, and consider **serum osmolality** if HHS suspected.\n\n## Guidelines & Key References (3–5 bullets)\n- American Diabetes Association. Standards of Care in Diabetes—2026: Diabetes Care in the Hospital (2026). https://diabetesjournals.org/care/article/49/Supplement_1/S339/163925/16-Diabetes-Care-in-the-Hospital-Standards-of-Care\n- Endocrine Society. Management of Hyperglycemia in Hospitalized Adu
