lt Patients in Non-Critical Care Settings: Clinical Practice Guideline (2022). https://www.endocrine.org/-/media/endocrine/files/cpg/6_10_22_final_dgac278.pdf\n- Society of Critical Care Medicine. Guidelines on Glycemic Control for Critically Ill Children and Adults (2024). https://www.sccm.org/clinical-resources/guidelines/guidelines/guidelines-on-glycemic-control-for-critically-ill\n- ADA/EASD/JBDS/AACE/DTS. Hyperglycemic Crises in Adults With Diabetes: Consensus Report (2024). https://diabetesjournals.org/care/article/47/8/1257/156808/Hyperglycemic-Crises-in-Adults-With-Diabetes-A\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Hyperglycemia, {stress_vs_known_diabetes}, {peak_glucose_value} mg/dL, {a1c_if_known}%, with {trigger_suspected_infection_steroids_nutrition_change}; evidence {serial_poc_values}\n- Hypoglycemia, {mild_vs_severe}, nadir {glucose_value} mg/dL, {symptoms_or_ams}, precipitant {reduced_intake_renal_decline_insulin_stack}; treatment {dextrose_or_glucagon} and response {repeat_glucose}\n- Suspected DKA/HHS ruled {in_or_out}: {anion_gap}, {ph_or_bicarb}, {beta_hydroxybutyrate}, {osmolality_if_checked}, mental status {baseline_vs_altered}; treatment started {fluids_insulin_electrolytes}\n- Steroid-induced hyperglycemia: prednisone {dose} mg AM with afternoon glucoses {range}; insulin plan {nph_timed_with_steroid_and_prandial_correction} and monitoring {frequency}\n", "insulin-therapy-basics.md": "---\nfilename: insulin-therapy-basics.md\nid: insulin-therapy-basics\ntitle: Insulin Therapy Basics\nslug: insulin-therapy-basics\ntags: [endocrinology, inpatient, hyperglycemia, hypoglycemia, night-float]\nlevel: resident\nestimatedtimemin: 12\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Insulin Therapy Basics\n\n## Panic Card (3–6 bullets)\n- If glucose **<70 mg/dL**: stop insulin, give **15–20 g** oral fast carb if able; recheck in **15 min** and repeat until **≥70 mg/dL**\n- If severe or NPO/AMS: give **dextrose 25 g IV (D50 50 mL)** or **dextrose 10% 250 mL IV**, recheck glucose in **15 min**; then start **dextrose infusion** if recurrent\n- If no IV access: give **glucagon 1 mg IM/SQ**, place IV/IO ASAP, recheck glucose in **15 min**\n- If glucose **>300–350 mg/dL** with anion gap, ketones, or rapid breathing: evaluate for **DKA/HHS now** (BMP, VBG, ketones/β-hydroxybutyrate, osmolality); call ICU if concern for **DKA/HHS**\n- Confirm Before Proceed: verify insulin type/concentration (especially **U-500**), dose units, and last administration time before giving additional insulin to prevent stacking and iatrogenic hypoglycemia\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Inpatient goal for most non-ICU adults is glucose **140–180 mg/dL**; avoid “tight” control because it increases hypoglycemia without outcome benefit in most hospitalized patients\n- “Sliding scale only” (correction-only) is usually inadequate beyond very short observation because it reacts to hyperglycemia rather than preventing it; use scheduled insulin when persistent glucose is **≥180 mg/dL** or repeated corrections are needed\n- Guideline Must Know: Use a basal-bolus-correction approach for patients eating reliably: basal to cover hepatic glucose output, bolus for meals, and correction for unexpected elevations; this reduces swings compared with correction-only regimens\n- Guideline Must Know: Do not hold basal insulin in patients with **type 1 diabetes** even when NPO; stopping basal risks rapid **ketosis/DKA**—instead reduce dose (often **20–30%**) while monitoring closely\n- Start dosing (insulin-naïve, non-ICU) can be weight based: total daily dose (TDD) **0.3–0.5 units/kg/day** depending on frailty, age, renal function, and steroid exposure; use lower end (**0.2–0.3**) if high hypoglycemia risk (older age, CKD, poor intake)\n- Split TDD for eating patients: basal about **40–50%** of TDD; prandial total **50–60%** divided across meals, then add a correction scale; for variable appetite, consider “basal plus” (basal + correction, with prandial added once intake is consistent)\n- Guideline Must Know: If NPO or inconsistent intake, avoid fixed prandial doses; use basal + correction, and give rapid-acting insulin only when a meal is confirmed (or immediately after eating if uncertain)\n- Correction insulin principles: choose a scale matched to insulin sensitivity; avoid “stacking” by re-dosing rapid-acting insulin more often than every **3–4 hours** unless directed by a protocol (e.g., infusion); always look at timing of last dose and trend\n- Steroid hyperglycemia: anticipate afternoon/evening spikes with daytime prednisone; consider increasing daytime prandial/correction or adding intermediate-acting insulin timed to steroid peak; reassess daily and reduce promptly as steroids taper to avoid late hypoglycemia\n- Guideline Must Know: In the ICU or DKA/HHS, use IV regular insulin per protocol with hourly glucose checks; transition to subcutaneous basal insulin before stopping infusion by giving basal **2–4 hours** prior (to prevent rebound hyperglycemia/ketosis)\n- Hypoglycemia prevention is as important as treatment: identify drivers (NPO status, improving renal function, reduced steroids, missed meals, delayed trays, new antibiotics resolving infection); proactively reduce insulin when these change rather than waiting for lows\n- Guideline Must Know: Standard hypoglycemia actions: treat at **<70 mg/dL**; treat severe events (AMS/seizure or needing assistance) immediately with IV dextrose or glucagon; after recovery, provide longer-acting carbohydrate and adjust the regimen the same night\n- Renal impairment increases insulin exposure: in **eGFR <30 mL/min/1.73 m²** or rapidly changing kidney function, decrease TDD and correction strength; monitor overnight because nocturnal hypoglycemia is common when clearance falls\n- Nutrition changes: tube feeds require scheduled insulin aligned to feeding (continuous vs bolus); if feeds stop unexpectedly, the patient can crash—ensure an “if feeds held” rescue plan (e.g., dextrose infusion + hold nutritional insulin + continue reduced basal)\n- High-risk medication errors at night: confusing basal vs rapid-acting pens, using the wrong concentration, duplicate correction by multiple staff, and giving insulin when glucose is falling; mitigate with bedside glucose trend review and clear “hold parameters”\n- When to call for help: suspected DKA/HHS, refractory hyperglycemia despite escalating doses, recurrent severe hypoglycemia, new need for insulin infusion, pregnancy with hyperglycemia, or complex insulin pumps/CGMs (hospital policy dependent)\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Suspected **DKA/HHS**: anion gap metabolic acidosis, positive serum ketones/β-hydroxybutyrate, altered mental status, or effective osmolality markedly elevated with dehydration and glucose typically **>600 mg/dL** (HHS)\n- Need for **IV insulin infusion**: hemodynamic instability, vasopressors, severe sepsis/shock, perioperative critical illness, or rapidly changing insulin requirements needing hourly titration\n- Recurrent severe hypoglycemia: any episode with seizure/AMS, need for IV dextrose drip, or **≥2** events **<54 mg/dL** despite dose reductions\n- Hyperglycemia with acute organ dysfunction: escalating oxygen needs, new encephalopathy, or suspected hypertriglyceridemic pancreatitis where insulin infusion is being considered\n- Complex diabetes technology or pregnancy: insulin pump/CGM management questions beyond unit policy, or any pregnant inpatient with persistent hyperglycemia requiring expert co-management\n\n## Orders to Place Now (3–6 bullets)\n- Order: Bedside glucose monitoring — {qACHS vs q6h if NPO}, {notify provider if <70 or >300}\n- Order: Hypoglycemia treatment protocol — {oral glucose tabs/juice if able}, {dextrose IV dosing}, {glucagon IM if no IV}\n- Order: Basal insulin (long-acting) — {insulin glargine/detemir/degludec} {dose units nightly}, {reduce by % if NPO/CKD}\n- Order: Rapid-acting insulin for meals — {insulin lispro/aspart} {dose units with meals}, {hold if not eating}\n- Order: Correctional insulin scale — {sensitive/standard/resistant} {qACHS or q6h}, {max single correction dose}\n- Order: DKA/HHS evaluation bundle — {BMP}, {VBG}, {serum/urine ketones or β-hydroxybutyrate}, {serum osmolality}, {EKG}\n\n## ABIM Style Question 1\n### Stem\nA 62-year-old man with type 2 diabetes is admitted for community-acquired pneumonia. He is eating most meals. Point-of-care glucose values over the past 12 hours are 212–268 mg/dL despite receiving correctional rapid-acting insulin only. Creatinine is 1.0 mg/dL, and he is hemodynamically stable. Which is the best next step for inpatient glycemic management tonight?\n### Options\nA. Continue correction-only insulin because infection-related hyperglycemia will resolve without scheduled insulin  \nB. Start basal-bolus insulin with an estimated total daily dose and include correction insulin  \nC. Start metformin because it is first-line for type 2 diabetes and will reduce insulin needs quickly  \nD. Start an insulin infusion because glucose is persistently above 200 mg/dL  \nE. Hold all insulin unless glucose exceeds 300 mg/dL to avoid hypoglycemia\n### Correct answer\nB\n### Rationale\nPersistent inpatient hyperglycemia **≥180 mg/dL** despite correction-only therapy is an indication to add scheduled insulin, typically a basal-bolus-correction regimen for patients eating reliably. Basal-bolus reduces glucose variability and avoids reactive “chasing” compared with correction-only regimens, while an insulin infusion is generally reserved for ICU/critical illness or DKA/HHS. Metformin is often held in acute hospitalization due to contraindications and slow onset relative to immediate inpatient needs.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 48-year-old woman with type 1 diabetes is admitted for small bowel obstruction and is now NPO with an NG tube. Her home regimen is insulin glargine 24 units nightly and insulin lispro with meals. Her current glucose is 164 mg/dL. The cross-cover team plans to stop all insulin “since she is not eating.” What is the best insulin plan overnight?\n### Options\nA. Hold basal insulin and give correctional insulin only if glucose rises above 250 mg/dL  \nB. Continue full home basal insulin dose unchanged and stop all correction insulin  \nC. Give reduced basal insulin and use correctional insulin while NPO with frequent glucose checks  \nD. Start metformin to avoid hypoglycemia while NPO  \nE. Start an insulin infusion in all NPO patients with type 1 diabetes\n### Correct answer\nC\n### Rationale\nPatients with type 1 diabetes require basal insulin to prevent ketosis; stopping basal can precipitate DKA even when glucose is not markedly elevated. The pitfall is equating “NPO” with “no insulin”—instead, reduce basal (often **~20–30%**) and use correction with **q4–6h** monitoring while reassessing for evolving illness or decreasing insulin needs. Full-dose basal may cause hypoglycemia in acute illness with reduced intake, while routine infusion is not required without critical illness or DKA/HHS.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What inpatient glucose target is appropriate for most non-ICU adults? A: **140–180 mg/dL** is the usual target range, balancing hyperglycemia control and hypoglycemia risk.\n- Q: At what glucose level should hypoglycemia be treated? A: Treat at **<70 mg/dL** and reassess glucose after **15 minutes** following therapy.\n- Q: Why should basal insulin not be stopped in type 1 diabetes when NPO? A: Basal insulin prevents ketosis; stopping it can rapidly precipitate **DKA** even without severe hyperglycemia.\n- Q: How long before stopping an IV insulin infusion should basal insulin be given? A: Give long-acting basal insulin **2–4 hours** before stopping the infusion to prevent rebound hyperglycemia/ketosis.\n\n## Guidelines & Key References (3–5 bullets)\n- American Diabetes Association. Standards of Care in Diabetes—2025 (Hospital care/glycemic targets section). https://diabetesjournals.org/care/issue\n- Endocrine Society. Management of Hyperglycemia in Hospitalized Adult Patients in Non-Critical Care Settings (Clinical Practice Guideline, 2022). https://www.endocrine.org/clinical-practice-guidelines\n- Society of Critical Care Medicine. Guidelines/Protocols for glycemic management in critically ill adults (ICU insulin targets and hypoglycemia avoidance). https://www.sccm.org/Clinical-Resources/Guidelines\n- AACE (American Association of Clinical Endocrinology). Inpatient hyperglycemia/insulin therapy resources and consensus guidance (most recent update). https://www.aace.com/clinical-practice/guidelines\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Diabetes mellitus with hyperglycemia; suspected trigger/cause; severity/organ dysfunction criteria; objective evidence (POC glucose trend, A1c if available); treatment/monitoring (basal-bolus initiation, correction scale, qACHS checks)\n- Hypoglycemia due to insulin (iatrogenic) with severity (symptomatic vs severe/needs assistance); objective evidence (lowest glucose, neuro symptoms); treatment given (dextrose/glucagon, infusion); regimen changes to prevent recurrence\n- DKA or suspected DKA with acuity and severity (anion gap metabolic acidosis, ketones/β-hydroxybutyrate, mental status); objective evidence (BMP/VBG/ketones); treatment (IV fluids, insulin infusion, electrolyte monitoring)\n- HHS or suspected HHS with acuity and severity (altered mentation, dehydration, marked hyperglycemia, osmolality); objective evidence (glucose, osmolality, labs); treatment (IV fluids, insulin strategy, monitoring)\n", "outpatient-t2dm-medication-selection.md": "---\nfilename: outpatient-t2dm-medication-selection.md\nid: outpatient-t2dm-medication-selection\ntitle: Outpatient T2DM medication selection\nslug: outpatient-t2dm-medication-selection\ntags: [endocrinology, type-2-diabetes, pharmacotherapy, outpatient, primary-care]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Outpatient T2DM Medication Selection\n\n## Panic Card (3–6 bullets)\n- Rule out emergencies first: check for **DKA/HHS** (anion gap, ketones, osmolality) and treat inpatient if **glucose ≥33.3 mmol/L (≥600 mg/dL)**, **pH <7.30**, **HCO₃⁻ <18 mmol/L**, or altered mentation\n- Treat hypoglycemia now if **glucose <3.9 mmol/L (<70 mg/dL)**; if severe/neuroglycopenic give **dextrose 25 g IV** and reassess in **15 min**\n- If acutely ill/poor intake/dehydrated: hold high-risk agents tonight (SGLT2 inhibitor, metformin if hypoperfusion/hypoxia/AKI risk) and use short-term insulin plan with **fasting target 4.4–7.2 mmol/L (80–130 mg/dL)**\n- Confirm renal/hepatic status before selecting meds: **eGFR**, AST/ALT, and volume status; avoid stacking hypoglycemia risk overnight\n- If discharging: ensure a safe bridge plan (supplies, education, follow-up within **1–4 weeks** if medication changes or A1c markedly above goal)\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Start by defining the goal and urgency: outpatient selection is safest when glucose is stable (no ketones/AMS), the patient can eat reliably, and follow-up is arranged; if symptomatic hyperglycemia, catabolism, or repeated ED visits, prioritize a rapid-acting plan (often insulin) over slow-titration oral therapy\n- Guideline Must Know: Use a person-centered approach that prioritizes cardiorenal benefit, weight goals, hypoglycemia risk, cost/access, and patient preferences; medication choice can be **independent of baseline A1c** when ASCVD/HF/CKD benefit is the priority (ADA Standards of Care in Diabetes—2026)\n- Guideline Must Know: Metformin remains a common foundational option if tolerated and not contraindicated; avoid if **eGFR <30 mL/min/1.73 m²**, and consider dose reduction/heightened monitoring when **eGFR 30–44 mL/min/1.73 m²**; typical start **500 mg PO daily with food**, increase every **7 days** to **1,000 mg PO BID** as tolerated (GI effects limit titration) (ADA 2026; ADA-KDIGO 2022 consensus)\n- Guideline Must Know: In T2DM with CKD, layer organ-protective therapy early: initiate an SGLT2 inhibitor with proven kidney/CV benefit when **eGFR ≥20 mL/min/1.73 m²** (continue even if eGFR later drops); expect reduced glycemic efficacy when **eGFR <45 mL/min/1.73 m²** but kidney/HF benefit persists (ADA 2026; KDIGO 2022)\n- Guideline Must Know: In established ASCVD or high ASCVD risk, select a GLP-1 receptor agonist and/or SGLT2 inhibitor with proven CV benefit regardless of background metformin; if weight loss is desired, prioritize agents with **high/very high weight efficacy** (ADA 2026)\n- Guideline Must Know: In heart failure (HFrEF or HFpEF), prioritize an SGLT2 inhibitor (e.g., empagliflozin **10 mg PO daily** or dapagliflozin **10 mg PO daily**) unless contraindicated; avoid thiazolidinediones in HF due to fluid retention risk (ADA 2026; KDIGO 2022)\n- Guideline Must Know: If A1c is markedly above goal with symptoms or catabolism, or if **A1c >10%** or **random glucose ≥16.7 mmol/L (≥300 mg/dL)** with symptoms, consider insulin initiation rather than stepwise oral escalation; start basal insulin (e.g., insulin glargine **10 units SC nightly** or **0.1–0.2 units/kg**) and titrate by **2 units every 3 days** to fasting **4.4–7.2 mmol/L** while monitoring hypoglycemia (ADA 2026)\n- GLP-1 receptor agonists: good for weight loss and low hypoglycemia risk when not combined with insulin/sulfonylurea; start low and titrate to minimize nausea (examples: semaglutide **0.25 mg SC weekly**, increase every **4 weeks** to **0.5 mg**, then **1 mg**; dulaglutide **0.75 mg SC weekly**, then **1.5 mg**); avoid if history of **medullary thyroid carcinoma/MEN2**; caution with severe gastroparesis\n- Dual GIP/GLP-1 receptor agonist (if available/appropriate): strong A1c and weight efficacy; similar GI cautions; ensure patient can self-inject and has access/coverage; prioritize when obesity/metabolic syndrome is a dominant driver and hypoglycemia avoidance matters\n- SGLT2 inhibitors: counsel on genital mycotic infections, volume depletion, and rare euglycemic DKA; hold during fasting/major illness/surgery and educate on ketone symptoms; consider reducing diuretic dose if hypotension or dehydration risk; avoid in recurrent DKA history\n- DPP-4 inhibitors: modest A1c lowering, weight-neutral, low hypoglycemia risk; useful when GLP-1 RA/SGLT2i not tolerated or cost-prohibitive; renal dose adjustments common (e.g., sitagliptin lower dose in CKD), while linagliptin generally does not require renal adjustment\n- Sulfonylureas: effective and inexpensive but higher hypoglycemia risk (especially with inconsistent meals, older age, CKD); prefer shorter-acting options (e.g., glipizide **2.5–5 mg PO daily**; titrate every **3–7 days**); avoid glyburide due to prolonged hypoglycemia risk\n- Thiazolidinediones (pioglitazone): useful when insulin resistance predominates and cost is a barrier; start **15 mg PO daily**, titrate to **30–45 mg**; avoid in **NYHA III–IV HF**, caution with edema, weight gain, fractures; delayed onset (weeks) makes it poor for rapid control\n- Practical escalation: if not at goal after **~3 months** of adherence/titration, add a second agent with complementary mechanism; avoid duplicate incretin pathway (do not combine GLP-1 RA with DPP-4 inhibitor); when adding insulin to secretagogues, reduce/stop sulfonylurea to lower hypoglycemia risk\n- Special risk contexts to auto-flag: pregnancy (insulin preferred; avoid most non-insulin agents unless specialist-directed), severe CKD/ESRD (favor KDIGO-aligned regimens), cirrhosis (avoid agents with high hypoglycemia risk; insulin may be needed if decompensated), and high QT risk is usually not a limiting factor for common T2DM agents but does matter for interacting meds\n- Confirm Before Proceed: If initiating SGLT2 inhibitor, confirm no active ketosis, no very low-carb/ketogenic diet, and no impending surgery/prolonged fasting; if initiating insulin, confirm patient can obtain supplies, demonstrate injection technique, and has a clear titration and hypoglycemia rescue plan\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Suspected DKA/HHS: **anion gap metabolic acidosis**, positive ketones, **glucose ≥33.3 mmol/L (≥600 mg/dL)**, severe dehydration, or altered mentation\n- Recurrent or severe hypoglycemia: **glucose <3.0 mmol/L (<54 mg/dL)**, seizures, or need for IV dextrose infusion; consider endocrine consult if unexplained or recurrent\n- Pregnancy with hyperglycemia requiring medication initiation or major escalation (endocrine/OB consultation)\n- Advanced CKD with unstable renal function (**rapidly changing creatinine**, **eGFR <20 mL/min/1.73 m²**) when medication changes are needed urgently\n- Inability to ensure outpatient safety: no follow-up, inability to self-administer meds/monitoring, or significant social barriers with high-risk regimens\n\n## Orders to Place Now (3–6 bullets)\n- Order: Hemoglobin A1c — {today if not measured within 3 months}\n- Order: Comprehensive metabolic panel — {include creatinine/eGFR, bicarbonate, liver enzymes}\n- Order: Urine albumin-to-creatinine ratio — {screen annually or if status unknown}\n- Order: Lipid panel — {baseline or annual; nonfasting acceptable per local practice}\n- Order: Diabetes supplies — {glucometer, test strips, lancets; frequency: fasting daily ± pre-dinner}\n- Order: Medication start/titrate plan — {agent name, starting dose, titration schedule, stop/hold rules}\n\n## ABIM Style Question 1\n### Stem\nA 58-year-old man with type 2 diabetes (A1c 8.6%) is seen in clinic. He has prior myocardial infarction and albuminuric CKD with eGFR 48 mL/min/1.73 m². He is on metformin 1,000 mg twice daily and atorvastatin. Blood pressure is controlled on an ACE inhibitor. He wants a medication that will lower cardiovascular and kidney risk and help with glycemic control. Which is the best next medication?\n### Options\nA. Add sitagliptin\nB. Add empagliflozin\nC. Add glyburide\nD. Add pioglitazone\nE. Switch metformin to acarbose\n### Correct answer\nB\n### Rationale\nFor adults with T2DM and established ASCVD and/or CKD, guidelines recommend adding an SGLT2 inhibitor with proven cardiovascular and kidney benefit, and this recommendation can be made irrespective of baseline A1c when cardiorenal risk reduction is the priority. Empagliflozin is appropriate at eGFR 48 mL/min/1.73 m² and provides organ protection beyond glycemic lowering. DPP-4 inhibitors and acarbose do not provide comparable cardiorenal outcome benefits, and glyburide increases hypoglycemia risk.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 62-year-old woman with type 2 diabetes (A1c 8.4%) and obesity is considering an additional agent. She has heart failure with preserved ejection fraction and eGFR 42 mL/min/1.73 m². Two months ago she was hospitalized with diabetic ketoacidosis after several days of vomiting and poor oral intake. She is now stable on metformin and wants to avoid hypoglycemia and lose weight. Which medication is the best choice today?\n### Options\nA. Start empagliflozin\nB. Start dulaglutide\nC. Start glyburide\nD. Start pioglitazone\nE. Start NPH insulin twice daily\n### Correct answer\nB\n### Rationale\nA GLP-1 receptor agonist is preferred here because recent DKA is a key pitfall when considering SGLT2 inhibitors due to the risk of recurrent (including euglycemic) ketoacidosis during illness or reduced intake. GLP-1 receptor agonists provide effective A1c lowering with weight loss and low hypoglycemia risk when not paired with secretagogues or insulin. The pitfall is recent DKA, which shifts selection away from SGLT2 inhibitors despite HF benefit.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: At what eGFR is metformin generally contraindicated? A: Metformin is generally avoided when **eGFR <30 mL/min/1.73 m²**.\n- Q: When can an SGLT2 inhibitor be initiated for kidney/HF protection in CKD per major guidance? A: Initiation is recommended when **eGFR ≥20 mL/min/1.73 m²** for agents with proven benefit.\n- Q: What fasting glucose target is commonly used for outpatient basal insulin titration? A: A typical target is **4.4–7.2 mmol/L (80–130 mg/dL)**.\n- Q: Which pairing should generally be avoided due to overlapping mechanism? A: Avoid combining a **GLP-1 receptor agonist** with a **DPP-4 inhibitor**.\n\n## Guidelines & Key References (3–5 bullets)\n- American Diabetes Association. Standards of Care in Diabetes—2026, Section 9: Pharmacologic Approaches to Glycemic Treatment (2026): https://diabetesjournals.org/care/article/49/Supplement_1/S183/163934/9-Pharmacologic-Approaches-to-Glycemic-Treatment\n- KDIGO. Clinical Practice Guideline for Diabetes Management in Chronic Kidney Disease (2022): https://kdigo.org/wp-content/uploads/2022/10/KDIGO-2022-Clinical-Practice-Guideline-for-Diabetes-Management-in-CKD.pdf\n- ADA & KDIGO. Diabetes Management in Chronic Kidney Disease: Consensus Report (2022): https://diabetesjournals.org/care/article/45/12/3075/147614/Diabetes-Management-in-Chronic-Kidney-Disease-A\n- American Association of Clinical Endocrinology. Comprehensive Type 2 Diabetes Management Algorithm (2023): https://pro.aace.com/clinical-guidance/2023-aace-consensus-statement-comprehensive-type-2-diabetes-management-algorithm\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Type 2 diabetes mellitus with hyperglycemia — acuity {acute on chronic vs chronic}; A1c {x}%; glucose {x} mmol/L; symptoms {polyuria/polydipsia/weight loss}; treatment {basal insulin/GLP-1 RA/SGLT2i started or adjusted}\n- Hypoglycemia due to diabetes therapy — severity {<3.0 mmol/L vs <3.9 mmol/L}; precipitant {missed meal/CKD/insulin dose}; objective glucose {x} mmol/L; treatment {dextrose/glucagon; regimen adjusted}\n- CKD impacting diabetes medication selection — stage {3a/3b/4/5}; eGFR {x} mL/min/1.73 m²; albuminuria {ACR x mg/g}; med changes {metformin dose reduced/held; SGLT2i initiated/continued}\n- Heart failure influencing medication choice — type {HFrEF/HFpEF}; status {compensated/decompensated}; objective evidence {BNP, imaging}; diabetes med decision {SGLT2i prioritized; TZD avoided}\n", "hypoglycemia-evaluation-and-acute-management.md": "---\nfilename: hypoglycemia-evaluation-and-acute-management.md\nid: hypoglycemia-evaluation-and-acute-management\ntitle: Hypoglycemia: evaluation and acute management\nslug: hypoglycemia-evaluation-and-acute-management\ntags: [endocrinology, inpatient, night-float, hypoglycemia, diabetes]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Hypoglycemia: evaluation and acute management\n\n## Panic Card (3–6 bullets)\n- Check glucose NOW (POC) and treat immediately if **<70 mg/dL (3.9 mmol/L)** with symptoms or **<54 mg/dL (3.0 mmol/L)** even if minimal symptoms; do not wait for labs.\n- If awake and can swallow: give **15–20 g** rapid carbohydrate (glucose gel/tablets/juice), recheck in **15 min**, repeat until **≥70 mg/dL**, then give longer-acting carbs/protein if next meal >1 h away.\n- If NPO, vomiting, or altered: give **dextrose 25 g IV** (e.g., **D50W 50 mL IV push**) or **D10W 100–250 mL IV** if limited access/fragile veins; recheck in **10–15 min**.\n- If no IV access: give **glucagon 1 mg IM/SC** (or **3 mg intranasal** if available) and establish IV access urgently; recheck glucose every **10–15 min**.\n- Recurrent/persistent hypoglycemia or insulin secretagogue suspected: start **D10 infusion** titrated to **glucose 100–180 mg/dL**, and for sulfonylurea/meglitinide consider **octreotide 50–100 mcg SQ q6h**; call ICU/toxicology/endocrine early.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Hypoglycemia on nights is a “can’t miss” cause of delirium, seizure, focal deficits, falls, and cardiac events; treat first, then investigate. Confirm with repeat sampling if perfusion is poor (fingerstick can be unreliable), but do not delay therapy in a symptomatic patient.\n- Define severity clinically and biochemically: alert value **<70 mg/dL (3.9 mmol/L)**, clinically significant **<54 mg/dL (3.0 mmol/L)**, and severe hypoglycemia as any episode requiring assistance (often with neuroglycopenia: confusion, seizure, coma). Document symptoms, nadir, and response.\n- Guideline Must Know: In hospitalized adults, prioritize safety over tight control; typical inpatient glucose targets are **100–180 mg/dL** for most noncritical patients, and institutions should use standardized hypoglycemia protocols integrated into order entry (ADA Standards of Care—Hospital, 2026; Endocrine Society inpatient guideline, 2022).\n- Guideline Must Know: For conscious patients who can swallow, use fast-acting oral glucose **15–20 g** with glucose recheck in **15 minutes** and repeat until **≥70 mg/dL**, then prevent recurrence with longer-acting carbohydrate/protein if not eating soon (ADA Standards—Hypoglycemia section, 2026).\n- Separate “must happen now” vs “can wait”: must now—airway/mental status assessment, immediate carbohydrate/dextrose/glucagon, frequent glucose checks, stop offending agents, and ensure nutrition/IV dextrose if NPO; can wait—full etiologic workup after stabilization and review of inpatient insulin strategy.\n- Common inpatient causes at night: excess basal insulin (especially if poor intake), prandial insulin given without meal, insulin stacking with correction doses, reduced clearance in **CKD/ESRD**, hepatic failure, sepsis, adrenal insufficiency, malnutrition, alcohol, and drug interactions. Always ask: “What changed today—NPO, procedure, dialysis, appetite, steroids stopped?”\n- Guideline Must Know: Treat altered mental status or NPO hypoglycemia with IV dextrose—common adult doses include **25 g IV** (e.g., D50W 50 mL) or **D10W** bolus if preferred; reassess glucose in **10–15 min** and repeat as needed, then transition to infusion/enteral intake to prevent rebound (ADA Hospital Care, 2026).\n- If recurrent: give a longer “bridge” after the initial correction—start **D10W infusion** (e.g., 50–150 mL/h) and titrate to maintain **100–180 mg/dL**, with POC checks every **15–30 min** until stable, then space to q1–2 h; add dextrose-containing maintenance fluids if NPO and insulin still on board.\n- Guideline Must Know: Sulfonylurea/meglitinide hypoglycemia is often prolonged and recurrent because dextrose stimulates more insulin release; use **octreotide** to suppress insulin secretion (typical **50–100 mcg SQ q6h**, sometimes q8h), plus dextrose and observation—especially in older adults and **CKD/ESRD** (toxicology literature and endocrine case series support; consider toxicology consult).\n- “Confirm Before Proceed” warning: do not empirically give large, repeated dextrose boluses without a plan for recurrence—patients can “yo-yo” between severe lows and hyperglycemia, especially with secretagogues. Confirm medication exposure (home meds, inpatient MAR), nutrition status, and renal/hepatic function, and place a structured monitoring order.\n- Evaluation after stabilization should be targeted: review insulin timing/dose and nutrition, check BMP (renal function, potassium), LFTs, infection markers if suspected, cortisol if features of adrenal insufficiency (refractory hypotension, hyponatremia, eosinophilia), and consider insulin/C-peptide/sulfonylurea screen only if unexplained or non–diabetes patient. In diabetes patients with a clear iatrogenic trigger, extensive endocrine workup rarely helps overnight.\n- Special contexts that change management: **ESRD** (prolonged insulin effect; reduced gluconeogenesis), **cirrhosis** (low glycogen stores; recurrent lows), sepsis (high variability; consider ICU), and QT-prolonging risk (hypoglycemia can precipitate arrhythmias). If on beta-blockers, adrenergic symptoms may be blunted—depend on neuroglycopenic signs and frequent checks.\n- Guideline Must Know: For patients receiving enteral or parenteral nutrition, interruptions are a major cause of hypoglycemia; if feeds stop unexpectedly, start dextrose promptly and hold prandial insulin while continuing thoughtfully reduced basal insulin to prevent ketosis (Endocrine Society inpatient guideline, 2022; ADA Hospital Care, 2026).\n- Prevent the next episode tonight: hold further prandial/correction insulin until stable and eating; reduce or temporarily hold basal insulin depending on cause and timing (e.g., if basal given recently and intake poor, use dextrose rather than “chasing” with more insulin adjustments alone); coordinate with day team/endocrine for regimen redesign.\n- When to call ICU/consults: ICU for airway compromise, seizures, persistent neuro deficits, need for high-rate dextrose infusion, or recurrent severe episodes; endocrine for brittle diabetes, pump/CGM management questions, or unclear insulin strategy; toxicology for suspected sulfonylurea/insulin overdose or intentional ingestion; neurology only after glucose normalized if focal deficits persist.\n- Documentation/patient safety pearls: record nadir glucose, symptoms, treatment given (dose/route/time), response, recurrence, suspected cause, and prevention steps (insulin held/adjusted, nutrition plan, monitoring frequency). Ensure a hypoglycemia order set is active and bedside staff know the recheck interval and escalation pathway.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Recurrent hypoglycemia despite initial therapy (e.g., **≥2 episodes <54 mg/dL** or any severe episode requiring assistance) or inability to maintain glucose **>70 mg/dL** without continuous dextrose.\n- Any seizure, coma, persistent altered mental status, or focal neurologic deficit after glucose corrected to **≥100 mg/dL**.\n- Requirement for escalating dextrose support (e.g., repeated **25 g IV** boluses or **D10 infusion ≥150 mL/h** to maintain target) or concern for intentional overdose/secretagogue toxicity.\n- Suspected sulfonylurea/meglitinide exposure with recurrent lows, especially with **CKD/ESRD**, or need for octreotide/extended monitoring; involve toxicology/endocrine early.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Hypoglycemia protocol — {POC glucose frequency q15min until ≥100 mg/dL then q1–2h, notify provider thresholds, nutrition plan}\n- Order: Point-of-care glucose monitoring — {q15min x4 then q1h, adjust per stability}\n- Order: Dextrose 50% IV push — {25 g = 50 mL IV now; may repeat q10–15min PRN if glucose <70 mg/dL}\n- Order: Dextrose 10% infusion — {start 75 mL/h; titrate 25–50 mL/h to target glucose 100–180 mg/dL}\n- Order: Glucagon — {1 mg IM/SC once if no IV access or cannot give IV dextrose}\n- Order: Octreotide — {50–100 mcg SQ q6h for suspected sulfonylurea/meglitinide-related recurrent hypoglycemia; hold once stable ≥12–24h}\n\n## ABIM Style Question 1\n### Stem\nA 62-year-old man with type 2 diabetes is admitted for pneumonia. He is NPO for a bronchoscopy scheduled this morning. Overnight he becomes diaphoretic and confused. Point-of-care glucose is 42 mg/dL (2.3 mmol/L). He has a peripheral IV in place and is protecting his airway. Which is the best immediate management?\n\n### Options\nA. Administer 1 mg glucagon intramuscularly and recheck glucose in 1 hour  \nB. Administer 25 g IV dextrose now and recheck glucose in 10–15 minutes  \nC. Start regular insulin infusion targeting glucose 110–140 mg/dL  \nD. Give 1 L normal saline bolus and recheck glucose in 30 minutes  \nE. Hold all insulin and reassess at morning rounds\n\n### Correct answer\nB\n\n### Rationale\nSymptomatic hypoglycemia with glucose **<54 mg/dL** in an inpatient who is NPO should be treated immediately with **IV dextrose (typically 25 g)** with glucose reassessment in **10–15 minutes**, then ongoing dextrose/nutrition planning to prevent recurrence. ADA hospital standards emphasize prompt treatment with standardized hypoglycemia protocols and frequent rechecks; glucagon is reserved when IV access is not available or oral intake is not possible.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 78-year-old woman with type 2 diabetes and stage 4 chronic kidney disease is admitted for heart failure exacerbation. Her home medication list includes glipizide. Overnight she is found somnolent with glucose 36 mg/dL (2.0 mmol/L). She receives 25 g IV dextrose with improvement, but her glucose falls again to 44 mg/dL (2.4 mmol/L) 45 minutes later despite eating. Which is the best next step to prevent recurrent hypoglycemia?\n\n### Options\nA. Increase basal insulin dose to prevent glucose variability  \nB. Administer octreotide subcutaneously and continue dextrose support with close monitoring  \nC. Administer additional dextrose boluses only when glucose is <54 mg/dL  \nD. Start metformin to reduce hepatic glucose output  \nE. Give 1 mg glucagon intramuscularly every hour as needed\n\n### Correct answer\nB\n\n### Rationale\nThe pitfall is **insulin secretagogue–induced recurrent hypoglycemia**, which is more prolonged in **CKD**; dextrose can trigger further insulin release and cause rebound lows. **Octreotide (e.g., 50–100 mcg SQ q6h)** suppresses insulin secretion and reduces recurrence while dextrose and monitoring maintain safe glucose. What changed the decision here?\n\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What glucose threshold defines clinically significant hypoglycemia in ADA standards? A: **<54 mg/dL (3.0 mmol/L)**.\n- Q: In an awake patient who can swallow, what is the standard immediate carbohydrate dose for mild-to-moderate hypoglycemia? A: **15–20 g** rapid-acting carbohydrate with recheck in **15 minutes**.\n- Q: What is a typical adult IV dextrose dose for symptomatic inpatient hypoglycemia? A: **25 g IV dextrose** (e.g., D50W 50 mL) with recheck in **10–15 minutes**.\n- Q: When should octreotide be considered in hypoglycemia management? A: Recurrent or prolonged hypoglycemia due to **sulfonylurea/meglitinide** exposure, especially with renal impairment.\n\n## Guidelines & Key References (3–5 bullets)\n- American Diabetes Association. Standards of Care in Diabetes—2026: Glycemic Goals, Hypoglycemia, and Hyperglycemic Crises (Section 6). https://professional.diabetes.org/standards-of-care\n- American Diabetes Association. Standards of Care in Diabetes—2026: Diabetes Care in the Hospital (Section 16). https://diabetesjournals.org/care/article/49/Supplement_1/S339/163925/16-Diabetes-Care-in-the-Hospital-Standards-of-Care\n- Endocrine Society Clinical Practice Guideline. Management of Hyperglycemia in Hospitalized Adult Patients in Non-Critical Care Settings (2022). https://www.endocrine.org/clinical-practice-guidelines/inpatient-hyperglycemia-guideline-resources\n- The Journal of Clinical Endocrinology & Metabolism. Endocrine Society Inpatient Hyperglycemia Guideline full text (2022). https://academic.oup.com/jcem/article/107/8/2101/6605637\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Hypoglycemia — {acuity: acute/recurrent/severe} — {cause: insulin-related/secretagogue-related/poor intake/renal failure/sepsis/other} — {severity/organ dysfunction: altered mental status/seizure/need for assistance} — {objective: nadir glucose, symptoms, response to therapy} — {treatment: IV dextrose/infusion/glucagon/octreotide, monitoring frequency}\n- Drug-induced hypoglycemia — {agent: insulin type/dose or sulfonylurea/meglitinide} — {context: NPO/interrupted feeds/dose timing error} — {objective: glucose trend, recurrence} — {treatment/mitigation: held/adjusted regimen, dextrose support}\n- Hypoglycemia with renal impairment — {CKD stage/ESRD} — {mechanism: reduced clearance/prolonged effect} — {objective: creatinine/eGFR, glucose recurrence} — {treatment: dextrose infusion, consults}\n- Hypoglycemia with acute encephalopathy — {mental status findings} — {objective: glucose at symptom onset and after correction} — {treatment: airway/IV dextrose, neuro checks} — {plan: monitoring and prevention steps}\n", "diabetic-ketoacidosis-dka.md": "---\nfilename: diabetic-ketoacidosis-dka.md\nid: diabetic-ketoacidosis-dka\ntitle: Diabetic Ketoacidosis (DKA)\nslug: diabetic-ketoacidosis-dka\ntags: [endocrinology, diabetes, inpatient, night-float, critical-care, metabolic-acidosis]\nlevel: resident\nestimatedtimemin: 18\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Diabetic Ketoacidosis (DKA)\n\n## Panic Card (3–6 bullets)\n- Airway/breathing/circulation first: place on monitor, large-bore IV x2, start **0.9% sodium chloride 1 L** (or balanced crystalloid) over **1 hour** if not volume overloaded, and send stat labs (BMP, VBG/ABG, β-hydroxybutyrate, CBC).  \n- Confirm Before Proceed: do not start insulin until potassium is known; if **K⁺ <3.3 mmol/L**, hold insulin and replete potassium first to **≥3.3 mmol/L**.  \n- Start IV regular insulin once K⁺ safe: **0.1 units/kg/hour** infusion (consider no bolus) and titrate to drop glucose by **50–75 mg/dL/hour** while closing the anion gap.  \n- Potassium strategy: if **K⁺ 3.3–5.2**, add **20–30 mmol KCl per liter** IV fluids; if **K⁺ >5.2**, hold K and recheck frequently; continuous ECG if K abnormal.  \n- Add dextrose when glucose reaches **200–250 mg/dL (11.1–13.9 mmol/L)** and continue insulin until ketoacidosis resolves; do not stop insulin just because glucose normalized.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- DKA is an acute, life-threatening hyperglycemic crisis defined by ketosis and metabolic acidosis, often triggered by infection, insulin omission, myocardial ischemia, pancreatitis, steroids, or new-onset diabetes; on nights, the danger is delayed recognition, missed precipitant, and premature insulin discontinuation when glucose improves but the anion gap remains open.\n- What must happen now: confirm the diagnosis with bedside glucose plus ketones (prefer **β-hydroxybutyrate**) and acid-base status (VBG is usually sufficient), begin aggressive but thoughtful volume resuscitation, and initiate an insulin plus potassium plan with high-frequency monitoring.\n- Guideline Must Know: The 2024 ADA/EASD/JBDS/AACE/DTS hyperglycemic crises consensus emphasizes a simplified treatment pathway focused on **fluids, insulin, and potassium**, with **quantitative β-hydroxybutyrate** preferred for diagnosis, severity assessment, and resolution decisions when available.\n- Guideline Must Know: Initial fluid resuscitation is the first therapy—typically isotonic crystalloid (0.9% sodium chloride or balanced crystalloid); reassess frequently for shock, heart failure, or CKD, and aim to restore perfusion while avoiding iatrogenic overload.\n- Guideline Must Know: Insulin is IV regular insulin infusion **0.1 units/kg/hour** (with or without a bolus depending on protocol); the practical bedside target is glucose fall **50–75 mg/dL/hour** and steady closure of the anion gap rather than chasing rapid euglycemia.\n- Guideline Must Know: Potassium determines the sequence—if **K⁺ <3.3 mmol/L**, insulin must be held and potassium replaced first; if **K⁺ 3.3–5.2**, replace **20–30 mmol/L** in fluids; if **K⁺ >5.2**, hold replacement and recheck often because insulin and fluids will lower K.\n- Guideline Must Know: Add dextrose when glucose falls to **200–250 mg/dL** and continue insulin to clear ketones and close the anion gap; the goal is resolution of ketoacidosis, not normal glucose, so dextrose is a tool to safely keep insulin running.\n- Guideline Must Know: Bicarbonate is rarely indicated in adults; consider only in extreme acidemia (classic threshold **pH <6.9**) with careful potassium monitoring, because bicarbonate can worsen hypokalemia and does not speed routine DKA recovery.\n- Monitoring cadence that prevents disasters: bedside glucose **q1 hour** on IV insulin; electrolytes/anion gap (BMP) and venous pH/CO₂ **q2–4 hours** until stable; strict I/O and frequent vitals, with attention to mental status and perfusion as markers of improvement or missed pathology.\n- ICU vs floor decision: uncomplicated mild DKA in a reliable patient may be managed in a monitored non-ICU setting if nursing ratios allow hourly glucose checks and rapid titration; however, altered mental status, severe acidosis, shock, or high oxygen/ventilation needs should push to ICU-level care.\n- Night-float pitfall: “anion gap closed” can be confounded by mixed disorders; follow a consistent endpoint (anion gap normalized and/or **β-hydroxybutyrate <0.6 mmol/L** when available, with pH and bicarbonate recovering) and ensure the patient can eat and is clinically improving before transition.\n- Transition off the drip is a common failure point: give long-acting basal insulin (e.g., insulin glargine) **1–2 hours before** stopping IV insulin to prevent rebound ketosis; if the patient has no home regimen, estimate total daily dose conservatively and adjust to renal function and nutrition status.\n- Always look for the trigger and treat it: cultures/imaging when indicated, ECG/troponin if ischemia suspected, medication review for steroid/SGLT2 inhibitor exposure, and assess adherence barriers; missing the precipitant is a major cause of recurrence within 24–72 hours.\n- Special risk context to auto-flag: SGLT2 inhibitors can cause **euglycemic DKA** (near-normal glucose with high ketones and acidosis), and vomiting/starvation can mimic or worsen ketosis; treat true euglycemic DKA with insulin plus early dextrose, not “fluids only.”\n- Practical electrolyte notes: phosphate replacement is not routine but consider if **phosphate <1.0 mg/dL (0.32 mmol/L)** or if respiratory muscle weakness, heart failure, or hemolysis is present; magnesium deficiency can worsen arrhythmias and make potassium repletion difficult.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Hemodynamic instability: **SBP <90 mmHg**, lactate rising, need for vasopressors, or persistent tachycardia with poor perfusion despite fluids.\n- Severe acidemia or neurologic compromise: **pH <7.00**, inability to protect airway, seizures, or worsening altered mental status.\n- Refractory electrolyte danger: **K⁺ <3.3 mmol/L**, **K⁺ >6.0 mmol/L**, malignant arrhythmias, or rapidly changing electrolytes requiring continuous monitoring.\n- Mixed crisis or complexity: suspected DKA/HHS overlap with very high osmolality, severe CKD/ESRD, decompensated heart failure, or pregnancy physiology concerns requiring higher-acuity support.\n\n## Orders to Place Now (3–6 bullets)\n- Order: DKA initial labs — {BMP_q2-4h, VBG_now_and_q2-4h, beta_hydroxybutyrate_now_and_q2-4h_if_available, CBC, magnesium, phosphate, lactate_if_shock}\n- Order: IV fluids — {crystalloid_type, initial_rate_1L_over_1h, reassess_interval_min, heart_failure_ckd_adjustment}\n- Order: Regular insulin infusion protocol — {start_rate_units_per_kg_per_h, glucose_drop_target_mgdl_per_h, bedside_glucose_q1h}\n- Order: Potassium replacement protocol — {if_K_less_than_3.3_hold_insulin, K_repletion_route_IV, K_in_fluids_mmol_per_L, ECG_monitoring_if_abnormal_K}\n- Order: Dextrose-containing fluids when threshold met — {add_dextrose_when_glucose_mgdl_200_to_250, fluid_choice_D5_halfNS_or_D10, keep_insulin_running_until_gap_closed}\n- Order: Trigger evaluation — {blood_cultures_if_fever, urinalysis, chest_xray_if_respiratory_symptoms, ECG_troponin_if_ischemia_concern}\n\n## ABIM Style Question 1\n### Stem\nA 27-year-old man with type 1 diabetes presents with abdominal pain, vomiting, and Kussmaul respirations. Labs show glucose 520 mg/dL, anion gap 28, bicarbonate 10 mmol/L, and β-hydroxybutyrate elevated. His potassium is 2.9 mmol/L. Blood pressure is 110/70 mmHg and he is alert. After starting isotonic IV fluids, what is the next best step?\n### Options\nA. Start IV regular insulin infusion at 0.1 units/kg/hour immediately  \nB. Administer sodium bicarbonate infusion to correct acidosis  \nC. Give IV potassium replacement and delay insulin until potassium is corrected  \nD. Start subcutaneous rapid-acting insulin every 2 hours without potassium replacement  \nE. Restrict fluids and give furosemide to prevent cerebral edema\n### Correct answer\nC\n### Rationale\nInsulin will shift potassium intracellularly and can precipitate life-threatening arrhythmias when **K⁺ <3.3 mmol/L**, so potassium must be replaced before insulin is started. Standard DKA pathways prioritize fluids first, then insulin only after potassium is safe, with ongoing potassium replacement during treatment.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 54-year-old woman with type 2 diabetes on an SGLT2 inhibitor is admitted with nausea and tachypnea. Glucose is 184 mg/dL, anion gap is 24, bicarbonate is 12 mmol/L, venous pH is 7.22, and β-hydroxybutyrate is markedly elevated. She received 2 liters of isotonic crystalloid in the ED and remains tachypneic. What is the best next step?\n### Options\nA. Continue isotonic fluids only because glucose is not severely elevated  \nB. Start IV regular insulin infusion and begin dextrose-containing fluids to allow continued insulin  \nC. Give sodium bicarbonate because glucose is <200 mg/dL  \nD. Administer glucagon and observe for spontaneous resolution  \nE. Stop all insulin to avoid hypoglycemia and treat with oral carbohydrates\n### Correct answer\nB\n### Rationale\nThis is euglycemic DKA, a pitfall associated with SGLT2 inhibitors: significant ketosis and acidosis can occur despite only modest hyperglycemia. Treat with insulin to suppress ketogenesis and add dextrose early to prevent hypoglycemia while continuing insulin until the anion gap and ketones resolve. What changed the decision here?\n\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What potassium level requires holding insulin in DKA? A: K⁺ <3.3 mmol/L.\n- Q: When should dextrose be added to IV fluids during DKA treatment? A: When glucose reaches about 200–250 mg/dL (11.1–13.9 mmol/L) while ketoacidosis persists.\n- Q: What is the typical insulin infusion starting dose for adult DKA? A: Regular insulin 0.1 units/kg/hour IV infusion.\n- Q: When is bicarbonate generally considered in adult DKA? A: In severe acidemia, classically when pH is <6.9.\n\n## Guidelines & Key References (3–5 bullets)\n- Hyperglycemic Crises in Adults With Diabetes: A Consensus Report (ADA/EASD/JBDS/AACE/DTS) (2024) — https://diabetesjournals.org/care/article/47/8/1257/156808/Hyperglycemic-Crises-in-Adults-With-Diabetes-A\n- Hyperglycaemic crises in adults with diabetes: a consensus report (Diabetologia PDF) (2024) — https://link.springer.com/content/pdf/10.1007/s00125-024-06183-8.pdf\n- Standards of Care in Diabetes—2026: Diabetes Care in the Hospital (ADA) (2026) — https://diabetesjournals.org/care/article/49/Supplement_1/S339/163925/16-Diabetes-Care-in-the-Hospital-Standards-of-Care\n- The Management of Diabetic Ketoacidosis in Adults (JBDS 02) (2023) — https://abcd.care/sites/default/files/site_uploads/JBDS_Guidelines_Current/JBDS_02_DKA_Guideline_with_QR_code_March_2023.pdf\n- Understanding Diabetic Ketoacidosis (DKA) in Clinical Practice (ADA clinician handout) (2024) — https://professional.diabetes.org/sites/dpro/files/2024-12/understanding-dka.pdf\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Diabetic ketoacidosis — acuity: {mild/moderate/severe} — evidence: {anion_gap, beta_hydroxybutyrate_or_ketones, pH, bicarbonate, glucose} — treatment: {IV_fluids, insulin_infusion_rate, electrolyte_protocol}\n- Acute metabolic acidosis due to {DKA} — severity: {pH, bicarbonate} — evidence: {VBG_or_ABG, anion_gap} — treatment/monitoring: {serial_VBG, BMP_q2-4h}\n- Hypovolemia/dehydration due to {osmotic_diuresis_from_hyperglycemia} — evidence: {tachycardia, orthostasis, BUN_creatinine, I_O} — treatment: {crystalloid_type_and_total_volume}\n- Electrolyte derangement: hypokalemia or hyperkalemia due to {DKA_and_insulin_shift} — evidence: {K_value, ECG_findings_if_any} — treatment: {K_repletion_plan_or_hold, telemetry}\n- Precipitating factor for DKA: {infection/insulin_omission/MI/SGLT2_inhibitor/other} — evidence: {cultures_imaging_ECG_troponin_history} — treatment: {antibiotics_or_other_specific_therapy}\n", "euglycemic-dka.md": "---\nfilename: euglycemic-dka.md\nid: euglycemic-dka\ntitle: Euglycemic DKA\nslug: euglycemic-dka\ntags: [endocrinology, diabetic-ketoacidosis, sglt2-inhibitors, inpatient, night-float, metabolic-acidosis]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Euglycemic DKA\n\n## Panic Card (3–6 bullets)\n- Airway/breathing/circulation, place on monitor, large-bore IVs; treat shock with balanced crystalloid **1–2 L** then reassess; target **MAP ≥65 mmHg** and urine output as able.\n- Suspect euDKA when high anion gap metabolic acidosis + ketones with glucose **<250 mg/dL (13.9 mmol/L)**; send STAT **VBG/ABG**, BMP, **β-hydroxybutyrate**, lactate, Mg/Phos, CBC, UA, cultures if infectious trigger.\n- Start DKA therapy even if glucose “normal”: IV regular insulin **0.05–0.1 units/kg/h** plus early dextrose (e.g., **D10** infusion) to keep glucose **150–200 mg/dL (8.3–11.1 mmol/L)** while closing the anion gap.\n- Potassium first: if **K⁺ <3.3 mmol/L**, hold insulin and replete K⁺ aggressively; if **K⁺ 3.3–5.2**, give **20–30 mEq KCl per liter** fluids; if **K⁺ >5.2**, no K⁺ initially but recheck **q2h**.\n- Immediately stop the trigger: hold **SGLT2 inhibitor**, stop fasting/ketogenic intake, treat precipitant (infection/MI/PE), and consider ICU early if severe acidosis, altered mental status, or escalating oxygen/pressor needs.\n- Confirm Before Proceed: do not give bicarbonate unless profound acidemia (typically **pH ≤6.9–7.0**) and after ensuring ventilation and potassium monitoring, because bicarbonate can worsen **hypokalemia** and delay ketone clearance.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Euglycemic DKA (euDKA) is DKA with significant ketosis and anion gap metabolic acidosis but only mild-to-moderate hyperglycemia; most commonly occurs with **SGLT2 inhibitors**, prolonged fasting/poor intake, perioperative stress, vomiting, pregnancy, alcohol use, pancreatitis, or relative insulin deficiency in type 1 or insulin-treated type 2 diabetes.\n- Guideline Must Know: Diagnosis hinges on the triad: **anion gap metabolic acidosis** (low bicarbonate and/or **pH <7.3**), **ketonemia** (prefer **β-hydroxybutyrate**), and diabetes context; do not be reassured by glucose **<250 mg/dL**—euDKA is a recognized hyperglycemic crisis phenotype in modern consensus guidance.\n- Guideline Must Know: Order the right ketone test—urine ketones can underestimate severity because they detect acetoacetate; **β-hydroxybutyrate** is the predominant ketone in DKA and is preferred for diagnosis and for tracking resolution (**falling β-hydroxybutyrate and closing anion gap**).\n- Initial workup on nights: VBG/ABG (pH), BMP (anion gap, bicarbonate, creatinine), serum **β-hydroxybutyrate**, lactate, Mg/Phos, CBC; ECG (K⁺ effects/ischemia), troponin if concern; consider lipase, tox screen (salicylates), ethanol level, and pregnancy test when applicable; assess for infection, MI, stroke, PE, or insulin omission.\n- Key differentiation: euDKA can mimic sepsis/lactic acidosis, starvation ketosis, alcoholic ketoacidosis, or toxic ingestions; in euDKA, the **anion gap is typically high**, bicarbonate is low, and **β-hydroxybutyrate is elevated**, often disproportionate to the glucose level.\n- Guideline Must Know: Treatment principles mirror DKA—**fluids + insulin + electrolyte management + precipitant control**—but dextrose must be started earlier because insulin is required to suppress ketogenesis even when glucose is not high; aim to maintain glucose **150–200 mg/dL** while clearing ketones.\n- Fluids: start isotonic crystalloid (balanced crystalloid or 0.9% saline) and reassess frequently (lungs, JVP, MAP, urine output, bedside ultrasound); typical approach is **1–1.5 L** in the first hour if no contraindication, then adjust rate based on hemodynamics and comorbid heart/renal failure.\n- Insulin: IV regular insulin **0.05–0.1 units/kg/h** after confirming **K⁺ ≥3.3 mmol/L**; avoid “small insulin” approaches—insufficient insulin prolongs ketogenesis; titrate to close the anion gap and normalize bicarbonate/pH rather than to lower glucose.\n- Dextrose strategy (night-float pitfall): start **D5** or **D10** early (often immediately with insulin in euDKA) to prevent hypoglycemia; increase dextrose concentration/rate as needed while continuing insulin until metabolic endpoints are met (**anion gap closed**, bicarbonate recovering, ketones clearing).\n- Guideline Must Know: Potassium management is time-critical—total body K⁺ is depleted even if initial K⁺ is normal/high; insulin will drop K⁺ quickly; check K⁺ **q2h** initially, replete to keep **K⁺ 4.0–5.0 mmol/L** when feasible, and monitor Mg/Phos (replace if symptomatic or severe depletion).\n- Guideline Must Know: Bicarbonate is generally avoided unless severe acidemia (commonly **pH ≤6.9–7.0**) or life-threatening hyperkalemia with acidemia; if used, do so in ICU-level monitoring with frequent blood gases and potassium checks.\n- Stopping the trigger: discontinue **SGLT2 inhibitor** immediately; provide sick-day education at discharge; if perioperative or NPO-related, ensure adequate carbohydrate intake and basal insulin continuation where appropriate—euDKA frequently follows insulin dose reduction or prolonged fasting.\n- Guideline Must Know: For planned surgery/procedures, safety communications and perioperative guidance recommend stopping **canagliflozin, dapagliflozin, empagliflozin at least 3 days** before and **ertugliflozin at least 4 days** before scheduled surgery to reduce postoperative ketoacidosis risk.\n- Monitoring on the floor vs ICU: check glucose **q1h** while on insulin infusion; BMP/VBG **q2–4h** (anion gap, bicarbonate, K⁺); strict I/Os; watch for cerebral edema is rare in adults but rapid osmotic shifts and overcorrection can still harm—avoid overly rapid changes, and reassess mental status often.\n- Transition off drip: continue insulin infusion until **anion gap closed** and patient is able to eat; then give long-acting basal insulin (or resume home basal) and overlap IV insulin for **1–2 hours** to prevent rebound ketosis; ensure the dextrose infusion can be tapered only after ketogenesis has stopped.\n- When to call consultants at night: endocrine for recurrent euDKA, unclear phenotype (type 1 vs ketosis-prone type 2 vs pancreatogenic), insulin pump/CGM issues, or repeated SGLT2-related episodes; consider toxicology for suspected ingestions; involve surgery/anesthesia if perioperative.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **pH ≤7.1**, bicarbonate **≤10 mmol/L**, or rapidly worsening acidosis despite fluids/insulin within **2–4 hours**.\n- Hemodynamic instability: **MAP <65 mmHg** after adequate fluid challenge, need for vasopressors, or rising lactate with concern for shock.\n- Respiratory compromise: need for **high-flow oxygen**, noninvasive ventilation, or signs of impending fatigue/Kussmaul breathing with altered mentation.\n- Electrolyte danger: **K⁺ <3.3 mmol/L** (cannot safely give insulin), refractory **K⁺ >6.0 mmol/L** or malignant arrhythmias, or severe hypophosphatemia with respiratory weakness.\n- Altered mental status, seizures, inability to protect airway, or suspected concomitant MI/PE/stroke requiring urgent specialty management.\n\n## Orders to Place Now (3–6 bullets)\n- Order: DKA/Hyperglycemic Crisis Evaluation Labs — {BMP q2–4h, VBG/ABG q2–4h, serum beta-hydroxybutyrate now and q4–6h, Mg/Phos q4–6h, CBC, lactate, UA, blood cultures x2 if febrile, troponin/ECG if indicated}\n- Order: IV Fluid Resuscitation — {balanced crystalloid or 0.9% saline bolus 1000 mL now then 250–500 mL/h; adjust for HF/CKD; strict I&O}\n- Order: Regular Insulin Infusion (DKA protocol) — {start 0.05–0.1 units/kg/h after K≥3.3; glucose checks q1h; titrate to close anion gap}\n- Order: Dextrose Infusion with Insulin — {D10W at 100–150 mL/h or per protocol; titrate to maintain glucose 150–200 mg/dL while continuing insulin}\n- Order: Potassium Replacement Protocol — {if K 3.3–5.2 add 20–30 mEq KCl per liter; if K<3.3 give 40 mEq/h as tolerated and hold insulin; recheck K q2h}\n- Order: Medication Hold — {discontinue SGLT2 inhibitor; hold metformin if acidosis/AKI/hypoperfusion; review for ketogenic diet/fasting orders}\n\n## ABIM Style Question 1\n### Stem\nA 56-year-old man with type 2 diabetes and heart failure is admitted for pneumonia. Home medications include empagliflozin and basal insulin. On hospital day 2 he develops nausea and diffuse abdominal pain. Vitals: T 37.6°C, HR 108, BP 128/74, RR 26, SpO₂ 95% on 2 L. He is breathing deeply. Labs: glucose 178 mg/dL (9.9 mmol/L), Na⁺ 134 mmol/L, K⁺ 4.6 mmol/L, Cl⁻ 98 mmol/L, HCO₃⁻ 12 mmol/L, creatinine 1.4 mg/dL (baseline 1.0), anion gap 24. Lactate is 1.6 mmol/L. Urinalysis shows ketones. What is the best next step in management?\n### Options\nA. Give subcutaneous rapid-acting insulin correction and recheck labs in 4 hours  \nB. Start IV regular insulin infusion and begin dextrose-containing fluids while stopping empagliflozin  \nC. Give IV sodium bicarbonate immediately to normalize pH  \nD. Administer IV furosemide and restrict fluids due to heart failure history  \nE. Treat presumed sepsis with broad-spectrum antibiotics only and avoid insulin because glucose is <200 mg/dL  \n### Correct answer\nB\n### Rationale\nThis presentation is consistent with **euglycemic DKA**: high anion gap metabolic acidosis with ketones and only mild hyperglycemia, commonly precipitated by **SGLT2 inhibitors**. Management requires **IV insulin to suppress ketogenesis** plus early **dextrose-containing fluids** to prevent hypoglycemia while closing the anion gap, and the SGLT2 inhibitor should be discontinued. Bicarbonate is reserved for profound acidemia, and delaying insulin because glucose is not high is a common and dangerous pitfall.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 63-year-old woman with insulin-treated type 2 diabetes and end-stage kidney disease on hemodialysis (anuric) takes dapagliflozin at home. She presents with vomiting and malaise after missing a dialysis session. Vitals: HR 112, BP 146/82, RR 28, SpO₂ 97% on room air. Labs: glucose 164 mg/dL (9.1 mmol/L), K⁺ 6.2 mmol/L, HCO₃⁻ 10 mmol/L, anion gap 26, β-hydroxybutyrate markedly elevated. Lung exam reveals bibasilar crackles and she has 2+ edema. What is the best next step?\n### Options\nA. Give 2 liters of isotonic fluid bolus immediately, then start insulin infusion  \nB. Start insulin infusion with dextrose and treat hyperkalemia while arranging urgent hemodialysis, using cautious fluids  \nC. Hold insulin because she is euglycemic and give only dextrose infusion  \nD. Administer sodium bicarbonate infusion as sole therapy and stop insulin  \nE. Give subcutaneous basal insulin only and discharge after symptom control  \n### Correct answer\nB\n### Rationale\nShe has **euDKA** plus **severe hyperkalemia** and volume overload from **anuric ESKD**, so management requires insulin (with dextrose) to stop ketogenesis, immediate hyperkalemia therapy, and **urgent hemodialysis** for potassium and acid removal while avoiding large fluid boluses. The pitfall is treating euDKA with standard aggressive fluids despite overt volume overload and dialysis dependence. What changed the decision here?\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What glucose range can still be consistent with euDKA? A: DKA can occur with glucose **<250 mg/dL (13.9 mmol/L)** when ketonemia and anion gap metabolic acidosis are present.\n- Q: Which ketone test is preferred to diagnose and trend DKA severity? A: Serum **β-hydroxybutyrate** is preferred over urine ketones.\n- Q: What potassium value requires holding insulin infusion in DKA management? A: **K⁺ <3.3 mmol/L** requires potassium repletion before starting insulin.\n- Q: What is the key endpoint to stop the insulin infusion in euDKA? A: Resolution of ketoacidosis, typically **anion gap closure** with improving bicarbonate/pH and clearing ketones, not a glucose target alone.\n\n## Guidelines & Key References (3–5 bullets)\n- ADA/EASD/JBDS/AACE/DTS: Hyperglycemic Crises in Adults With Diabetes: A Consensus Report (2024) — https://diabetesjournals.org/care/article/47/8/1257/156808/Hyperglycemic-Crises-in-Adults-With-Diabetes-A\n- American Diabetes Association: Standards of Care in Diabetes—2025, Diabetes Care in the Hospital (2025) — https://diabetesjournals.org/care/article/48/Supplement_1/S321/157551/16-Diabetes-Care-in-the-Hospital-Standards-of-Care\n- U.S. FDA: SGLT2 inhibitors label warnings for ketoacidosis and perioperative discontinuation timing (updated through 2022) — https://www.fda.gov/drugs/drug-safety-and-availability/fda-revises-labels-sglt2-inhibitors-diabetes-include-warnings-about-too-much-acid-blood-and-serious\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Acute metabolic acidosis due to diabetic ketoacidosis (euglycemic phenotype) — anion gap {value}, HCO₃⁻ {value}, pH {value}, β-hydroxybutyrate {value}, symptoms {nausea/vomiting/abdominal pain/Kussmaul}\n- Precipitating cause — {SGLT2 inhibitor exposure} and/or {infection/fasting/insulin omission/MI/PE/postop}; include objective evidence {cultures/imaging/troponin/procalcitonin}\n- Severity/organ dysfunction — {AKI with creatinine rise}, {hemodynamic instability}, {altered mental status}, {respiratory distress}; include vitals {HR/RR/BP/O₂}\n- Treatment intensity supporting acuity — {IV insulin infusion}, {dextrose infusion}, {IV fluids with rate/total}, {electrolyte replacement}, {ICU transfer/consults}\n", "hyperosmolar-hyperglycemic-state-hhs.md": "---\nfilename: hyperosmolar-hyperglycemic-state-hhs.md\nid: hyperosmolar-hyperglycemic-state-hhs\ntitle: Hyperosmolar hyperglycemic state (HHS)\nslug: hyperosmolar-hyperglycemic-state-hhs\ntags: [endocrinology, diabetes, hyperglycemic-crisis, inpatient, night-float]\nlevel: resident\nestimatedtimemin: 12\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Hyperosmolar hyperglycemic state (HHS)\n\n## Panic Card (3–6 bullets)\n- ABCs, monitors, 2 large-bore IVs; treat shock with **0.9% sodium chloride 500–1000 mL** then reassess, goal **MAP ≥65 mmHg** and improving mentation/urine output\n- Get POC glucose + STAT labs (BMP, venous blood gas, serum/POC **β-hydroxybutyrate**, serum osmolality if available); calculate osmolality and identify mixed DKA/HHS\n- Start fluids first; aim osmolality fall **3–8 mOsm/kg/h** and avoid Na⁺ change **>8–10 mmol/L/24 h** (or **>4–6** if high risk for ODS)\n- Potassium safety: if **K⁺ <3.3 mmol/L**, give K⁺ and **hold insulin** until **K⁺ ≥3.3 mmol/L**\n- If not improving or severe obtundation, call ICU early; consider airway protection if loss of protective reflexes or rising PaCO₂/aspiration risk\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- HHS is a life-threatening hyperglycemic emergency characterized by severe hyperglycemia, marked hyperosmolality, and profound dehydration with minimal ketosis/acidosis; it commonly presents at night with altered mental status, hypotension, tachycardia, and prerenal AKI, often triggered by infection, MI, stroke, missed insulin, or glucocorticoids/diuretics.\n- Guideline Must Know: Diagnose HHS using a combined clinical-lab pattern: **glucose typically ≥30 mmol/L**, **effective osmolality ≥320 mOsm/kg**, **β-hydroxybutyrate ≤3.0 mmol/L** (or absent/trace ketones), and **pH >7.3** with **bicarbonate ≥15 mmol/L**; if significant ketonemia/acidosis is present, treat as mixed DKA/HHS (insulin earlier/higher intensity).\n- Guideline Must Know: Calculate osmolality using available units and be consistent: effective osmolality ≈ **(2 × Na⁺) + glucose** (mmol/L) and total calculated osmolality often uses **(2 × Na⁺) + glucose + urea** (mmol/L); your bedside target is a gradual fall in effective osmolality of **3–8 mOsm/kg/h** to reduce cerebral edema risk.\n- Guideline Must Know: Fluids are the first and most important therapy because intravascular depletion drives shock, AKI, and hyperosmolality; start **0.9% sodium chloride** with frequent reassessment (lungs, JVP/POCUS, urine output), typically **500–1000 mL in the first hour** if hypotensive, then titrate to restore perfusion while avoiding fluid overload in older adults/HFrEF.\n- Guideline Must Know: Do not start insulin until after initial fluid resuscitation unless there is meaningful ketonemia/acidosis; in “pure” HHS, glucose may fall substantially with fluids alone, and premature insulin can drop osmolality too fast, increasing neurologic risk.\n- Guideline Must Know: When insulin is indicated in HHS, use a lower fixed-rate infusion: **regular insulin 0.05 units/kg/h IV** (no bolus) and titrate to a controlled glucose fall (avoid overly rapid decline); if mixed DKA/HHS or clear DKA physiology, use DKA-style dosing (often **0.1 units/kg/h**) per institutional protocol.\n- Guideline Must Know: Potassium management is a hard stop safety step: if **K⁺ <3.3 mmol/L**, replete and hold insulin; if **K⁺ 3.3–5.0 mmol/L**, add K⁺ to IV fluids (typical **20–40 mmol** per liter depending on level/renal function) to maintain **K⁺ 4.0–5.0 mmol/L**; if **K⁺ >5.0 mmol/L**, avoid K⁺ initially and recheck frequently.\n- Guideline Must Know: Add dextrose once glucose approaches the mid-teens to prevent hypoglycemia while continuing osmolality correction: when glucose is **~14–17 mmol/L**, add **5–10% dextrose** and reduce insulin as needed, aiming glucose **10–15 mmol/L in the first 24 h** while osmolality continues to fall gradually.\n- What must happen now: identify and treat precipitants the same night (cultures/antibiotics if sepsis, ECG/troponin for ACS, neuro assessment/imaging if focal deficits), because HHS mortality is often driven by the underlying illness rather than hyperglycemia itself.\n- What must happen now: monitoring cadence on night float should be explicit: bedside glucose **hourly** while on insulin infusion; vitals and mental status checks at least **q1–2 h** initially; BMP (Na⁺/K⁺/HCO₃⁻/Cr) and calculated osmolality **q2–4 h** until stable; strict I&O with a urine output goal of **≥0.5 mL/kg/h** if not anuric.\n- Pitfall: “Corrected sodium” rises as glucose falls; a rising measured Na⁺ during treatment can be expected and is not automatically a reason to switch to hypotonic fluid, but you must ensure the overall osmolality is trending down within **3–8 mOsm/kg/h** and Na⁺ change stays within **≤8–10 mmol/L/24 h** (or **≤4–6** if high risk for ODS).\n- Pitfall: neurologic decline (worsening confusion, seizures) is an emergency red flag for too-rapid osmolality shifts, stroke, or CNS infection; stop and reassess trajectory, obtain urgent imaging/EEG as indicated, and escalate to ICU.\n- Pitfall: thrombosis risk is high in HHS due to dehydration and hyperviscosity; unless contraindicated, provide pharmacologic VTE prophylaxis and early mobilization planning once stable.\n- When to call ICU/consult: involve ICU for severe obtundation, shock, need for vasopressors, escalating oxygen/ventilation, or inability to safely monitor hourly; involve endocrinology for mixed DKA/HHS, refractory hyperglycemia despite protocol, recurrent HHS, or complex outpatient insulin transition; consult cardiology/nephrology early when fluid strategy is constrained by **HFrEF** or **advanced CKD/ESRD**.\n- Transition off infusion can wait until stable: once mentation/perfusion improved, osmolality trending safely, and the patient is eating, transition to subcutaneous basal-bolus insulin; overlap basal insulin by **1–2 h** before stopping infusion to prevent rebound hyperglycemia, and ensure discharge planning addresses access/adherence and precipitant mitigation.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **GCS ≤12**, seizures, focal neurologic deficit, or worsening mentation despite improving perfusion/osmolality\n- Hemodynamic instability: **SBP <90 mmHg** after **1–2 L** isotonic fluid (or need for vasopressors) or lactate rising/concern for septic shock\n- Respiratory compromise: need for **high-flow oxygen**, noninvasive ventilation, or concern for airway protection/aspiration\n- Severe metabolic derangements: **effective osmolality ≥360 mOsm/kg**, **K⁺ <3.3 mmol/L**, or rapidly changing Na⁺/osmolality outside safe correction targets\n- Significant comorbidity limiting resuscitation (e.g., **HFrEF with pulmonary edema**, **ESRD with oliguria/anuria**) requiring invasive monitoring or specialist co-management\n\n## Orders to Place Now (3–6 bullets)\n- Order: — {IV access} {cardiac/SpO2 monitoring} {q1h bedside glucose} {strict I&O} {daily weight}\n- Order: — {0.9% sodium chloride bolus 500–1000 mL IV now} then {maintenance rate mL/h} with {reassessment interval}\n- Order: — {BMP + Mg + phosphate q2–4h} {VBG now and prn} {β-hydroxybutyrate now} {serum osmolality now if available} {CBC} {UA/urine culture} {blood cultures if febrile} {ECG} {troponin if indicated}\n- Order: — {regular insulin infusion 0.05 units/kg/h IV} with {titration per protocol} and {dextrose 5–10% when glucose 14–17 mmol/L}\n- Order: — {potassium chloride replacement per level} {hold insulin if K<3.3} {target K 4.0–5.0}\n- Order: — {VTE prophylaxis} {agent and dose} unless {contraindication} and {mechanical prophylaxis if needed}\n\n## ABIM Style Question 1\n### Stem\nA 72-year-old man with type 2 diabetes is admitted overnight with confusion and dehydration. Vitals: BP 92/54 mmHg, HR 118/min, RR 18/min, SpO₂ 96% on room air. Labs: glucose 46 mmol/L, Na⁺ 150 mmol/L, K⁺ 4.6 mmol/L, bicarbonate 20 mmol/L, creatinine 240 µmol/L. Venous pH is 7.36 and β-hydroxybutyrate is 1.2 mmol/L. Calculated effective osmolality is 346 mOsm/kg. What is the best next step in management?\n### Options\nA. Start regular insulin infusion at 0.1 units/kg/h immediately with a 0.1 units/kg IV bolus  \nB. Administer 0.9% sodium chloride for intravascular resuscitation and reassess before starting insulin  \nC. Give sodium bicarbonate infusion to correct hyperosmolality and prevent neurologic injury  \nD. Start 0.45% sodium chloride immediately because the sodium is elevated  \nE. Administer subcutaneous rapid-acting insulin every hour and restrict IV fluids to avoid pulmonary edema  \n### Correct answer\nB\n### Rationale\nInitial therapy for HHS prioritizes volume resuscitation with isotonic fluid to restore perfusion and begin gradual osmolality reduction before insulin, unless significant ketonemia/acidosis suggests mixed DKA/HHS. Insulin at DKA doses risks overly rapid glucose/osmolality shifts; bicarbonate is not indicated without severe acidosis.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 68-year-old woman with type 2 diabetes and known HFrEF (EF 20%) presents at 2 AM with lethargy. BP 96/60 mmHg, HR 110/min, RR 22/min, SpO₂ 91% on 2 L nasal cannula with bibasilar crackles. Labs: glucose 44 mmol/L, Na⁺ 148 mmol/L, K⁺ 4.2 mmol/L, bicarbonate 22 mmol/L, β-hydroxybutyrate 1.0 mmol/L; effective osmolality 342 mOsm/kg. CXR shows pulmonary edema. What is the best immediate management approach?\n### Options\nA. Give 2 L of 0.9% sodium chloride as rapidly as possible, then start insulin infusion  \nB. Start insulin infusion first to rapidly lower glucose and improve osmolality without fluids  \nC. Give cautious isotonic fluid in small boluses with close reassessment and early ICU/cardiology co-management  \nD. Switch to 0.45% sodium chloride immediately to correct sodium and prevent cerebral edema  \nE. Give IV bicarbonate to prevent neurologic injury from hyperosmolality  \n### Correct answer\nC\n### Rationale\nThe pitfall is severe HFrEF with active pulmonary edema, which constrains standard aggressive fluid replacement; management requires small isotonic boluses with frequent hemodynamic/respiratory reassessment and early ICU-level monitoring while still targeting gradual osmolality correction. Insulin without addressing perfusion is unsafe, and hypotonic fluids/bicarbonate are not first-line here.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What effective osmolality threshold supports HHS diagnosis in adults? A: Effective osmolality **≥320 mOsm/kg** supports HHS in the right clinical context.\n- Q: When should IV insulin be held due to hypokalemia? A: Hold insulin if **K⁺ <3.3 mmol/L** until potassium is corrected to **≥3.3 mmol/L**.\n- Q: What is the recommended safe rate of effective osmolality decline during HHS treatment? A: Target an effective osmolality fall of **3–8 mOsm/kg/h**.\n- Q: What insulin infusion rate is commonly used for “pure” HHS after fluids? A: Regular insulin **0.05 units/kg/h IV** is commonly used.\n\n## Guidelines & Key References (3–5 bullets)\n- American Diabetes Association (ADA) et al. Hyperglycemic Crises in Adults With Diabetes: Consensus Report, 2024: https://diabetesjournals.org/care/article/47/8/1257/156808/Hyperglycemic-Crises-in-Adults-With-Diabetes-A\n- ADA Standards of Care in Diabetes (Clinical Guidelines hub), 2026 (includes “Diabetes Care in the Hospital” and crisis updates): https://professional.diabetes.org/standards-of-care\n- Joint British Diabetes Societies (JBDS-IP). The Management of Hyperosmolar Hyperglycaemic State (HHS) in Adults, 2022 (PDF): https://abcd.care/sites/default/files/site_uploads/JBDS_Guidelines_Current/JBDS_06_The_Management_of_Hyperosmolar_Hyperglycaemic_State_HHS_%20in_Adults_FINAL_0.pdf\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Hyperosmolar hyperglycemic state (HHS), acute — precipitant {infection/MI/stroke/medication nonadherence/other}; evidence {glucose mmol/L, effective osmolality mOsm/kg, β-hydroxybutyrate mmol/L, pH, bicarbonate}\n- Acute metabolic encephalopathy due to hyperosmolality — severity {GCS/mental status} and objective trend {osmolality trajectory, neuro checks}\n- Hypovolemia/dehydration with hemodynamic impact — evidence {BP/HR, mucous membranes, lactate if obtained} and treatment {IV fluids type/volume, monitoring}\n- Acute kidney injury, prerenal — evidence {creatinine µmol/L trend, urine output mL/kg/h} and treatment {fluid resuscitation/avoid nephrotoxins}\n- Electrolyte derangements — {hypokalemia/hyperkalemia/hypophosphatemia} with objective values {K⁺/phosphate/Mg} and treatment {repletion/insulin hold criteria}\n", "chronic-diabetes-complications.md": "---\nfilename: chronic-diabetes-complications.md\nid: chronic-diabetes-complications\ntitle: Chronic diabetes complications\nslug: chronic-diabetes-complications\ntags: [endocrinology, diabetes, chronic-complications, inpatient, night-float, nephrology, cardiology, wound-care]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Chronic diabetes complications\n\n## Panic Card (3–6 bullets)\n- ABCs, full set of vitals, fingerstick glucose now; treat **hypoglycemia <70 mg/dL (<3.9 mmol/L)** immediately with **dextrose 25 g IV** (or **glucagon 1 mg IM/IN** if no IV), recheck in **15 min**, repeat until **≥100 mg/dL (≥5.6 mmol/L)**.\n- If sepsis physiology from diabetic foot/skin/urinary source: obtain blood cultures, start broad-spectrum antibiotics within **1 h**, give **30 mL/kg crystalloid** for hypotension/lactate elevation, target **MAP ≥65 mmHg**, start norepinephrine if fluid-refractory.\n- If dyspnea/volume overload in diabetic kidney disease: O₂ to target **SpO₂ 92–96%** (or **88–92%** if COP
