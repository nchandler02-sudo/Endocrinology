D), CXR + ECG, give IV loop diuretic if not anuric; if refractory hyperkalemia/uremia/pulmonary edema, call nephrology for urgent dialysis.\n- If chest pain, dyspnea, diaphoresis, syncope, or “silent” ischemia concern (neuropathy): ECG within **10 min**, troponins, treat ACS per protocol; escalate for **STEMI** or unstable vitals.\n- Confirm Before Proceed: For any irreversible limb- or life-altering step (amputation, emergent revascularization, thrombolysis/anticoagulation reversal), verify indication, bleeding risk, imaging/labs, and involve the appropriate consultant urgently.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Chronic diabetes complications become night-float emergencies when they “tip” into acute organ dysfunction: diabetic kidney disease with hyperkalemia/volume overload, neuropathy masking ACS/sepsis, autonomic neuropathy causing falls/syncope, gastroparesis driving brittle inpatient glycemia, and foot disease progressing to deep infection/ischemia.\n- Separate what must happen now vs what can wait: now = stabilize airway/breathing/circulation, correct dangerous glucose/lytes, identify infection/ischemia/limb threat, and prevent iatrogenic harm (insulin in CKD, contrast exposure, QT meds); later = optimize long-term risk reduction and screening (albuminuria/eye/foot exams) once stable.\n- Guideline Must Know: In hospitalized adults, default to scheduled insulin rather than sliding-scale-only; aim for **140–180 mg/dL (7.8–10.0 mmol/L)** for most noncritically ill patients, with tighter goals only if achievable without hypoglycemia (ADA Standards of Care in Diabetes—2026, Hospital Care).\n- Guideline Must Know: Hypoglycemia prevention is a safety priority—treat and then identify the driver (reduced intake/NPO, insulin stacking, renal dysfunction, sulfonylurea exposure, interrupted tube feeds); in CKD, insulin clearance falls, so basal and correction doses often require **down-titration**.\n- Guideline Must Know: Diabetic kidney disease monitoring and staging matter overnight: check trend of creatinine, potassium, bicarbonate, and volume status; avoid nephrotoxins, dose-adjust renally cleared meds, and consider renin-angiotensin system inhibitor continuation vs holding based on **AKI, hyperkalemia, or hypotension** (ADA CKD & Risk Management; KDIGO Diabetes in CKD).\n- Guideline Must Know: Hyperkalemia sequence is non-negotiable when ECG changes or K⁺ is dangerously high—membrane stabilization (IV calcium) → intracellular shift (insulin + dextrose ± β-agonist) → removal (loop diuretic, potassium binders, dialysis); reassess ECG and K⁺ after interventions.\n- Guideline Must Know: Diabetic foot disease is a limb- and life-threatening syndrome; assess for infection and ischemia every time: exam for erythema/warmth/fluctuance/crepitus, probe-to-bone, evaluate perfusion (pulses, Doppler, ABI/toe pressures), and obtain imaging if deep infection suspected (IWGDF 2023; IWGDF/IDSA 2023 DFI).\n- Guideline Must Know: For diabetes-related foot infection, classify severity (mild/moderate/severe) and obtain deep tissue/bone cultures when feasible (not superficial swabs); start empiric antibiotics based on severity and MRSA/Pseudomonas risk, then narrow; urgent surgery for necrotizing infection, abscess, compartment syndrome, or critical ischemia (IWGDF/IDSA 2023 DFI).\n- Guideline Must Know: Cardiovascular disease risk is the dominant driver of mortality; neuropathy can blunt anginal warning signs, so new dyspnea, nausea, diaphoresis, unexplained hypotension, or delirium may be ACS equivalents—get ECG/troponin and escalate per chronic coronary disease/ACS pathways (AHA/ACC Chronic Coronary Disease 2023).\n- Retinopathy is rarely a night emergency, but sudden painless vision loss, new floaters/“curtain,” or eye pain with headache are red flags; check BP, glucose, neuro exam, and consult ophthalmology emergently for suspected vitreous hemorrhage/retinal detachment or acute angle-closure glaucoma (do not delay for outpatient follow-up).\n- Autonomic neuropathy can cause orthostatic hypotension, resting tachycardia, neurogenic bladder, and gastroparesis: do orthostatic vitals for falls/syncope, bladder scan for retention, and anticipate glycemic volatility when oral intake is unpredictable (coordinate insulin timing with meals and antiemetics).\n- Gastroparesis pitfalls: “normal” pre-meal glucose can crash after usual prandial insulin if the meal is delayed/vomited; consider smaller prandial doses, post-meal dosing in selected patients, and scheduled antiemetics; avoid agents that worsen QT if baseline QTc is prolonged.\n- Diabetic nephropathy/CKD pitfalls: metformin is typically held in acute illness/AKI or hypoxia; many glucose-lowering agents are inappropriate inpatient; contrast studies require a risk-benefit check and renal-protective planning, especially with **eGFR <30 mL/min/1.73 m²** or evolving AKI (coordinate with radiology/nephrology).\n- Peripheral arterial disease (often coexists with foot ulcers) is suggested by cool limb, nonhealing wounds, rest pain, absent pulses; critical limb ischemia signs require urgent vascular surgery evaluation—do not rely on “normal” ABI in calcified vessels; toe pressures/Doppler waveform can be more informative.\n- Infection risk is higher and presentations can be blunted: pursue early cultures and imaging when systemic signs occur; unexplained delirium or mild hypotension in a diabetic with foot ulcer/urinary symptoms should trigger a sepsis screen and lactate, even if fever is absent.\n- When to call ICU/consults early: severe hypoglycemia with seizures/airway risk, suspected necrotizing foot infection, refractory hyperkalemia/volume overload, hemodynamic instability, or suspected ACS/stroke equivalents—diabetic complications frequently coexist and decompensate fast overnight.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Persistent hypotension or shock: **MAP <65 mmHg** after fluids or need for vasopressor support, lactate rising, or escalating oxygen/ventilation requirements.\n- Hyperkalemia with danger features: **K⁺ ≥6.0 mmol/L**, any ECG changes, or K⁺ not improving after shift/removal therapy; or urgent dialysis indications (refractory pulmonary edema, severe acidosis, uremic complications).\n- Limb-threatening foot disease: suspected necrotizing infection, rapidly progressive cellulitis, crepitus, bullae, severe pain out of proportion, systemic toxicity, or suspected critical limb ischemia (rest pain, pallor/coolness, nonhealing ulcer with absent pulses).\n- Suspected ACS equivalent or malignant arrhythmia: new ischemic ECG changes, dynamic troponin rise with symptoms, sustained VT, syncope with concerning ECG, or refractory chest pain/dyspnea.\n- Acute neurologic/vision red flags: focal deficit, aphasia, new severe headache, sudden monocular vision loss, or altered mental status not explained by glucose/meds.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Point-of-care glucose with hypoglycemia protocol — {now, q15min until ≥100 mg/dL, then q1h x2, then per unit standard}\n- Order: Basic metabolic panel + magnesium + phosphorus — {stat, repeat q4–6h if K⁺/HCO₃⁻ abnormal or insulin/dialysis planned}\n- Order: ECG 12-lead — {now, repeat if symptoms change or after hyperkalemia treatment}\n- Order: Blood cultures x2 + lactate — {if fever, hypotension, rigors, delirium, or suspected diabetic foot/urinary source}\n- Order: Foot evaluation bundle — {wound photo documentation, probe-to-bone exam note, X-ray foot, consider MRI if osteomyelitis suspected, ABI/toe pressures or Doppler if ischemia suspected}\n\n## ABIM Style Question 1\n### Stem\nA 62-year-old man with type 2 diabetes (A1C 9.4%) and known peripheral neuropathy is admitted for pneumonia. On night float he reports “no pain,” but you notice a plantar ulcer with surrounding erythema and mild drainage. He is afebrile, HR 102/min, BP 118/72 mmHg, RR 18/min, SpO₂ 95% on room air. The foot is warm with faint dorsalis pedis pulses. WBC is 13.2 ×10⁹/L. What is the best next step to evaluate for a deep diabetic foot infection?\n### Options\nA. Start topical antibiotics and arrange outpatient podiatry follow-up  \nB. Obtain superficial wound swab culture before starting antibiotics  \nC. Perform probe-to-bone assessment and obtain foot radiographs  \nD. Order an MRI only if blood cultures are positive  \nE. Defer imaging because the patient has neuropathy and no pain  \n### Correct answer\nC\n### Rationale\nNeuropathy can mask pain, so evaluation should not depend on symptoms; bedside probe-to-bone and plain radiographs are appropriate initial steps to assess for osteomyelitis and gas/foreign body, with MRI considered if suspicion persists. This approach aligns with diabetic foot infection guidance favoring clinical assessment plus imaging and avoiding superficial swab cultures when deeper sampling is feasible.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 70-year-old woman with long-standing type 2 diabetes, stage 4 chronic kidney disease (eGFR 22 mL/min/1.73 m²), and autonomic neuropathy is admitted for cellulitis. She is now NPO for a possible procedure. At 02:00 she is diaphoretic and confused; fingerstick glucose is 46 mg/dL (2.6 mmol/L). Earlier today she received her home dose of insulin glargine 40 units and scheduled prandial insulin. After IV dextrose, her mental status improves. Which overnight insulin adjustment is most appropriate?\n### Options\nA. Continue full-dose glargine and hold only prandial insulin while NPO  \nB. Reduce basal insulin dose and stop scheduled prandial insulin; use conservative correction scale  \nC. Increase basal insulin to prevent rebound hyperglycemia from dextrose  \nD. Switch to sliding-scale insulin only with no basal insulin  \nE. Add a sulfonylurea to reduce insulin requirements while NPO  \n### Correct answer\nB\n### Rationale\nThe pitfall is reduced insulin clearance in advanced CKD plus NPO status, which markedly increases hypoglycemia risk; basal insulin often needs dose reduction and scheduled prandial insulin should be held while NPO, using cautious correction to avoid recurrence. Sliding-scale-only without basal is inferior because it increases glycemic variability and hyperglycemia risk.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What inpatient glucose target range is recommended for most noncritically ill adults? A: 140–180 mg/dL (7.8–10.0 mmol/L).\n- Q: What is the maximum recommended sodium correction rate for chronic hyponatremia in 24 hours? A: ≤8–10 mmol/L per 24 h (≤4–6 mmol/L per 24 h if high risk for osmotic demyelination).\n- Q: In suspected severe hyperkalemia with ECG changes, what therapy comes first? A: IV calcium for membrane stabilization.\n- Q: What bedside finding increases concern for diabetic foot osteomyelitis? A: A positive probe-to-bone test on exam.\n- Q: What is a common reason diabetics can present with ACS without chest pain? A: Autonomic/peripheral neuropathy blunting ischemic pain perception.\n\n## Guidelines & Key References (3–5 bullets)\n- ADA Standards of Care in Diabetes—2026 (sections include Hospital Care; CKD; Retinopathy/Neuropathy/Foot Care): https://professional.diabetes.org/standards-of-care\n- ADA Standards of Care in Diabetes—2026: Diabetes Care in the Hospital (Section 16): https://diabetesjournals.org/care/article/49/Supplement_1/S339/163925/16-Diabetes-Care-in-the-Hospital-Standards-of-Care\n- KDIGO 2022 Clinical Practice Guideline for Diabetes Management in CKD (PDF): https://kdigo.org/wp-content/uploads/2022/10/KDIGO-2022-Clinical-Practice-Guideline-for-Diabetes-Management-in-CKD.pdf\n- IWGDF/IDSA 2023 Guideline on Diabetes-Related Foot Infections: https://www.idsociety.org/practice-guideline/diabetic-foot-infections/\n- 2023 AHA/ACC Multisociety Guideline for Chronic Coronary Disease (PDF): https://www.ahajournals.org/doi/pdf/10.1161/CIR.0000000000001168\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Diabetic foot infection, {mild/moderate/severe} — {ulcer location} — {systemic signs yes/no} — {objective: WBC, lactate, vitals, imaging} — {treatment: IV antibiotics, surgery consult}\n- Suspected/confirmed osteomyelitis — {bone involved} — {objective: probe-to-bone, X-ray/MRI findings, ESR/CRP} — {plan: cultures, antibiotics, ID/podiatry consult}\n- Diabetic kidney disease with {CKD stage} and {AKI yes/no} — {etiology: diabetic nephropathy vs other} — {objective: creatinine trend, eGFR, UO, K⁺, HCO₃⁻} — {treatment: diuresis, dialysis consult, med dose adjustments}\n- Hypoglycemia, {severe if AMS/seizure/need IV dextrose} — {cause: NPO, insulin, CKD, missed feeds} — {objective: nadir glucose, symptoms, recurrence} — {treatment: dextrose/glucagon, insulin regimen changes}\n- Autonomic neuropathy with {orthostatic hypotension/neurogenic bladder/gastroparesis} — {objective: orthostatics, bladder scan, vomiting/poor intake} — {treatment: fluids/pressors avoidance plan, catheterization, antiemetics, insulin timing adjustments}\n", "hypothyroidism.md": "---\nfilename: hypothyroidism.md\nid: hypothyroidism\ntitle: Hypothyroidism\nslug: hypothyroidism\ntags: [endocrinology, inpatient, night-float, hypothyroidism, myxedema-coma]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Hypothyroidism\n\n## Panic Card (3–6 bullets)\n- Airway/breathing first: if **hypoventilation, hypercapnia, or declining mental status**, place on **supplemental O₂** and prepare for **early intubation** (myxedema coma can cause rapid CO₂ narcosis).\n- Circulation: treat hypotension with **isotonic fluids** (small boluses if CHF risk) and start **norepinephrine** if **MAP <65 mmHg** after fluids; obtain bedside glucose and give **dextrose** if **<70 mg/dL**.\n- Suspect myxedema coma if **hypothermia, bradycardia, altered mental status, hyponatremia, hypoventilation**: draw **TSH + free T4 + random cortisol** immediately, then give **hydrocortisone 100 mg IV q8h** and **IV levothyroxine (typical load 200–400 mcg IV once, then 50–100 mcg IV daily)**.\n- Rewarm safely: use **passive external warming**; avoid aggressive warming that can precipitate vasodilation/collapse.\n- Identify/cover triggers now: send cultures if infection suspected; start empiric antibiotics when clinically indicated; stop sedatives/opioids if possible and treat precipitant (MI, sepsis, stroke, GI bleed, cold exposure).\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Night shift framing: most inpatient “hypothyroidism” pages are either (1) abnormal labs without instability (usually safe to defer), or (2) decompensated severe hypothyroidism/myxedema coma where missed early support is lethal; triage based on **mental status, temperature, ventilation, and hemodynamics** rather than TSH alone.\n- Now: treat as myxedema coma when there is **altered mental status** plus physiologic failure (any of **hypothermia, bradycardia, hypoventilation/hypercapnia, hypotension, severe hyponatremia**); do not wait for confirmatory labs if the clinical picture is strong and unstable.\n- Now: stabilize ventilation and temperature first because myxedema physiology lowers ventilatory drive and increases CO₂ retention; beware that even “normal” SpO₂ can coexist with **dangerous hypercapnia**—get an **ABG/VBG** if somnolent or bradypneic.\n- Now: give stress-dose steroids before or with thyroid hormone if myxedema coma is suspected because unrecognized adrenal insufficiency can coexist and thyroid hormone can increase cortisol clearance; practical default is **hydrocortisone 100 mg IV q8h** until adrenal insufficiency is excluded.\n- Now: thyroid hormone replacement in myxedema is typically **IV levothyroxine** due to unreliable GI absorption; common inpatient approach is **loading 200–400 mcg IV once** (lower if frail/CAD) then **50–100 mcg IV daily**, with clinical and free T4 monitoring rather than chasing TSH acutely.\n- Confirm Before Proceed: high-dose IV thyroid hormone in patients with known **coronary disease, recent MI, or malignant arrhythmias**—consider a **lower loading dose (e.g., 100–200 mcg IV)** and early endocrine/cardiology input because rapid hormone shifts can precipitate ischemia.\n- Guideline Must Know: major society guidance (ATA/AACE) emphasizes that myxedema coma is a clinical diagnosis requiring immediate supportive care, IV thyroid hormone, and empiric glucocorticoids when adrenal insufficiency cannot be excluded; early ICU-level monitoring is recommended due to high mortality.\n- Guideline Must Know: in severe hypothyroidism, **free T4** is the most useful short-term biochemical marker of replacement response; **TSH may lag for weeks**, so do not escalate doses overnight based on TSH alone in the ICU setting.\n- Guideline Must Know: in suspected central (secondary/tertiary) hypothyroidism, **TSH may be low/normal**, so dose and response are guided by **free T4 goal in the upper half of the reference range** and clinical status; always consider pituitary disease if hypotension/hyponatremia coexist.\n- Guideline Must Know: hypothyroid-associated hyponatremia is usually due to impaired free water clearance; treat primarily with **fluid restriction** and addressing the thyroid state, and maintain correction limits of **Na⁺ ≤8–10 mmol/L per 24 h** (≤4–6 if high risk) when any hypertonic strategy is used.\n- Guideline Must Know: medication and illness confounders are common inpatient traps—amiodarone, lithium, iodinated contrast, checkpoint inhibitors, and critical illness can distort thyroid tests; in non-critically ill patients, confirm true hypothyroidism with **repeat TSH/free T4** rather than reacting to a single marginal abnormality.\n- Guideline Must Know: stable, non-myxedema hypothyroidism discovered on labs rarely requires nighttime initiation; starting levothyroxine in older adults or CAD should be cautious (often **12.5–25 mcg PO daily** with slow titration), and inpatient initiation can usually be deferred to daytime unless there is compelling clinical need.\n- Can wait: for asymptomatic or mildly symptomatic patients without instability, defer dose adjustments to daytime and document plan for outpatient/inpatient follow-up; routine “stat endocrine consult” is usually unnecessary unless there is pregnancy, suspected central disease, or profound derangements.\n- Pitfalls that cause harm overnight: mistaking sedation/uremia/hypercapnia for “just hypothyroidism,” giving large PO doses when ileus/edema limits absorption, failing to give steroids in suspected myxedema, aggressive active rewarming, and overcorrecting sodium while treating precipitating illness.\n- When to call ICU/consults: call ICU early for any need for **vasopressors, mechanical ventilation, temperature <34°C, or persistent altered mental status**; involve endocrinology for myxedema coma, suspected central hypothyroidism, refractory hyponatremia, or complex drug-induced thyroid dysfunction.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **Airway/ventilation failure**: RR low, rising CO₂, need for **BiPAP/intubation**, or **pH <7.25** with hypoventilation.\n- **Hemodynamic instability**: **MAP <65 mmHg** despite fluids, need for vasopressors, or new malignant arrhythmia/bradycardia with hypoperfusion.\n- **Severe hypothermia/encephalopathy**: **T <34°C** or persistent altered mental status/seizure.\n- **Electrolyte/organ failure**: **Na⁺ <120 mmol/L**, rapid sodium shift risk, AKI with volume overload, or suspected adrenal crisis.\n- **High-risk context**: suspected central hypothyroidism/pituitary apoplexy, recent MI, or unclear trigger requiring multidisciplinary management (ICU + endocrine ± cardiology).\n\n## Orders to Place Now (3–6 bullets)\n- Order: Thyroid panel — {TSH} {free-T4} {total-T3} {timing: stat vs morning}\n- Order: Adrenal evaluation and empiric coverage — {random-cortisol} then {hydrocortisone 100 mg IV q8h} {stop-criteria: cortisol adequate/ACTH test complete}\n- Order: Levothyroxine — {route: IV if myxedema/suspected malabsorption; PO if stable} {loading-dose-mcg} then {daily-dose-mcg} with {monitoring: free-T4 q24–48h if ICU}\n- Order: ABG/VBG and cardiorespiratory monitoring — {ABG/VBG now} {telemetry} {continuous pulse oximetry} {core-temperature monitoring}\n- Order: Hyponatremia workup/support — {BMP q6–8h if severe} {serum-osm} {urine-osm} {urine-Na} {fluid-restriction-amount} {hypertonic-saline-if-indicated}\n- Order: Trigger evaluation — {EKG} {troponin if ischemia} {blood-cultures x2 if febrile} {CXR} {lactate} {empiric-antibiotics-if-sepsis-concern}\n\n## ABIM Style Question 1\n### Stem\nA 68-year-old man is admitted with pneumonia. Overnight he becomes progressively somnolent. Vitals: T 33.8°C, HR 42/min, BP 86/52 mmHg, RR 8/min, SpO₂ 95% on 2 L nasal cannula. Exam shows dry skin, delayed reflexes, and nonpitting edema. ABG shows pH 7.22, PaCO₂ 68 mmHg. Labs show Na⁺ 122 mmol/L and glucose 62 mg/dL. Which is the best next step in management?\n### Options\nA. Give oral levothyroxine 200 mcg now and recheck TSH in the morning  \nB. Administer IV levothyroxine and IV hydrocortisone and transfer to ICU for ventilatory and hemodynamic support  \nC. Start propranolol for bradycardia and begin active external warming with heating blankets  \nD. Restrict fluids only and delay thyroid treatment until confirmatory thyroid studies return  \nE. Give IV liothyronine alone as first-line therapy to rapidly normalize mental status  \n### Correct answer\nB\n### Rationale\nThis presentation is classic for myxedema coma physiology (hypothermia, bradycardia, hypoventilation with hypercapnia, hypotension, hyponatremia), which requires immediate ICU-level support plus IV thyroid hormone and empiric stress-dose glucocorticoids. ATA/AACE guidance supports prompt IV levothyroxine with hydrocortisone when adrenal insufficiency cannot be excluded, rather than waiting for labs or using oral therapy with unreliable absorption. Active aggressive warming and beta-blockade can worsen hemodynamics, and liothyronine monotherapy carries higher arrhythmia/ischemia risk.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 74-year-old woman with known coronary artery disease and a prior MI is admitted for cellulitis. She is alert but fatigued; vitals are stable. Labs return overnight: TSH 38 mIU/L and free T4 low. She has no hypothermia, no altered mental status, and no hypoventilation. The intern suggests giving a large loading dose of levothyroxine “to fix it quickly.” What is the best management plan tonight?\n### Options\nA. Give levothyroxine 300 mcg IV loading dose immediately to normalize thyroid levels by morning  \nB. Start levothyroxine 12.5–25 mcg PO daily and plan slow titration with outpatient or daytime inpatient follow-up  \nC. Start liothyronine PO three times daily because it is faster acting and safer in CAD  \nD. Defer all therapy until TSH normalizes spontaneously after the infection resolves  \nE. Start levothyroxine 100 mcg PO daily because this is the standard full replacement dose for all adults  \n### Correct answer\nB\n### Rationale\nIn stable primary hypothyroidism without myxedema features, older adults and patients with CAD should start low-dose levothyroxine with gradual titration to avoid precipitating ischemia or arrhythmias; rapid “loading” is the pitfall. Society guidance for hypothyroidism management supports cautious initiation (often 12.5–25 mcg daily in high-risk patients) with follow-up using TSH over weeks rather than overnight normalization. What changed the decision here?\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: In suspected myxedema coma, what medication is typically given before or with thyroid hormone to prevent adrenal crisis? A: Hydrocortisone **100 mg IV q8h** (after drawing a random cortisol if feasible).\n- Q: Which thyroid lab is most useful for short-term monitoring of replacement response in severe illness? A: Free T4, because TSH can lag for weeks.\n- Q: What is the safe sodium correction limit over 24 hours when treating associated hyponatremia? A: **≤8–10 mmol/L per 24 h** (or **≤4–6** if high risk for osmotic demyelination).\n- Q: What ventilatory complication should you actively look for in severe hypothyroidism even if oxygen saturation looks acceptable? A: Hypercapnia from hypoventilation; check an ABG/VBG if somnolent or bradypneic.\n\n## Guidelines & Key References (3–5 bullets)\n- American Thyroid Association (ATA) Guidelines for the Treatment of Hypothyroidism (2014): https://www.liebertpub.com/doi/10.1089/thy.2014.0028\n- ATA Clinical guidance on severe hypothyroidism/myxedema coma (reviewed within ATA resources): https://www.thyroid.org/hypothyroidism/\n- Endocrine Society clinical resources on hypothyroidism and central hypothyroidism evaluation principles: https://www.endocrine.org/clinical-practice-guidelines\n- European Thyroid Association guidance on amiodarone-associated thyroid dysfunction (for inpatient confounders): https://www.eurothyroid.com/guidelines.html\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Hypothyroidism, {acuity: chronic vs acute decompensation/myxedema concern}; {cause: autoimmune/iatrogenic/medication-related/central}; {objective evidence: TSH, free T4, symptoms}\n- Suspected myxedema coma with {organ dysfunction: encephalopathy/hypothermia/hypoventilation/shock}; {objective evidence: T, HR, BP/MAP, ABG CO₂/pH, Na⁺}; {treatment: IV levothyroxine, hydrocortisone, ventilatory/pressor support}\n- Acute hypercapnic respiratory failure due to {hypoventilation from severe hypothyroidism vs other}; {objective evidence: ABG/VBG pH/PaCO₂}; {treatment: NIV/intubation, monitoring}\n- Hyponatremia due to {impaired free water clearance in hypothyroidism vs SIADH/other}; {severity: Na⁺ level, symptoms}; {objective evidence: serum/urine osm, urine Na}; {treatment: restriction/hypertonic strategy and monitoring}\n", "hyperthyroidism.md": "---\nfilename: hyperthyroidism.md\nid: hyperthyroidism\ntitle: Hyperthyroidism\nslug: hyperthyroidism\ntags: [endocrinology, thyrotoxicosis, inpatient, night-float, arrhythmia, thyroid-storm]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Hyperthyroidism\n\n## Panic Card (3–6 bullets)\n- ABCs, continuous monitoring, IV access x2, check glucose, ECG; treat immediate instability (shock, hypoxemia, malignant arrhythmia) first; target **MAP ≥65 mmHg** and **SpO₂ ≥92%** (or patient-specific goal).\n- If thyroid storm suspected (fever, marked tachycardia, delirium, heart failure): start multimodal therapy now and move toward ICU; do not wait for “very high” T3/T4 to treat.\n- Control adrenergic surge: **propranolol 1 mg IV q5 min up to 10 mg** (or **60–80 mg PO q6 h**) if stable; if tenuous hemodynamics consider **esmolol infusion** with close BP/EF monitoring.\n- Block synthesis: **propylthiouracil (PTU) 500–1000 mg PO load, then 250 mg PO q4 h** or **methimazole 20 mg PO q4–6 h**.\n- Block release: **iodide (SSKI or Lugol’s) ≥1 hour after thionamide**; Confirm Before Proceed: do not give iodine before thionamide (can worsen hormone synthesis).\n- Reduce T4→T3 and treat relative adrenal insufficiency: **hydrocortisone 100 mg IV q8 h** (or dexamethasone equivalent); aggressive cooling, fluids, and treat trigger (infection, MI, PE, surgery, iodine load).\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Guideline Must Know: Always confirm biochemical thyrotoxicosis with **suppressed TSH** plus elevated **free T4 and/or T3**; “severe symptoms” can occur with modest hormone elevations, so treat the patient, not the number (ATA 2016).\n- Guideline Must Know: Determine etiology when not obvious because treatment diverges: consider **TRAb**, **radioiodine uptake/scan**, or ultrasound vascularity when resources allow; toxic adenoma/multinodular goiter often needs definitive therapy rather than long-term thionamide (ATA 2016; NICE NG145).\n- Guideline Must Know: Start **β-blocker** for symptomatic thyrotoxicosis (especially **resting HR >90 bpm** or cardiovascular disease) unless contraindicated; preferred inpatient choices are propranolol or cardioselective agents depending on bronchospasm/HFrEF risk (ATA 2016).\n- Guideline Must Know: In thyroid storm, therapy is stepwise and time-sensitive: **β-blocker → thionamide → iodide (≥1 h later) → glucocorticoid**, plus supportive ICU care and trigger management (ATA 2016).\n- Guideline Must Know: Thionamides do not treat thyroiditis-driven thyrotoxicosis (release phenomenon); for thyroiditis, use **β-blocker** for symptoms and anti-inflammatory therapy when indicated (ATA 2016; NICE NG145).\n- Guideline Must Know: Confirm Before Proceed for irreversible or high-stakes steps: do not initiate **radioactive iodine** in pregnancy and avoid it with active/severe orbitopathy; if planning definitive therapy or if airway compression suspected, involve endocrinology/surgery early (ETA 2018; NICE NG145).\n- Now: Assess for life threats that commonly present at night: **atrial fibrillation with RVR**, decompensated heart failure, ischemia, hyperthermia, severe agitation/delirium, and hypotension; get **ECG**, **telemetry**, **CXR** if dyspneic, and bedside ultrasound if shock/volume status unclear.\n- Now: Screen for triggers that change management tonight: recent **iodinated contrast**, **amiodarone**, abrupt stopping of antithyroid drugs, infection, PE/MI, or recent surgery; treat the precipitant in parallel (antibiotics, anticoagulation when appropriate, ACS pathway).\n- Now: If unstable tachyarrhythmia (hypotension, ischemia, pulmonary edema, altered mental status), follow ACLS: **synchronized cardioversion** for unstable AF/flutter; do not delay shock because the trigger is thyrotoxicosis.\n- Now: Choose rate control thoughtfully: β-blockers are first line, but Confirm Before Proceed in **decompensated HFrEF/shock** (risk of collapse) and **severe bronchospasm**; if β-blocker contraindicated, use **diltiazem** for rate control when no HFrEF, or cautious low-dose **digoxin** as adjunct recognizing reduced efficacy in thyrotoxicosis.\n- Now: Thyroid storm supportive bundle: aggressive cooling (avoid salicylates), IV fluids with frequent reassessment, correct electrolytes, treat agitation (small titrated doses), and consider adjunct **cholestyramine 4 g PO q6 h** to enhance hormone clearance in severe cases.\n- What can wait (hours, not days): definitive etiology workup beyond initial labs (TRAb, uptake scan), endocrinology decisions about **radioiodine vs surgery**, and long-term antithyroid strategy; however, order the tests overnight if they will be ready by morning rounds and will change consult decisions.\n- Pitfall: Mislabeling thyroiditis as Graves leads to unnecessary thionamides and delays anti-inflammatory care; clues include recent viral prodrome, thyroid tenderness, low uptake history, and spontaneous trend toward improvement.\n- Pitfall: Giving iodide before thionamide can increase substrate for hormone synthesis; also, missing medication history (biotin, amiodarone) can confound labs and the perceived urgency—use clinical severity to guide escalation.\n- When to call ICU/endocrinology tonight: suspected thyroid storm, refractory tachyarrhythmia, escalating oxygen needs/heart failure, altered mental status, or hemodynamic instability; call cardiology for unstable AF, ischemia, or shock physiology; call surgery urgently if impending airway compromise from large goiter.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **HR ≥140/min** with fever or delirium, or persistent **HR ≥120/min** despite initial β-blockade and fluids.\n- Any hemodynamic instability: **SBP <90 mmHg**, need for vasopressors, rising lactate, or new end-organ hypoperfusion.\n- Acute cardiopulmonary decompensation: new pulmonary edema, escalating oxygen to **≥6 L/min** or need for NIV/intubation, or new ischemic ECG changes/troponin rise with instability.\n- Severe neurologic features: agitation requiring restraints/sedation, seizures, coma, or rapidly worsening encephalopathy.\n- Refractory arrhythmia or heart failure requiring IV antiarrhythmic/vasoactive infusions, or concern for thyroid storm with multi-organ dysfunction.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Continuous telemetry — {indication: thyrotoxicosis-with-tachyarrhythmia, new-afib, suspected-thyroid-storm}\n- Order: ECG 12-lead now and repeat PRN — {symptom: chest-pain, dyspnea, palpitations; timing: now, q6h-prn}\n- Order: Thyroid panel — {tests: TSH, free-T4, total-T3; priority: stat}\n- Order: Beta-blocker therapy — {agent: propranolol-or-esmolol-or-metoprolol; route: PO-or-IV; target-HR: <110/min; hold-parameters: SBP<90, bronchospasm, shock}\n- Order: Thionamide — {agent: PTU-or-methimazole; dose: PTU-500-1000mg-load-then-250mg-q4h-or-MMI-20mg-q4-6h; contraindications: severe-hepatic-disease, prior-agranulocytosis}\n- Order: Glucocorticoid and iodide (if storm suspected) — {steroid: hydrocortisone-100mg-IV-q8h; iodide: SSKI-or-Lugol; timing: iodide-≥1h-after-thionamide}\n\n## ABIM Style Question 1\n### Stem\nA 46-year-old woman is admitted with fever and agitation. She has a history of untreated Graves disease. Vitals: T 39.6°C, HR 158/min, BP 102/58 mmHg, RR 24/min, SpO₂ 95% on room air. She is tremulous and delirious. Labs show TSH <0.01 mIU/L with markedly elevated free T4. ECG shows atrial fibrillation with RVR. After IV fluids and cooling measures are started, which of the following is the best next step in management to reduce mortality?\n### Options\nA. Administer saturated solution of potassium iodide immediately\nB. Start propylthiouracil and then administer iodide one hour later\nC. Give radioactive iodine ablation tonight\nD. Start levothyroxine to suppress TSH\nE. Defer antithyroid therapy until thyroid uptake scan confirms etiology\n### Correct answer\nB\n### Rationale\nThyroid storm requires immediate multimodal therapy: start a thionamide first to block new hormone synthesis, then give iodide **≥1 hour later** to block hormone release, alongside β-blockade and glucocorticoids (ATA 2016). Iodide given before thionamide can worsen thyrotoxicosis by providing substrate for synthesis, and definitive therapy (radioiodine) is not an acute stabilization step.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 52-year-old man presents overnight with palpitations, anxiety, and weight loss. Vitals: HR 122/min, BP 132/74 mmHg, afebrile. TSH is <0.01 mIU/L and free T4 is elevated. He reports a painful anterior neck for 1 week after a viral upper respiratory infection. Exam shows a tender thyroid without eye findings. Which management is most appropriate tonight?\n### Options\nA. Start methimazole 20 mg PO every 6 hours\nB. Start propranolol for symptom control and give NSAIDs for thyroid pain\nC. Give potassium iodide now to block thyroid hormone release\nD. Start radioactive iodine as definitive therapy\nE. Start propylthiouracil and schedule urgent thyroidectomy\n### Correct answer\nB\n### Rationale\nThis presentation suggests subacute thyroiditis, where thyrotoxicosis is due to hormone release rather than overproduction; thionamides and iodide are not the key therapy, and symptom control with β-blockade plus anti-inflammatory treatment is preferred (ATA 2016; NICE NG145). The pitfall is treating thyroiditis like Graves disease and exposing the patient to unnecessary thionamide toxicity without benefit.\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: In thyroid storm, when should iodide be administered relative to thionamide? A: At least 1 hour after starting a thionamide to avoid providing substrate for new hormone synthesis.\n- Q: Which thionamide has the added effect of reducing peripheral T4-to-T3 conversion? A: Propylthiouracil.\n- Q: What is the first-line symptomatic medication class for palpitations and tremor in uncomplicated thyrotoxicosis? A: Beta-adrenergic blockers.\n- Q: Do thionamides treat thyrotoxicosis from thyroiditis? A: No; thyroiditis is a release phenomenon and thionamides are generally ineffective.\n\n## Guidelines & Key References (3–5 bullets)\n- American Thyroid Association: Diagnosis and Management of Hyperthyroidism and Other Causes of Thyrotoxicosis (2016) https://www.liebertpub.com/doi/pdf/10.1089/thy.2016.0229\n- NICE: Thyroid disease: assessment and management (NG145; last updated 2023) https://www.nice.org.uk/guidance/NG145\n- European Thyroid Association: Management of Graves’ Hyperthyroidism (2018) https://etj.bioscientifica.com/downloadpdf/view/journals/etj/7/4/ETJ490384.pdf\n- American Thyroid Association: ATA Guidelines & Statements (living index; includes hyperthyroidism guideline listing) https://www.thyroid.org/professionals/ata-professional-guidelines/\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Hyperthyroidism/thyrotoxicosis with acuity — {acute vs chronic/unknown}; etiology suspected — {Graves vs toxic-nodule vs thyroiditis vs medication-induced}; objective evidence — {TSH, free-T4/total-T3, HR, fever, ECG}\n- Suspected thyroid storm — {trigger: infection/surgery/contrast/nonadherence}; organ dysfunction — {encephalopathy, heart-failure, shock}; objective evidence — {temp, HR, BP, lactate, oxygen-requirement}\n- Atrial fibrillation with RVR due to thyrotoxicosis — severity — {HR, symptoms, hemodynamics}; treatment — {beta-blocker/esmolol/diltiazem, cardioversion if unstable}; monitoring — {telemetry, serial ECG}\n- Acute heart failure/pulmonary edema attributed to thyrotoxicosis — type — {HFrEF vs HFpEF/unknown}; severity — {oxygen requirement, CXR, BNP, bedside ultrasound}; treatment — {diuretics, rate control, ICU consideration}\n", "thyroid-storm.md": "---\nfilename: thyroid-storm.md\nid: thyroid-storm\ntitle: Thyroid Storm\nslug: thyroid-storm\ntags: [endocrinology, emergency, inpatient, night-float, critical-care]\nlevel: resident\nestimatedtimemin: 12\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Thyroid Storm\n\n## Panic Card (3–6 bullets)\n- ABCs first: O₂ to **SpO₂ ≥92%** (or **88–92%** if CO₂ retainer), 2 large-bore IVs, cardiac monitor, frequent vitals, point-of-care glucose; treat severe agitation to enable care.\n- Start beta-blockade if no shock/bronchospasm: **propranolol 1 mg IV q5 min up to 3–6 mg** or **60–80 mg PO q4–6 h**; consider **esmolol infusion** if tenuous BP/need rapid off.\n- Block hormone synthesis: **PTU 500–1000 mg PO/NG load, then 250 mg q4 h** (or **methimazole 20 mg PO/NG q4–6 h** if PTU not appropriate).\n- Block hormone release AFTER thionamide: give iodine **≥1 hour after thionamide** (e.g., **sodium iodide 500–1000 mg IV q8–12 h** or **potassium iodide {dose per pharmacy} PO q6–8 h**).\n- Give steroid: **hydrocortisone 100 mg IV q8 h** (or **dexamethasone 2 mg IV q6 h**) + active cooling + **acetaminophen** (avoid aspirin).\n- Treat trigger now (infection/MI/PE/withdrawal/contrast/DKA): cultures/antibiotics as indicated; call ICU early for **shock, respiratory failure, or persistent AMS**.\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Thyroid storm is a decompensated thyrotoxicosis syndrome with end-organ dysfunction (CNS, cardiovascular, thermoregulation, GI/hepatic) and high mortality; diagnosis is clinical—do not wait for labs to treat when suspicion is high.\n- Think of triggers you can reverse overnight: infection, surgery/trauma, MI/PE/stroke, abrupt antithyroid drug cessation, iodine load (contrast/amiodarone), DKA, and severe stress; the “storm” is often the trigger plus chronic thyrotoxicosis.\n- Diagnostic support: suppressed TSH with elevated free T4/T3 helps confirm thyrotoxicosis, but severity does not correlate tightly with hormone levels; consider bedside scoring (e.g., Burch-Wartofsky) where **≥45** strongly supports storm, yet treatment should proceed on clinical grounds.\n- Guideline Must Know: Initial therapy is multimodal and simultaneous—supportive care + adrenergic blockade + thionamide + iodine (after thionamide) + glucocorticoid—this combination is recommended in major thyrotoxicosis guidance and thyroid storm consensus statements (ATA 2016; Japan Thyroid Association/Japan Endocrine Society 2016).\n- Guideline Must Know: Beta-blockade is first-line for symptom control and to reduce peripheral T4→T3 conversion (propranolol) when hemodynamically tolerated; choose a short-acting agent (esmolol) if blood pressure is tenuous or rapid titration/off is needed (ATA 2016; JTA/JES 2016).\n- Guideline Must Know: Thionamides stop new hormone synthesis—PTU additionally reduces peripheral T4→T3 conversion; typical storm dosing is **PTU 500–1000 mg load then 250 mg q4 h** or **methimazole 20 mg q4–6 h**; monitor for hepatic injury and agranulocytosis risk (ATA 2016; JTA/JES 2016).\n- Guideline Must Know: Iodine must be given only AFTER a thionamide (wait **≥1 hour**) to avoid providing substrate for new hormone synthesis; iodine then acutely blocks hormone release (Wolff–Chaikoff effect) (ATA 2016; JTA/JES 2016).\n- Guideline Must Know: Glucocorticoids (e.g., **hydrocortisone 100 mg IV q8 h**) treat possible relative adrenal insufficiency and reduce peripheral conversion; taper once clinically improving and definitive therapy is planned (ATA 2016; JTA/JES 2016).\n- Guideline Must Know: For fever control, use active cooling and **acetaminophen**; avoid aspirin because it can increase free thyroid hormone by displacement from binding proteins (ATA 2016; JTA/JES 2016).\n- Cardiovascular priorities: severe tachycardia/AF and high-output failure are common; aim to reduce HR without precipitating shock—watch for pulmonary edema, ischemia, and cardiomyopathy; if decompensated heart failure is present, titrate rate control cautiously and favor ICU-level monitoring.\n- Atrial fibrillation management: treat the storm first (rate improves as thyroid state improves); use beta-blocker if tolerated; if beta-blocker contraindicated, consider **diltiazem** for rate control; anticoagulation decisions follow standard AF risk frameworks once stabilized (ACC/AHA/ACCP/HRS AF guideline 2023; ATA 2016).\n- What must happen now: secure airway/oxygenation, start targeted storm meds in correct sequence, give fluids judiciously (avoid overload if pulmonary edema), obtain EKG, bedside ultrasound if available, start broad workup/treatment for trigger (cultures, antibiotics, troponin, lactate, DKA workup) and involve ICU early.\n- What can wait (hours, not days): thyroid-specific etiology workup (TRAb, uptake/scan if appropriate), definitive therapy planning (radioiodine vs surgery vs long-term antithyroid), and transition from IV/NG to oral as stable.\n- Adjuncts when severe/refractory: **cholestyramine 4 g PO q6–8 h** to reduce enterohepatic thyroid hormone recycling; consider plasmapheresis or emergent thyroidectomy only with endocrine/ICU coordination when maximal medical therapy fails.\n- Pitfalls: giving iodine before thionamide, under-dosing beta-blocker, missing sepsis/PE/MI as the precipitant, using aspirin for fever, and pushing aggressive beta-blockade in occult cardiomyopathy or shock; reassess perfusion (MAP, urine output, lactate) after each titration step.\n- When to call consultants overnight: ICU for any instability; endocrinology early for definitive strategy and refractory cases; cardiology for refractory AF/ischemia/shock; surgery/anesthesia only if medical failure and thyroidectomy becomes urgent.\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Hemodynamic instability: **MAP <65 mmHg** after initial resuscitation, need for vasopressors, or rising lactate/oliguria suggesting shock.\n- Respiratory failure: need for **high-flow nasal cannula**, noninvasive ventilation, or intubation; worsening pulmonary edema or hypoxemia.\n- Malignant arrhythmia or refractory tachyarrhythmia: AF with RVR not controlled with initial therapy, ventricular arrhythmia, or ischemic EKG changes/troponin rise with instability.\n- Severe CNS/hepatic dysfunction: persistent delirium, seizure, coma, or acute liver failure pattern (marked transaminases + coagulopathy) with clinical deterioration.\n- Hyperthermia or rapid decline: temperature **≥40.0 °C** or escalating multi-organ dysfunction despite initial multimodal treatment.\n\n## Orders to Place Now (3–6 bullets)\n- Order: Thyroid storm evaluation bundle — {TSH, free T4, total/free T3, CBC with differential, CMP, magnesium, phosphate, venous blood gas, lactate, troponin, CK, blood cultures x2, urinalysis, urine culture, respiratory viral testing as indicated}\n- Order: Continuous cardiac monitoring and vital signs — {telemetry, vitals q15–30 min until stable, strict I&O, daily weight}\n- Order: Propranolol (or esmolol) titration — {agent, IV/PO route, hold parameters: SBP <90 mmHg or MAP <65, bronchospasm, acute decompensated HF}\n- Order: Antithyroid drug + iodine sequence — {PTU vs methimazole dosing, timing: iodide start ≥1 h after thionamide, route PO/NG/IV}\n- Order: Stress-dose steroid and fever control — {hydrocortisone 100 mg IV q8 h, acetaminophen dosing, active cooling measures, avoid salicylates}\n- Order: Trigger-directed treatment — {antibiotics if sepsis suspected, DKA protocol if indicated, PE/ACS evaluation, discontinue exogenous thyroid hormone/iodine sources}\n\n## ABIM Style Question 1\n### Stem\nA 42-year-old woman with known Graves disease presents with fever, agitation, and palpitations after stopping her antithyroid medication 1 week ago. Vitals: T 39.6 °C, HR 156 irregular, BP 118/64, RR 24, SpO₂ 95% on room air. She is delirious and diaphoretic. ECG shows atrial fibrillation with rapid ventricular response. Which is the best next step in management?\n### Options\nA. Administer potassium iodide immediately to block thyroid hormone release\nB. Start propranolol and propylthiouracil now, then give iodine at least 1 hour later\nC. Administer levothyroxine to prevent hypothyroidism during acute illness\nD. Treat fever with aspirin and observe while thyroid studies are pending\nE. Delay treatment until free T4 returns to confirm diagnosis\n### Correct answer\nB\n### Rationale\nThyroid storm requires immediate multimodal therapy: beta-blockade and a thionamide first, followed by iodine at least 1 hour later to avoid providing substrate for new hormone synthesis. This sequencing is emphasized in major thyrotoxicosis and thyroid storm guidance (ATA 2016; JTA/JES 2016). Giving iodine first or using aspirin can worsen the clinical situation.\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 58-year-old man with untreated hyperthyroidism is admitted for pneumonia and develops hyperthermia and severe tachycardia overnight. Vitals: T 40.2 °C, HR 148, BP 132/78, RR 28, SpO₂ 90% on 4 L/min nasal cannula. He is tremulous and confused. He has a history of severe asthma with prior ICU admissions for bronchospasm. Thyroid storm is suspected. Which is the best initial agent for ventricular rate control?\n### Options\nA. Propranolol IV bolus followed by high-dose oral propranolol\nB. Esmolol infusion without other thyroid storm therapies\nC. Diltiazem IV with careful blood pressure monitoring, while definitive thyroid storm therapy is initiated\nD. Amiodarone IV as first-line therapy because it blocks T4 to T3 conversion\nE. No rate-control agent should be used in thyroid storm\n### Correct answer\nC\n### Rationale\nIn thyroid storm, beta-blockers are preferred when tolerated, but severe asthma is a key contraindication to nonselective beta-blockade; diltiazem is an accepted alternative for rate control while initiating thionamide, iodine (after thionamide), and steroids. The pitfall is bronchospasm risk with propranolol in a patient with severe reactive airway disease. What changed the decision here?\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What is the minimum required delay between giving a thionamide and giving iodine in thyroid storm? A: At least 1 hour.\n- Q: Which antipyretic should be avoided in thyroid storm and why (one phrase)? A: Aspirin; it can increase free thyroid hormone by displacing it from binding proteins.\n- Q: Name one thionamide regimen appropriate for thyroid storm. A: PTU 500–1000 mg load then 250 mg every 4 hours, or methimazole 20 mg every 4–6 hours.\n- Q: What MAP target generally defines shock prompting ICU-level escalation if persistent? A: MAP <65 mmHg with signs of hypoperfusion.\n\n## Guidelines & Key References (3–5 bullets)\n- American Thyroid Association (ATA) Guidelines for Hyperthyroidism and Other Causes of Thyrotoxicosis, 2016: https://journals.sagepub.com/doi/pdf/10.1089/thy.2016.0229\n- Japan Thyroid Association/Japan Endocrine Society Guidelines for the Management of Thyroid Storm (First edition), 2016: https://www.eurothyroid.com/files/download/japan-guidelines-thyroid-storm-2016.pdf\n- 2023 ACC/AHA/ACCP/HRS Guideline for the Diagnosis and Management of Atrial Fibrillation, 2023: https://www.ahajournals.org/doi/pdf/10.1161/CIR.0000000000001193?download=true\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Thyroid storm — acute endocrine emergency — {trigger: infection/med nonadherence/iodine load} — {organ dysfunction: CNS/cardiac/hepatic} — {evidence: T ≥39 °C, HR ≥140, AF/RVR, delirium, TSH suppressed, free T4/T3 elevated} — {treatment: beta-blocker, thionamide, iodide after ≥1 h, steroids, cooling}\n- Acute metabolic encephalopathy — {cause: thyrotoxicosis/thyroid storm} — {severity: delirium/agitation/coma scale} — {evidence: mental status change, vitals hyperadrenergic} — {treatment/monitoring: sedation as needed, frequent neuro checks}\n- Acute hypoxic respiratory failure — {cause: pneumonia/pulmonary edema from high-output failure} — {severity: oxygen requirement} — {evidence: SpO₂, ABG/VBG, CXR findings} — {treatment: O₂ escalation, diuresis/antibiotics as indicated}\n- Acute decompensated heart failure/high-output failure — {type: systolic/diastolic if known} — {cause: thyrotoxicosis} — {evidence: pulmonary edema, BNP/echo if available, tachyarrhythmia} — {treatment: cautious rate control, diuresis, ICU monitoring}\n", "thyroid-function-test-interpretation.md": "---\nfilename: thyroid-function-test-interpretation.md\nid: thyroid-function-test-interpretation\ntitle: Thyroid function test interpretation\nslug: thyroid-function-test-interpretation\ntags: [endocrinology, thyroid, lab-interpretation, inpatient, night-float]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Thyroid function test interpretation\n\n## Panic Card (3–6 bullets)\n- If unstable (AMS, hypothermia, bradycardia, hypoventilation) treat as possible **myxedema coma**: airway/vent support, passive rewarming, give **hydrocortisone 100 mg IV q8h** before thyroid hormone, then **IV levothyroxine 200–400 mcg load** (then **50–100 mcg IV daily**). citeturn2search13turn2search12\n- If unstable with hypermetabolic physiology (fever, agitation, delirium, AF/RVR, heart failure) treat as possible **thyroid storm**: **beta-blocker** for HR control, **thionamide** then **iodine 1 h later**, plus **glucocorticoid**; call ICU/endocrine early. citeturn2search19\n- If TFTs are abnormal but patient is clinically stable, do not “treat the number” overnight: assess meds/illness, repeat **TSH + free T4** when clinically appropriate, and avoid irreversible steps until pattern is confirmed. citeturn2search12turn2search19\n- Confirm Before Proceed: Do not initiate chronic antithyroid therapy, high-dose thyroid hormone, or anticoagulation solely based on a single discordant TFT panel; first exclude assay/drug effects and repeat testing if clinical picture does not match. citeturn2search6turn2search19\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Night-float reality: most inpatient “abnormal TFTs” reflect **non-thyroidal illness** (low T3 with normal/low T4 and non-elevated TSH) or medication/assay effects; if the patient lacks compatible symptoms, prioritize stabilization of the acute illness and arrange repeat testing after recovery rather than initiating thyroid-specific treatment overnight. citeturn2search12turn2search19\n- Guideline Must Know: For suspected primary thyroid dysfunction, **TSH is the best single screening test** in most settings; interpret TSH with **free T4** (and sometimes **total T3**) to classify overt vs subclinical disease. citeturn2search12\n- Pattern 1 (primary hypothyroidism): **TSH high + free T4 low** = overt primary hypothyroidism; urgent treatment is typically reserved for decompensation (myxedema coma features) or high-risk physiology rather than mild lab abnormalities in stable inpatients. citeturn2search12turn2search13\n- Pattern 2 (subclinical hypothyroidism): **TSH high + free T4 normal**; inpatient triggers for action are limited (e.g., pregnancy, significant symptoms with persistent abnormality), and routine initiation overnight is usually unnecessary—plan outpatient or post-illness reassessment and consider thyroid antibodies for risk stratification. citeturn2search12turn2search25\n- Pattern 3 (primary hyperthyroidism/thyrotoxicosis): **TSH low + free T4 high and/or total T3 high**; immediate actions depend on clinical severity (arrhythmia, ischemia, heart failure, delirium) and require etiologic thinking (Graves, toxic nodules, thyroiditis, exogenous hormone). citeturn2search19\n- Guideline Must Know: For confirmed thyrotoxicosis, guideline-directed evaluation focuses on determining etiology (e.g., Graves vs thyroiditis) because management differs; thyroiditis is often treated symptomatically (beta-blockade), while Graves/toxic nodules may require antithyroid drugs or definitive therapy. citeturn2search19\n- Pattern 4 (central hypothyroidism): **free T4 low with TSH low/normal/mildly high** in the context of pituitary/hypothalamic disease; do not rely on TSH to dose therapy—use free T4 and clinical status, and evaluate/cover adrenal insufficiency before giving levothyroxine. citeturn2search13turn2search15\n- Guideline Must Know: In central hypothyroidism, levothyroxine dosing should aim to raise **free T4 into the upper half of the reference range**, not to normalize TSH. citeturn2search13turn2search15\n- Pattern 5 (central hyperthyroidism / resistance patterns): **TSH not suppressed with high free T4** suggests assay interference, TSH-secreting pituitary adenoma, or thyroid hormone resistance; inpatient next step is usually to repeat labs (ideally with a different assay) and coordinate endocrine follow-up rather than starting antithyroid drugs based on a single panel. citeturn2search13turn2search19\n- What must happen now: If symptomatic tachyarrhythmia (especially **AF/RVR**) with suspected thyrotoxicosis, treat the physiology (rate control, volume status, oxygenation) and escalate when severe; thyroid-directed therapy is driven by severity and confirmed pattern, per ATA management principles. citeturn2search19\n- What can wait: Mild, incidental low TSH or mildly high TSH during acute illness often normalizes; schedule repeat **TSH + free T4** after stabilization and avoid inpatient “labeling” unless clinical context strongly supports true thyroid disease. citeturn2search12turn2search19\n- Guideline Must Know: Pregnancy changes reference ranges and management thresholds; if pregnancy is possible or confirmed, interpret TFTs with pregnancy-specific guidance and lower threshold for treatment/consult per ATA pregnancy recommendations. citeturn2search25\n- Medication pitfall: Dopamine and high-dose glucocorticoids can suppress TSH; amiodarone can cause hypo- or hyperthyroidism and complicates interpretation—document exposures before acting on labs. citeturn2search19turn2search12\n- Assay pitfall (biotin): High-dose biotin can produce **incorrect immunoassay results** (often mimicking hyperthyroidism with low TSH/high free T4 or other discordant patterns); ask specifically about “hair/skin/nails” supplements and repeat testing using lab-recommended approaches when the clinical picture and labs disagree. citeturn2search6turn2search2\n- Guideline Must Know: When discordant TFTs could lead to irreversible or high-risk decisions, repeat/confirm testing (and consider alternate assay platforms) before committing to definitive therapy, consistent with guideline emphasis on accurate diagnosis prior to treatment selection. citeturn2search19turn2search12\n- Practical interpretation shortcut for nights: Always interpret in pairs—TSH answers “pituitary signal,” free T4 answers “circulating hormone,” and total T3 helps when “T3-toxicosis” is suspected (low TSH with normal free T4 but high T3). citeturn2search19turn2search12\n- When to call endocrine tonight: suspected storm/coma, severe symptomatic thyrotoxicosis, suspected central disease (pituitary history), or persistent major discordance (e.g., high free T4 with non-suppressed TSH) where treatment consequences are high. citeturn2search19turn2search13\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- Concern for **thyroid storm**: hyperthermia, severe agitation/delirium, **AF/RVR**, acute heart failure, shock, or rapidly worsening mental status with suppressed TSH and elevated thyroid hormone. citeturn2search19\n- Concern for **myxedema coma**: hypothermia, bradycardia, hypoventilation/hypercapnia, hypotension, hyponatremia, or coma with low free T4 and clinical decompensation. citeturn2search13turn2search12\n- Suspected **central hypothyroidism** with pituitary disease plus hemodynamic instability or concern for concomitant adrenal insufficiency (need coordinated endocrine/ICU management). citeturn2search13turn2search15\n- Persistent **discordant TFTs** (e.g., free T4 high with non-suppressed TSH) where therapy would be high-risk (antithyroid drugs, surgery planning, anticoagulation decisions) and assay interference is plausible. citeturn2search6turn2search19\n\n## Orders to Place Now (3–6 bullets)\n- Order: TSH with reflex free T4 — {reason-for-test, timing-now-vs-morning}\n- Order: Total T3 — {if-suspected-t3-toxicosis-or-discordant-results}\n- Order: Thyrotropin receptor antibody (TRAb) — {if-graves-suspected, pregnancy-status}\n- Order: Thyroid peroxidase antibody (TPOAb) — {if-subclinical-hypothyroidism-or-autoimmune-risk}\n- Order: AM serum cortisol — {if-central-hypothyroidism-suspected-or-before-starting-levothyroxine}\n- Order: 12-lead ECG — {if-tachycardia-palpitations-af-rvr-or-ischemic-symptoms}\n\n## ABIM Style Question 1\n### Stem\nA 58-year-old man with a history of pituitary macroadenoma resection is admitted for pneumonia. He is hemodynamically stable but reports fatigue and cold intolerance for several weeks. Labs show free T4 below the reference range and TSH is low-normal. Which interpretation and next step is most appropriate?\n### Options\nA. Primary hypothyroidism; start levothyroxine and titrate to normalize TSH  \nB. Central hypothyroidism; check adrenal function and treat with levothyroxine guided by free T4  \nC. Euthyroid sick syndrome; give liothyronine for low free T4  \nD. Graves disease; start methimazole immediately  \nE. Subclinical hypothyroidism; observe without further workup\n### Correct answer\nB\n### Rationale\nLow free T4 with a low/normal TSH in a patient with pituitary disease indicates **central hypothyroidism**, and therapy should be titrated to free T4 (aiming for the **upper half of the reference range**) rather than TSH. citeturn2search13turn2search15 Adrenal insufficiency can coexist; guidelines emphasize evaluating/covering adrenal function before initiating levothyroxine to avoid precipitating adrenal crisis. citeturn2search13turn2search15\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 42-year-old woman is admitted overnight for cellulitis. She has no weight loss, tremor, heat intolerance, or palpitations. Vitals are normal. Her labs from an “annual panel” drawn in the ED show TSH suppressed with a high free T4. She mentions taking an over-the-counter supplement for “hair and nails.” What is the best next step?\n### Options\nA. Start methimazole now and arrange outpatient endocrinology  \nB. Give iodinated contrast to block thyroid hormone release  \nC. Repeat thyroid tests using a method less susceptible to interference and document supplement use  \nD. Start levothyroxine because TSH is abnormal  \nE. Diagnose thyroiditis and start prednisone\n### Correct answer\nC\n### Rationale\nHigh-dose **biotin** can interfere with certain immunoassays and generate misleading thyroid hormone and TSH results that do not match the clinical picture, so confirmation with repeat testing per laboratory guidance (often via alternate platforms) is appropriate before treatment. citeturn2search6turn2search2 The pitfall is **assay interference**, and treating presumed thyrotoxicosis without confirmation risks unnecessary, potentially harmful therapy. citeturn2search6turn2search19\nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: In central hypothyroidism, which lab value guides levothyroxine titration? A: Free T4, targeting the upper half of the reference range rather than TSH. citeturn2search13turn2search15\n- Q: What TFT pattern most suggests overt primary hypothyroidism? A: Elevated TSH with low free T4. citeturn2search12\n- Q: What TFT pattern supports T3-toxicosis? A: Suppressed TSH with normal free T4 and elevated total T3. citeturn2search19\n- Q: Name one common supplement that can cause incorrect TFT immunoassay results. A: Biotin (vitamin B7), especially at high doses used in some supplements. citeturn2search6turn2search2\n\n## Guidelines & Key References (3–5 bullets)\n- AACE/ATA Clinical Practice Guidelines for Hypothyroidism in Adults (2012) — https://www.endocrinepractice.org/article/S1530-891X%2820%2943030-7/fulltext citeturn2search10\n- American Thyroid Association Guidelines for Hyperthyroidism and Other Causes of Thyrotoxicosis (2016) — https://journals.sagepub.com/doi/pdf/10.1089/thy.2016.0229 citeturn2search19\n- Endocrine Society: Hormone Replacement in Hypopituitarism (Central Hypothyroidism guidance) (2016) — https://www.endocrine.org/clinical-practice-guidelines/hormone-replacement-in-hypopituitarism citeturn2search13\n- ATA Guidelines for Thyroid Disease During Pregnancy and the Postpartum (2017) — https://www.liebertpub.com/doi/pdf/10.1089/thy.2016.0457 citeturn2search25\n- FDA Safety Communication: Biotin may interfere with lab tests (2017; updated guidance ecosystem) — https://www.fda.gov/media/127915/download citeturn2search2\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Hypothyroidism, {overt-vs-subclinical-vs-central}, {acuity-if-known}: {etiology-pituitary-autoimmune-post-thyroidectomy}, {objective-free-t4-tsH-pattern}, {symptoms-signs}, {treatment-or-plan-repeat-testing}, {monitoring}\n- Thyrotoxicosis/hyperthyroidism, {suspected-etiology}: {objective-tsH-free-t4-total-t3}, {end-organ-effects-af-rvr-hf-delirium}, {severity}, {treatments-beta-blocker-antithyroid}, {consults}\n- Myxedema coma, suspected: {ams-hypothermia-bradycardia-hypoventilation}, {objective-free-t4-tsH}, {organ-dysfunction}, {hydrocortisone-and-iv-levothyroxine-given}, {icu-transfer}\n- Thyroid storm, suspected: {fever-cns-changes-tachyarrhythmia-hf}, {objective-tsH-free-t4-total-t3}, {treatments-sequence}, {icu-consult}\n- Assay interference suspected: {biotin-or-other-interferent}, {discordant-labs-vs-clinical-status}, {repeat-testing-plan-alternate-assay}, {avoidance-of-irreversible-therapy} citeturn2search6turn2search2\n", "thyroid-nodules.md": "---\nfilename: thyroid-nodules.md\nid: thyroid-nodules\ntitle: Thyroid Nodules\nslug: thyroid-nodules\ntags: [endocrinology, thyroid, thyroid-nodules]\nlevel: resident\nestimatedtimemin: 12\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n\n# Thyroid Nodules\n\n## Panic Card (3–6 bullets)\n- If **stridor, respiratory distress, drooling/inability to handle secretions, rapidly expanding anterior neck swelling**, treat as airway emergency: **O₂**, upright positioning, continuous pulse ox, call **anesthesia + ENT** for difficult airway now. citeturn2search16\n- Suspected intranodular hemorrhage/neck hematoma with compression: establish 2 large-bore IVs, type and screen, check CBC/coags; prepare for urgent airway control and surgical evaluation (do not delay for imaging if unstable). citeturn2search4\n- New hoarseness with suspected vocal cord paresis or fixed neck mass: keep NPO if aspiration risk, obtain urgent ENT evaluation for laryngoscopy and malignancy red flags. citeturn2search19\n- If hyperthyroid physiology is present (tachyarrhythmia, fever, tremor) and nodule is known/suspected toxic: control rate (e.g., beta-blocker if appropriate), correct triggers, and escalate for endocrine input; diagnostic sequencing still starts with **TSH**. citeturn2search14turn2search4\n- Confirm Before Proceed: If life-threatening compressive bleeding is suspected on anticoagulation, confirm indication/last dose and coordinate reversal with ENT/anesthesia/ICU because reversal carries major thrombotic risk and may affect definitive management timing. citeturn2search19\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Most inpatient “thyroid nodules” are incidental findings on CT/MRI/ultrasound; the night-float task is risk triage: identify airway/bleeding/compression emergencies, then ensure correct outpatient pathway (dedicated thyroid ultrasound + FNA when indicated) rather than reflexive inpatient biopsy. citeturn2search14turn2search8\n- Guideline Must Know: The first test that changes the entire algorithm is **serum TSH** (with reflex free T4 if abnormal); a **low TSH** suggests a hyperfunctioning (“hot”) nodule and shifts you toward radionuclide uptake imaging rather than immediate FNA. citeturn2search14turn2search4\n- Guideline Must Know: If **TSH is low**, order a **radionuclide thyroid scan** (I-123 or Tc-99m) to determine if the nodule is hyperfunctioning; **hot nodules are rarely malignant** and typically do **not** require FNA unless ultrasound shows discordant high-risk features or there are concerning nodes. citeturn2search14turn2search4\n- Guideline Must Know: If **TSH is normal or high**, proceed with **high-resolution thyroid ultrasound with cervical lymph node survey**; ultrasound risk pattern plus size determines whether FNA is indicated. citeturn2search14turn2search8\n- Guideline Must Know: ATA sonographic pattern thresholds (common teaching): **high suspicion ≥1.0 cm → FNA**, **intermediate ≥1.0 cm → FNA**, **low suspicion ≥1.5 cm → FNA**, **very low suspicion ≥2.0 cm → consider FNA vs surveillance**, and **pure cysts → no FNA**. citeturn2search14turn2search4\n- Guideline Must Know: ACR TI-RADS size thresholds (commonly used by radiology): **TR5 FNA ≥1.0 cm** (follow ≥0.5 cm), **TR4 FNA ≥1.5 cm** (follow ≥1.0 cm), **TR3 FNA ≥2.5 cm** (follow ≥1.5 cm), and **TR1–TR2: no FNA**. citeturn2search8turn2search9\n- Guideline Must Know: Do not biopsy subcentimeter nodules by default; exceptions are high-risk contexts (e.g., suspicious lymph nodes, history of neck irradiation, strong familial thyroid cancer syndromes) or aggressive-appearing ultrasound patterns where management would change. citeturn2search14turn2search4\n- What must happen now (night shift): screen for red flags that require urgent escalation: **rapid enlargement over hours–days**, **stridor**, **progressive dysphagia**, **voice change/hoarseness**, **firm fixed mass**, or **suspicious cervical lymphadenopathy** (especially cystic nodes). citeturn2search19turn2search14\n- What must happen now (night shift): if airway symptoms are present, prioritize airway and ENT/anesthesia; imaging (ultrasound/CT neck) is supportive but must not delay stabilization when there is impending obstruction. citeturn2search19turn2search4\n- What can wait (but must be arranged): in stable patients with incidental nodules, place a clear plan for **outpatient thyroid ultrasound** and, if indicated by TI-RADS/ATA criteria, **ultrasound-guided FNA**; include size/location and the imaging report category in your sign-out. citeturn2search8turn2search14\n- Common pitfall: ordering inpatient FNA without a dedicated ultrasound risk category; FNA decisions are ultrasound-feature driven, and CT size alone is insufficient to determine biopsy need. citeturn2search8turn2search14\n- Common pitfall: skipping radionuclide imaging in a patient with **suppressed TSH**; doing FNA first may lead to unnecessary procedures because the correct next step is to identify hyperfunctioning tissue. citeturn2search14turn2search4\n- Interpretation anchor: thyroid cytology is reported using Bethesda categories; “indeterminate” results often prompt molecular testing and/or surgical referral, but these downstream steps are typically outpatient—your job is to ensure the patient has follow-up and that high-risk features are documented. citeturn2search14turn2search1\n- When to involve oncology pathways: if imaging shows suspicious nodes, invasive features, or the patient has a known thyroid cancer history, align evaluation with cancer guidelines (surgical/ENT, endocrine, and oncology coordination) rather than isolated nodule workup. citeturn2search19turn2search14\n- Medication/contrast note: avoid reflexive iodinated contrast CT “just to look” in stable incidental nodules; use it when evaluating compressive symptoms/retrosternal extension or alternative diagnoses, and document rationale because contrast may complicate near-term radioiodine planning. citeturn2search14turn2search4\n- Disposition/safety-netting: ensure the patient leaves with explicit instructions about urgent return for **worsening dyspnea, stridor, progressive dysphagia, or new voice change**, and ensure follow-up is not lost (PCP/endocrine/ENT referral placed or documented). citeturn2search16turn2search19\n\n## Top ICU/Consult Triggers (3–5 bullets)\n- **Any airway compromise**: stridor, escalating O₂ requirement, inability to manage secretions, or rapidly expanding neck swelling → **ICU + anesthesia + ENT now**. citeturn2search19turn2search4\n- Suspected **expanding neck hematoma/intranodular hemorrhage** with tracheal deviation or hemodynamic instability → **ICU/ENT emergent evaluation** (do not wait for routine ultrasound). citeturn2search4\n- **Suspicious cervical lymphadenopathy**, new vocal cord paralysis/hoarseness, or fixed hard thyroid mass → **ENT/endocrine consult** for urgent malignancy workup coordination. citeturn2search19turn2search14\n- **Severe thyrotoxicosis** (e.g., atrial fibrillation with RVR, chest pain, fever, altered mental status) in the setting of a nodule and **low TSH** → **ICU/endocrine** for stabilization and definitive diagnostic sequencing. citeturn2search14turn2search4\n\n## Orders to Place Now (3–6 bullets)\n- Order: TSH with reflex free T4 — {priority: stat|routine}\n- Order: Thyroid ultrasound (high-resolution) with cervical lymph node survey — {indication: incidental imaging|palpable nodule|compressive symptoms}\n- Order: CBC, PT/INR, aPTT, type and screen — {reason: suspected hemorrhage|anticoagulation|rapid enlargement}\n- Order: ENT consult for bedside laryngoscopy — {trigger: hoarseness|stridor|dysphagia|fixed neck mass}\n- Order: Radionuclide thyroid uptake/scan (I-123 or Tc-99m per protocol) — {condition: TSH low|suspected toxic nodule}\n\n## ABIM Style Question 1\n### Stem\nA 54-year-old woman is admitted for pneumonia. CT chest incidentally notes a thyroid nodule. Dedicated thyroid ultrasound shows a 1.2 cm solid hypoechoic nodule with irregular margins and punctate echogenic foci. She has no history of neck irradiation. TSH is normal. She is breathing comfortably and has no dysphagia or voice changes. What is the most appropriate next step in management?\n\n### Options\nA. Repeat ultrasound in 12 months without biopsy  \nB. Ultrasound-guided fine-needle aspiration of the nodule  \nC. Start levothyroxine suppression therapy  \nD. Radionuclide thyroid uptake scan before any further testing  \nE. Measure serum calcitonin routinely and defer imaging  \n\n### Correct answer\nB\n\n### Rationale\nA high-suspicion ultrasound pattern warrants FNA when the nodule is **≥1.0 cm**, and this patient’s 1.2 cm nodule meets that threshold with normal TSH. citeturn2search14turn2search8 Radionuclide scanning is prioritized when **TSH is low**, not when it is normal. citeturn2search14turn2search4\n\n## Second ABIM Style Case (Pitfall Variant)\n### Stem\nA 66-year-old man is admitted for decompensated heart failure and is found to have a 2.0 cm thyroid nodule on ultrasound. The nodule is solid and mildly hypoechoic without suspicious lymph nodes. His labs show a suppressed TSH. He denies dyspnea or dysphagia and has no hoarseness. What is the most appropriate next step?\n\n### Options\nA. Ultrasound-guided fine-needle aspiration now  \nB. Radionuclide thyroid uptake/scan to assess nodule function  \nC. Start levothyroxine to normalize TSH  \nD. CT neck with iodinated contrast to stage for malignancy  \nE. Repeat ultrasound in 6 months without additional testing  \n\n### Correct answer\nB\n\n### Rationale\nThe pitfall is skipping functional assessment: with **suppressed TSH**, the correct next step is radionuclide imaging to identify a hyperfunctioning nodule, which typically does not require FNA. citeturn2search14turn2search4 FNA thresholds apply after ultrasound risk stratification in patients with **normal/high TSH** or when the nodule is not hyperfunctioning. citeturn2search14turn2search8  \nWhat changed the decision here?\n\n## Check Yourself Micro Questions (3–5 items)\n- Q: What is the single best initial lab test in thyroid nodule evaluation? A: Serum TSH (often with reflex free T4 if abnormal). citeturn2search14turn2search4\n- Q: When should you obtain a radionuclide thyroid uptake/scan? A: When **TSH is low** to assess for a hyperfunctioning (“hot”) nodule. citeturn2search14turn2search4\n- Q: What ultrasound finding plus size most strongly supports FNA at 1 cm? A: A high-suspicion pattern (e.g., hypoechoic solid nodule with irregular margins and punctate echogenic foci) at **≥1.0 cm**. citeturn2search14turn2search8\n- Q: Which thyroid nodules generally do not require FNA? A: Pure cysts and very low-risk nodules below size thresholds in ATA/ACR TI-RADS schemes. citeturn2search14turn2search8\n\n## Guidelines & Key References (3–5 bullets)\n- American Thyroid Association (ATA) Management Guidelines for Thyroid Nodules and Differentiated Thyroid Cancer (2015) — https://www.liebertpub.com/doi/pdf/10.1089/thy.2015.0020 citeturn2search13\n- ACR TI-RADS: White Paper of the ACR TI-RADS Committee (2017) — https://www.jacr.org/article/S1546-1440(17)30186-2/fulltext citeturn2search8\n- American Association of Clinical Endocrinology (AACE/ACE/AME) Thyroid Nodule Guideline (2016) — https://pro.aace.com/clinical-guidance/2016-clinical-practice-guideline-diagnosis-and-management-thyroid-nodules citeturn2search1\n- NCCN Clinical Practice Guidelines in Oncology: Thyroid Carcinoma, Version 1.2025 (includes thyroid nodule evaluation) — https://www.nccn.org/guidelines/guidelines-detail?category=1&id=1470 citeturn2search19\n\n## CDI: What to Document Clearly Tonight (3–5 bullets; NO prose)\n- Thyroid nodule, {size} cm, {right|left|isthmus}; etiology {incidental|palpable}; risk features {TI-RADS/ATA pattern if known}; evidence {US/CT descriptors}; plan {US referral|FNA referral|endocrine/ENT follow-up}. citeturn2search14turn2search8\n- Suspected airway compromise due to thyroid mass effect: acuity {acute|subacute}; severity {stridor|increased O₂ need}; evidence {exam findings|O₂ saturation|imaging tracheal deviation}; treatment {airway team|ENT consult|ICU transfer}. citeturn2search19turn2search4\n- Suspected intranodular hemorrhage/neck hematoma: acuity {acute}; cause {trauma|anticoagulation|spontaneous}; evidence {rapid neck swelling|Hgb trend|coags|imaging if obtained}; treatment {reversal consideration|ENT eval|airway precautions}. citeturn2search4turn2search19\n- Biochemical thyroid status impacting nodule algorithm: diagnosis {suppressed TSH|euthyroid}; evidence {TSH, free T4}; next step {radionuclide scan ordered|outpatient endocrine}; rationale {hyperfunctioning nodule pathway}. citeturn2search14turn2search4\n", "hypercalcemia.md": "---\nfilename: Hypercalcemia.md\nid: hypercalcemia\ntitle: Hypercalcemia\nslug: hypercalcemia\ntags: [electrolytes, endocrine, inpatient, night-float, hypercalcemia]\nlevel: resident\nestimatedtimemin: 15\nversion: 2026-03-02\nsource: IMNightFloatEngine\n---\n# Hypercalcemia\n\n## Panic Card (3–6 bullets)\n- ABCs + telemetry now; get ECG for **short QT/AV block/arrhythmia** and check bedside glucose; treat unstable rhythm per ACLS while you correct calcium.\n- Confirm severity with **ionized Ca** (preferred) and repeat CMP; treat immediately if **Ca ≥3.5 mmol/L (≈14 mg/dL)** or neuro/cardiac symptoms, regardless of cause.\n- Start isotonic fluids: **0.9% sodium chloride 1–2 L bolus** then **150–250 mL/h** aiming **urine output ≥100 mL/h** (use smaller boluses if HF/CKD; reassess lungs/IVC).\n- Add rapid temporizer: **calcitonin 4 IU/kg SC/IM q12h** (may repeat **q6h**; max **8 IU/kg/dose**) and plan antiresorptive therapy early (onset hours vs days). citeturn2search9turn2search11\n- Give definitive antiresorptive for suspected malignancy or high bone resorption: **denosumab 120 mg SC once** or **zoledronic acid 4 mg IV once** (renal risk) / **pamidronate 60–90 mg IV once**; expect effect in **24–72 h**. citeturn2search9turn2search11\n- If cannot hydrate (pulmonary edema/ESRD) or life-threatening symptoms: urgent nephrology for **hemodialysis with low-calcium dialysate**; ICU if AMS, refractory arrhythmia, or escalating oxygen/pressor needs. citeturn2search1\n\n## Brief Overview (450–700 words total; bulleted; 12–20 bullets)\n- Hypercalcemia on nights is about 3 things: confirm it’s real (ionized Ca), grade severity, and start a cause-directed pathway while you stabilize; treat immediately if **Ca ≥3.5 mmol/L** or symptomatic (confusion, coma, seizures, chest pain, arrhythmia, severe dehydration/oliguria).\n- Separate “now vs can wait”: now = fluids + temporizer + definitive therapy planning; can wait (once stable) = full etiologic workup (PTH/PTHrP/vitamin D studies, malignancy evaluation, imaging).\n- Guideline Must Know: For hypercalcemia of malignancy, Endocrine Society recommends treating adults with **denosumab or an IV bisphosphonate** rather than no antiresorptive therapy. citeturn2search9turn2search11\n- Guideline Must Know: Endocrine Society suggests **denosumab over IV bisphosphonate** for acute hypercalcemia of malignancy when feasible (useful when renal function is poor or prior bisphosphonate failure). citeturn2search9turn2search11\n- Guideline Must Know: In **severe** hypercalcemia of malignancy (**>14 mg/dL ≈ >3.5 mmol/L**), Endocrine Society suggests **calcitonin + (IV bisphosphonate or denosumab)** as initial therapy to bridge slow-onset definitive agents. citeturn2search11turn2search8\n- Initial stabilization: restore volume (hypercalcemia causes nephrogenic DI) with **0.9% sodium chloride**; reassess frequently (lung exam, JVP, bedside ultrasound) and target **MAP ≥65 mmHg** and **urine output ≥100 mL/h** if not obstructed.\n- Pitfall: giving loop diuret
